t the Scripps Institute of \nOceanography has been studying the ability of iron carbonates \nto produce organic compounds . I think the gap of J 00 years \nbetween this work and the ideas of Mendeleev and his con-\ntemporaries is the result of a dominant habit of thought which \nsees the world as an inhospitable place, in which life is a great \nimprobability that came into existence only with great difficul-\nty. The famous Crick, for example, suggested that life had to \noriginate elsewhere, and arrived on earth as a truly alien \nspace-traveler . The thought that life forms might just sort of \ngush up out of the earth in volcanic regions makes it all seem \ntoo where might it lead if people started believing that \nlife could originate without a struggle for existence? \nSeveral years ago, Sidney Fox demonstrated that amino \nacids placed on a hot volcanic rock spontaneously fonned into \nproteins, and that these proteins had some enzyme-like cata-\nlytic action. Adding a little water, the proteins spontaneously \nformed small self-reproducing spheres, just the size of \nbacteria. One of their enzyme-like actions was the ability to \nsynthesize gene-like chains from suitable precursor molecules. \nExplorations of the deep ocean floor , far below the level at \nwhich life should exist, because of the absence of light, re-\nvealed worm-like organisms . Further study showed that the \nworms live on bacteria, which in turn live on volcanic emis-\nsions rising through the ocean floor. If volcanic processes \ncreated life forms, and can even provide their food, then we \ndon't have to imagine that green plants necessarily evolved be-\nfore animals . \n28 \n\nOxidants(2) are emitted by volcanism, and there are heme-\nlike porphyrin molecules in petroleum which can catalyze \nrespiration-like reactions. While molecular oxygen is now our \nmost important electron acceptor (oxidant), other substanc es \ncould have had a similar function. And, since volcanos emit \nboth oxidants and reductants (depending on temperature and \nother condit ions) we shouldn't blindly accept the doctrine that \nlife originated in a \"reducing atmosphere.\"(3) Since the reac-\ntions which produce petroleum-like hydrocarbons do not pro-\nduce carbohydrates, we might want to investigate the \npossibility that carbohydrates are the product of a primitive \ntype of metabolism . \nSeveral things look different when we consider the possibil-\nity of a volcanic origi n for life. For example, there is a sug-\ngestion that life originated in abundance, in an environment \nrich, at least locally , in complex organic molecules, rather than \nin occasional puffs of molecules generated by lightning or dis-\nsolving slow ly out of a meteorite. And the thought that life is \ntruly geological, and is an expression of our planet's nature , \nmight make us feel more at home, and nurtured . \nIf we think of life, already complex and respiring, moving \ninto the light and adapting to a new system in which carbon \ndioxide is captured from the enviro nment for new syntheses, \nwe are likely to ask a different set of biochemical and bioener-\ngetic questions . DetoxifYing systems, that would have \nevolved to protect respiration from compounds such as am-\nmonia, cyanide, and carbon monoxide, might have been the \nfirst systems to make use of light. Evolution of these systems \nmight have led into photosynthesis. If this is true. then the \ntheoretical and chemical study of the origin of life might give \nus some clues to the nature of the biological rhythms based on \nthe cycle of day and night. \n29 \n\nSeveral people have written about the idea of a \"noosp-\nhere.\" Pierre Teilhard de Chardin, in fhe Human Phenome-\nnon, used the term coined by Edouard Le Roy. V. I. \nVernadsky, in Biogeochemical Essays, developed the concept \nin relation to the principles of biogeochemistry. Vemadsky \nsaw the noosphere as a stage in the natural geological devel-\nopment of the earth. He suggested that the various stages and \naspects of the earth , the lithosphere , the hydrosphere , the at-\nmosphere , the biosphere , will be followed by a stage in which \na highly developed human society will recognize its place in \nthe world and with understanding will guide the preservation \nand development of the natural system. \nThis is not exactly the same as the \"Gaia hypothesis ,\" \nwhich sees the earth as an organism-like self-regulating sys-\ntem, since the people who talk about the noosphere idea rec-\nognize the damage that human life has already done to the \nbiosphere , and emphasize that the course of human civiliza-\ntion will be crucial in the fate of the earth. \nIf we proceed blindly with aimless industrialization , defor-\nestation , destructive agricultural practices and militarism , the \nentire biosphere could be destroyed, possibly ending the \nearth's progress forever . But if civilization proceeds toward \nan understanding that the world is in development , we might \nfind our place in this developmental process . If this happens , \nthe earth will be entering a new energy level , analogous to the \nearlier appearance of photosynthesis. As we build our under-\nstanding we can increasingly think of our consciousness as a \ngeological force . \nDuring the Second World War , Vernadsky wrote: \"I look \nat everything from the point of view of the noosphere and I \nthink that in the wind and stonn, in the horror and ordeal, a \nwonderful new future is being spontaneously born. II \n30 \n\nNOTES : \nI. P. N. Kropotkin , \"D. 1. Mendeleev's hypothesis on the inor-\nganic origin of petroleum and its modem scientific develop-\nment ,\" Mende/ eel' Chemisfry Journal 3/(5), page 1, 1986. \n2. Many of the conditions that exist in volcanos are able to \ngenerate molecular oxygen , e.g., heating metal oxides , oxy-\nacids and oxy-salts , adding chlorine to a lime solution , or \ncombining chlorine and steam at high temperature . If released \nin explosions , the molecular oxygen could be over-looked . \n3. The \"argument\" that life originated in a reducing atmo-\nsphere is that ultraviolet light causes that kind of atmosphere \nto form many organic compound s; oxygen would form ozone , \nblocking the ultraviolet radiation. If ultraviolet light created \nlife, oxygen must have been absent. If something other than \nultraviolet light produced the complex organic molecules , the \npresence of oxygen would simply have had the same protec-\ntive effect it now has. \n31 \n\nCHAPTER 3 \nVERNADSKY'S HOLISTIC SCIENCE \nIncreasingly in the last decade, people in the Soviet Union \nwho are interested in perestroika and an alternative world \nview have been thinking about V. L Vemadsky and his \nwork . Ecologists and conservationists in that country have \nfound that his picture of the world offers an approach to the \nunity of life and its environment which is both practical and in-\nspiring . While it initially sounds like a strange thing to say, \nVernadsky's work made a real place for human consciousness \nand history in science by using simple physical concepts such \nas mass , energy, and rates of change, for approaching the bio-\nsphere _ Ry examining the limits set by space (lnd the tlow of \nenergy from the sun and the earth , Vernadsk y was led to pro-\npose some simple laws of biogeochemistry , for example that \nthe migration of chemical elements tends towards a maximum . \nWithin this framework, he saw that the inten sity of biological \nreproduction and metaboli sm and the degree of biological or-\nganization have orderly and lawful interrelations, and that hu-\nman culture and consciousness participate in these natural \nrelationships and processes . Vernadsky described his view as \n\"cosmic realism,\" a phrase that had also been used by \nMendeleev. \nAs a student, Vernadsky (1863-1945) was drawn toward \nboth history and mathematics , and he read widely in philo so-\nphy and religion , includin g Plato , Aristotle , and Hinduism . \nAfter studying with Dokuchae v (who has been described as \nthe pioneer of ecology because of his study of the interaction \nof biological and geological factors in the formation of soil), \n32 \n\nVemadsky studied in Gennany and France. It seems that he \nsought out the best minds and strongest personalities of the \ntime, in many branches of knowledge . He knew the Curies , \nHans Driesch (a student of Haeckel , the Darwinist ; Driesch is \nknown as a vitalist), Sechenov, Le Chatelier, Mendeleev, and \nTolstoy, and was able to integrate their perceptions into his \n\u2022 view. \nFor example , he wrote \"I think that the teaching of Tolstoy \nis much deeper than I first thought. This depth consists in his \nview that the basis oflife is the search for truth, and that the \nreal task is to tell this truth without any retreats ,\" and he de-\nscribed Tolstoy as an accumulator of the energy of human \n\u2022 conscIOusness . \nTolstoy'S moral thought was paralleled by Vemadsky's \nperception of unity , in which humans , as part of a cycle of \ntransformation s, have an obligation to think and act for the \ngood of the planet. The creation and preservation of culture \nand human consciousness are given a central place in Ver-\nnadsky's view , but not at the expense of anything else in the \nworld : Consciousness is needed by all of humanity , for the \ngood of the world . \nIn 1922 Vernad sky lectured in Paris on biogeochemistry \nand on the place of consciousness in the history of the earth . \nThese ideas were summarized in his 1926 book The Bio-\nsphere . He tried to get support in the United States to start a \nlaboratory for the study of biogeochemistry, but his friend E. \nS. Dana at Yale was apparently the only American interested \nin the subject. The chairman of the chemistry department at \nStanford said that the subject \"hardly deserves the attention he \nwould give it,\" and the proposal was also rejected by the Car-\nnegie Institution , the National Research Council, and the Brit-\nish Association for the Advancement of Science . \n33 \n\nAlthough many of Vemadsky's concrete discoveries have \nbeen independently rediscovered in the United States , his \nname seldom appears in American books on geology or ecolo-\ngy. I think this is because of his basic belief that nature is not \nruled by accident . \"Earth's structure is a harmonious integra-\ntion of parts that must be studied as an indivisible mechani sm . \n. . . Creatures on earth are the fruit of a long and complicated \nmechanism in which it is known that fixed laws apply and \nchance does not exist.\" \nThe idealization of randomness in German and Anglo -\nAmerican science makes it hard even now to discuss physical \nand biological approaches which emphasize order, lawfulness , \nand directional transformations . Like Le Chatelier's ideas in \nphysical chemistry, which were very influential in Vemadsky 's \nthinking , the idea of a principle of \"stability\" which leads \nspontaneously to increased complexity and order in a system, \nis a little too alien to be received easily in our culture_ lIya \nPrigogine's work in this area is probably changing the atmo-\nsphere a little . \nUnfortunately , even when there are systematic observations \nof the appearance of structure out of relative disorder , there is \nin the United States a preference to attribute the appearance \nof order to \"chaotic\" processes, and to argue from the \"Iogic \nof chaos\" that the future is absolutely unforeseeable , and that \nthe world is chaotic rather than lawful. (If there is any signifi-\ncant chaos in this new doctrine , I think it is primarily in the \nterminology and in the illogical conclusions of some of its \nproponents . ) \nTo Vemad sky, the world is lawful. His view of life as an \nactive mass , a form of matter which must be understood \nquantitatively , \"a whirlwind of molecules,\" acting on its sur-\nroundings , led him to think in terms of the rate of migration of \n34 \n\natoms through this active mass. With this view, inert atoms \nbecome active, while active atoms become inert, depending on \ntheir situation . \nThis idea of the \"history of an atom\" is perfectly natural \nfrom the \"cosmic realist\" point of view, but it leads to ques-\ntions that just don't occur to a person who usually thinks of \natoms as statistical and anonymous identities . His first bio-\ngeochemical law, that the migration of atoms tends toward a \nmaximum, is obvious to anyone who thinks about it, and it is \nan obvious parallel to Le Chatelier's principle of equilibrium. \nOnce that principle is accepted, and if life is seen as part of \nnature, then Vemadsky's second law, that evolution will pro-\nduce species which maximize the migration of chemical ele-\nments, follows naturally. \nBut this requires thinking about the biosphere as a system \nwhich is driven by energy from the sun, and this context isn't \nhabitual for evolutionists . Vernadsky said that his second bio-\ngeochemical principle \"shows, in a manner as precise as the \ncorresponding principles in mechanics and physical chemistry , \nthe direction in which the processes of evolution must pro-\nceed , namely, in the direction of increasing consciousness and \nthought, and of forms having greater and greater influence on \ntheir surroundings .\" \nTeilhard de Chardin got his idea of the Noosphere from \nVernadsky's work. Many people prefer to see the idea of con-\nsciousness' having a meaningful and central place in evolution \nas exclusively a religious idea. However, from Vernadsky's \nperspective it can be derived from seeing life in physical and \nchemical terms . To make the implications of the idea clearer, \nit might be useful to apply it to some contemporary scientific \nquestions, which could range from the origin of life, to the op-\ntimization of farming and dietary practices . \n3S \n\nCHAPTER 4 \nTHE CENTRALITY OF ANTICIPATION \n\"One gathers thaI the period of youth among \nmammals is 1101 essentially recapilulalory but \nrather adaptive and anticipatory. \" \nP.E. Davidson , in The Recapitu/alory lheory \nalld Human In/all cy, Columbia University \nPress, 1914 . \nEnergy flows through all systems , and the flow of enerh'Y \nleaves a residue of structure. In the 1960's and early 1970's , I \nmade many \"model\" systems of the chemistry of respiration , \ntrying to get perspectives on the meaning of biological respi -\nration . \nOne of my experiments , in 1971, involved ascorbic acid, \nhydrogen peroxide, iodine , and copper. Every few seconds , \nthe mixture alternately changed color and emitted puffs of \nthis is called an oscillating reaction , or a Belousov -\nZhabotinsky reaction . This made me realize that \"structure \nbuilding\" can involve the dimension of time, in a way more in-\nteresting than the simple dissipation of energy over time . \nWhen starting at a point, an oscillating reaction of this sort \ncan generate interesting ring and spiral structures in space . \nI see the interaction between the flow of energy (e.g., be-\ntween a sugar and oxygen) and the structure as one in which \nthe flow is retarded by the structure , and used by the struc-\nture, in maintaining and complexifying itself (Another way of \nlooking at this is that if energy can do something, it does \n36 \n\nsomething ; and what it does is to build structure. The life \nstructure is a kind of energy charge , but the important thing is \nthe spontaneous nature of the interactions, in the presence of \nan energy supply.) The chemical nature of the energy source \n(and of the energy \"sink ,\" which is usually oxygen) influences \nthe nature of the structure-building . \nA point made by O. Warburg and A. Szent-Gyorgyi and \nothers is that there is an important difference between the en-\nergy provided by glycolysis and that provided by mitochon-\ndrial respiration . They felt that glycolysis was a more \nprimitive form of energy production , and supported only \nprimitive function and cell division, while the more efficient \nrespiration supported cell differentiation and complex func-\ntioning. \nWarburg thought that localization of mitochondria within \ncells could explain the special effects of respiratory energy , \nwhile Szent-Gyorgyi suspected that respiration more directly \nheld the structural proteins of the cell in a special electronic \nstate. It is now recognized that the localization of mitochon-\ndria within a cell creates an energy (ATP) gradient within the \ncell. (There has been a dogmatic disbelief in such gradients.) \nAnd, for example, the polyamines , which are associated with \nan increased rate of cell division , appear to shift cell metabo-\nlism away from respiration , toward glycolysis. The nature of \nthe energy source seems to be more important than many \nbiologists have thought. \nVarious hormones involved in adaptation and reproduction \nmodulate the balance between glycolysis and respiration . \nElsewhere (e.g.,.!. Or/homol. P;ych., 1975) I have discussed \nthe hormone-like properties of various nutrients . In the \n1930'5 , it was pointed out that all of the changes produced in \nrats by a diet lacking the \"essential fatty acids\" were the same \n37 \n\nas the changes occurring in hyperthyroidism . Parallel to the \nbalance (or antagonism) between opposing hormones , there \nseems to be some sort of balance and opposition between dif-\nferent sorts of food energy . \nThe structural and functional repercussions of different di-\netary energy sources are complex , and I plan to discuss some \nof them soon in more detail , but there is some evidence for a \nrelatively simple sort of absorptive or solubility compatibility \nbetween the cell substance in a given energy state, and the fuel \nmolecules preferred by that state . Conceivably , this could ac-\ncount for the apparent \"directed mutations\" in the ability of \nmicroorganisms to use new substances for foods , observed by \nC. C. Lindegren , 1. Cairns, and others. In adaptation to foods \nwhich are actually present, no anticipation is required, but \nonly a sort of structural accommodation . \nWhen the availability of food changes according to a daily \ncycle of light and dark, there is an adjustment of the metabo-\nlism involving many hormones , and an adjustment of nervous \nfunction, to protect against stress (Figure 1). Learning is in-\nvolved , in the sense that a cyclic repetition is anticipated even \nby \"simple\" organisms. In humans and other mammals, there \nis the \"dawn phenomenon,\" in which blood sugar rises to day-\ntime levels before sunri se. \n38 TO r AI. CORTISOl. \n1\"'1 \u2022\u2022 11 \nTIMa \nFig. 1 \u2022 Blood oortisoIlising during the night . \n\nWhen food is abundant during pregnancy, and when the en-\nvironment is not stressful, the brain of the fetus grows at a \nfaster rate than in cases in which the pregnancy is affected by \nmalnutrition or stress . Since the brain is a metabolically ex-\npensive organ, and since a larger brain tends to correspond to \na higher metaboli c rate of the entire organism, it appears that \nthe developing fetus is anticipating a lifetime of relative abun-\ndance of food when it is well nourished in the uterus, and \nwhen it is exposed to less cortisol and more progesterone. \nIn evolution, the tendency toward dominance of the head \n(cephalization) in animals overlaps with another tendency \n(known in plants too) called juvenilization, pedomorphi sm, or \nneoteny, in which an early stage of the organism's develop-\nment, the juvenile stage, is preserved for longer and longer \nperiods in the descendants , eventually becoming the normal \nadult type. Baby apes resemble humans , in body proportions \nand behavior , much more than the adult apes do. The infant \nrepresent s our evolutionary future . \nEmbryologists have observed that \"ontogeny recapitulates \nphylogeny ,\" that is, that early in development , mammals go \nthrough stages that resemble fish and reptiles. But I have al-\nways been intrigued by the fact that the same trend which can \nbe seen going back from the adult to the infant--i.e ., increas-\ning of the brain-to-body ratio--can be seen to continue from \nthe infant back to the embryo , at about the second month or \nseventh week of development . That is, the first few weeks of \nontogeny recapitulate phylogeny, but then ontogeny also an-\nticipates a phylogeny that hasn't been yet (Figure 2). \nIf the physicaVchemical structure s which retard the flow of \nenergy, and complexify with it, accommodating themselves to \nit, reflect past and present conditions and types of energy \nsource and energy sink, then presumably different geological \n39 \n\nFig. 2 -Ontogeny may anticipate pbytOSCDy. \nphases would be suitably associated with different anatomies \nand physiologies . The extremely favorable energy relation-\nships which exist in the early embryo (which is very small in \nrelation to its supply of energy) appear to support a certain \nstructural relationship, which sketches out the structural-\nfunctional possibilities for the future , when our environmental \nenergy resources might be richer. \nNOTES: \nThe term \"aromorphosis\" has been applied to the sudden \nappearance of a new biological form, when energetic condi-\ntions are suitable (e.g., M. I. Budyko , Evolution of the Bio-\n.\\phere, 1986). Pedomorphosis , or juvenilization , can be \nthought of as the \"aromorphic\" response to an environment \n(or niche) which is becoming more nurturing : the infantile \nform , which requires nurturing , persists to take advantage of \nthe richer , more energetic environment. V. L Vernadsky and \nI1ya Prigogine each worked out some important parts of the \ntheory describing the emergence of order out of disorder. F. \nD. Peat outline s Prigogine's ideas in Synchronicity (Bantam \nBooks, 1987) . \n40 \n\nEach stage of evolutionary history has its characteristic me-\ntabolic chemistry. By protecting and promoting mitochondrial \nrespiration we are contributing to our own evolution . (More \non this subject appears in \"Youth, Energy and Regeneration\" \nand \"The Life of Nature\".) \n*Le Chatelier's principle . that a system adjusts in ways \nwhich restore a disturbed equilibrium , is behind this idea. Ev-\nery part of the flow can be seen as a disequilibrium, and the \ncomplexification of the structure tends to absorb the disturb-\n\u2022 mg energy. \nReferring specifically to the heart muscle , Szent-Gyorgyi \nsaid \"function build s structure .\" Generalized principles of \nstability will illuminate the life processes in which stimulation \nproduces growth and adaptation. Much of the needed knowl-\nedge already exists in a fragmented way. \nA propo sed law of aromorphosis : that the retardation of \nthe flow of energy in living systems tends toward a maximum ; \nin animals , this would imply a trend toward larger-brained , \nlonger-lived, and probably warmer animals, having a higher \nenergy charge. \n41 \n\nCHAPTERS \nTHE LIFE OF NATURE \n\"Then lell me, what is the material world, \nand is it dead?\" He, laughing, answer'd: \"l will wrile \na hook 011 leaves of flowers, if YOIl will feed me on \nlove-thoughts & give me 110W and then A cup oj spar-\nkling poetic fancies; so, when I am fipsie , I'll sing 10 \nYOII to this soft lute, and shew you all alive The world, \nwhere every particle of dust breathes forth ilsjoy. \" \nW. Blake (1794) \n\"If this were all entirely scien-\ntific matter , there is little douht from the evidence that \nthe case for a fundamentally biological universe would \nbe regarded as substantially proven. The reason why \nthe SCientific community passionately resists Ihis con-\nclusion is Ihat biological .\\ystems are teleological, \nwhich is to say purposive. And if we admit the uni-\nverse to be inhabited by a vast number of purposive \ncomponellts then the thought cannot be far away that \nperhaps the Universe itself might be purposive .... \" \nF. Hoyle (1989) \nTo read either poetry or \"scientific\" writing, it is useful to \nknow what was going on in the writer's life. For example , if \nyou know that Albert Einstein's family's business was ruined \nby the German electric-machine monopoly, his attitude to-\nward the Gennan-dominated physics establishment and its \nideas will be seen in that context. The nature of \n42 \n\ncommunication and of meaning itself makes a certain consid-\neration (\"ad hominem\") of the communicator's general atti-\ntudes necessary for a clear and full understanding . Einstein \nexplicitly recognized this situation when he said that a per-\nson's life can't be separated from the person's hypothesis . \nTo be valid and useful , a hypothe sis must coincide closely \nwith the facts , but that is only a minimum requirement. It must \nalso be general enough to matter , to mean something , but that \nstill isn't enough : It shouldn't be deceptive or propagandistic , \nand ideally it shouldn't be misleading in any way, for example \nby omission and by exclusion. \nThe dean of the Yale school of medicine said it wasn't \nproper for me to think that his school's research conclusions \non the safety of Premarin could be influenced by a gift of a \nlarge amount of money from Ayerst (the makers of that ultra-\nlucrative produ ct). but he refused to tell me how much money \nwas involved . Big money from every major industry has cor-\nrupted our scientific culture , and it is important that we con-\nsider the scientific alternatives . \nThe links between Premarin and the Theory of a Dead Uni-\nverse are not obvious, unles s you think about them . Our \nproduct-oriented medical culture is stren,brthening the idea of \nthe pathogen-destroying magic bullet , because magic bullet s \ncan be profitably sold and administered. The idea that the pa-\ntient is a self-healing, self-organizing kind of being is unpopu -\nlar with the medical busine ss, because they have no \ninvestment in the providing of healthful environments : Clean \nair, clean water , clean food, safe work, good housing . \nThe \"genetic defect\" theory of disea se holds the promise of \na gene-implant for every problem . Interestingly , the people \nwho point out that \"thousands of genetic diseases are now \nknown\" neglect to mention that the \"scientific literature\" \n43 \n\nsupporting their claim is infinitely more \"anecdotal\" than the \ndespised \"anecdotal\" support for the various unofficial reme-\ndies that are so offensive to the medical establishment A \ndoctor sees three people in a family with muscle twitches , \nand a Latin-named Twitchy Muscle Syndrome with dominant \nMendelian inheritance enters the scientific literature. In thou-\nsands of such publications, the possibility of nutritional defi-\nciencies and exposure to toxins isn't investigated, because \nthere is such eagerness to recognize a new genetic defect \nThere is a mystique in our scientific culture called Reduc-\ntionism . It reduces the explanation for something to a de-\nscription of its parts, and the ways the parts interact . A \nrelatively small number of \"elements\" and \"laws\" are used to \nexplain a great range of specific phenomena . My favorite \nformulation of the reductionist attitude is that of the famous \nMr. Crick: What else is there but atoms ? \nThe reason I call Reductionism a mystique is that its propo-\nnents feel it is so clear and obvious that they don't have to \nbother with philosophical complexity . They , in that sense , are \nthe Fundamentalists of the 20th century . Although they em-\nphasize the importance of analysis, formal reasoning, mathe-\nmatics, and quantification , they are not interested in \nexamining the philosophical basis of their methods , except oc-\ncasionally to say something like \"the scientific method has \nbeen proven scientifically .\" \nSanity itself requires that we not confuse our wishes, as-\nsumptions, methods, and ideas with the world that we arc try-\ning to understand. If our method determines our conclusions \nwe are closer to theology than to science, and that is how \nmany \"scientists\" prefer it. \nAn inference that something is generally true, based on \nsome specific examples, is a matter of judgment, rather than \n44 \n\nof formal logic . Different people may draw different infer-\nences. An intelligent hypothesis is based on a lifetime of intel-\nligent inferences . The element of judgment in choosing a \nhypothesis leads some people to suggest that there is an arbi-\ntrariness or even randomness to the choice of hypotheses . If \nwe acknowledge clearly that our choice of hypothesi s is a \nmatter of our best judgment , there is no problem, because the \nvirtue of science is in putting hypotheses to various tests, \nwhich will eventually eliminate the most mistaken ones . \nWhen we make specific formal deductions from a hypothe sis \nwe reveal its implications and look for ways to test these \nimplications. \nIt is in the nature of formal reasoning that we can deduce \nspecific details from something more general, but that we \ncan't formally deduce something more general from specific \nthings. This is where reductionism uses its method to impose \na conclusion about the nature of the world. \nThe reductionism which says that physics can explain ev-\nerything, because everything is composed of \"these basic par-\nticles , according to fundamental laws of interaction,\" forces \nitself into asserting that the many forms oflife can be deduced \nfrom the general laws of physics, and that the varied and spe-\ncific forms of organisms represent the interaction through \ntime of chance events (in the genes) with the determining \nforces of the environment. The mode of explanation leads to \nthe content of the science . The nature of formal logic, pro-\nceeding from the parts, requires that the whole be explainable \nin terms of its parts. If the trick that explains the whole can \nbe found in the nature of the parts , there is no problem, but \nproblems arise when the reductionist claims that we already \nhave the kind of knowledge of the parts that can adequately \nexplain the whole . In this sense, biology is seen as less \n45 \n\ngeneral than physics , and physics contains an adequate expla-\nnation for biology . \nA story from a 1915 physics conference in Berlin will illus-\ntrate how the desire to explain things in terms of the parts can \ncreate problems even within physics itself (and its traditional \nsubject matter). Michael Polanyi , a Hungarian , found that \nthere was a simple formula that accurately described the ad-\nsorption of gas molecules on charcoal, at different pressures , \nin terms of an \"adsorption potential\" extending through space , \nwhich allows various layers of gas molecules to condense on \ntop of previously adsorbed layers , as the pressure is increased . \nThe famous German physicists at the meeting pointed out \nthat their modern knowledge of the electrical nature of matter \nmade it evident that the first layer of molecules would neutral-\nize the adsorbing force of the charcoal, and that it was only \nbecause Polanyi was working in a backward country that be \nthought an adsorption \"potential\" could somehow reach out \ninto space through a layer of molecules to pull in more mole-\ncules. \nAround 1930 , Langmuir proposed his relatively complex \nmultilayer adsorption theory , but by then Polanyi's more ele-\ngant adsorption isotherm was remembered only as the embar-\nrassing \"mistake\" of a young man from a backward country . \n(We should also remember that the \"modern\" notion of the \nelectrical nature of matter formed the very basis for such work \nas the theory of the photoelectric effect , which had such im-\nportance in the development of the quantum theory. If atoms \naren't the discrete little packets they were thought to be \naround the turn of the century, then the need for discrete little \npackets of energy isn't as evident as it seemed then. Polanyi's \nother projects turned up other aspects of matter that weren't \nacceptable to the physics of that time.) \n46 \n\nIf the world's best physicists and chemists used a reduction-\nist approach to block the development of an important branch \nof physics , it is clear how the approach can obstruct the devel-\nopment of ideas in more complex fields , such as biology and \ncosrnoiOh'y. If the Germans had taken Polanyi's adsorption \nwork more seriously , they would have had to revise their rigid \nand mistaken ideas about \"the electrical nature of matter.\" A \nhigher level of organization of substance (as in Polanyj's ex-\nperiment) can, if insightfully described , provide new knowl-\nedge about the nature of the \"parts\" makin g up the lower \nlevel . This might be called \"reducing up.\" \nSince there is nothing known about atoms that could cause \nthem to arrange themselves into the shapes of the various \nknown organisms, absolute chance is said to be responsible \nfor variations of form , and the surrounding conditions are said \nto allow certain ones to persist and multipl y. \nOnce we accept that knowledge is tentative, and that we \nare probably going to improve our knowledge in important \nways when we learn more about the world , we are less likely \nto reject new information that conflicts with our present ideas . \nThe attitude of expectancy will allow us to apply insights \ngained at one level of generality to other levels. No parti cular \nkind of knowledge will have such authority that it will auto-\nmatically exclude certain possibilities in another field of \nknowledge. \nFor example , either Polanyi's adsorption measurements or \nthe known structures of organisms or .biological systems could \nbe seen as an opportunity to ask \"what proce sses could create \nstructures of this sort, or are there rules of stability which can \nclearly define the conditions under which such a can \nexist?\" \n47 \n\nRules of structure-making are likely to be very complex, \nbut rules of stability are relatively simple. Polanyi's adsorption \nisothenn is a very simple rule of stability . which describes how \ngas molecule s arrange them selves on a surface, and it makes a \ngeneral contribution to our understanding of the \"condensed \nstate of matter. \"The factors which govern mammalian fertil-\nity can be seen as part of a potential rule of stability, describ-\ning the conditions under which new mammals can come into \nexistence; as it turns out, the factors which govern fertility \nalso have an important influence on the subsequent develop-\nment of the organism, its health , intelligence, and longevit y--\nthe way in which its very structure comes into being. \nRules of stability , with greater generality than the basic \nlaws of physics and chemistry, might be discovered which \nspecify the nature of the substance which is likely to exist in \nvarious situations . At present, chemical engineers have some \nfragmentary knowledge of The attitude of reduc-\ntionism has certainly kept many things from being discovered , \neven in chemistry and simple biochemi stry. For example , peo-\nple used to say that, although you can cook a soy bean or a \npiece of meat into its component amino acids, you could nev-\ner cook amino acids into a protein . Sidney Fox did just that, \nsimply by omitting the water in the recipe . The reductioni sts \nthen said that the polymers Fox made would be random , and \nwithout any catalytic (enzyme-like) properties , but in fact \ntheir structure was non-random , and they did have catalytic \nactivity . \nAnother example: Some biochemists thought it was foolish \nto suggest that dilution might obscure important principles of \nenzyme behavior, when cells are dissolved in water in a test-\ntube; but a brighter man down the hall thought about it for a \nwhile, and demonstrated that some of the most famous soluble \ntest-tube enzymes don't react randomly with molecules in \n48 \n\nsolution in the cell, but pass the molecule from enzyme to en-\nzyme in an orga nized way. \nIn these examples , the ignorant opinions were held by most \nchemists through most of the history of protein chemistry, be-\ncause it was required by the reductionist belief that the \"parts\" \nexplain the whole . The belief that Fox's polymers of amino \nacids would be \"random\" and inert derived from the belief that \nforms are generated randomly , through a long history , and \nthat the properties of life are simply the arbitrary result of \nwhat happened to be preserved by the natural selection of the \nenvIronment . \nThe existence of various chemical substances in inter stellar \nspace, or the presence of \"biological\" molecules in petroleum, \nor of subatomic particles in cosmic rays or radioactive miner-\nals, can be understood in terms of various rules of stability. \nPlant material and human substance might best be understood \nin terms of such rules of stability. That would put all sub-\nstances on the same \"ontological level,\" though the more \ncomplex substances would have more specialized require-\nments for existence. \nThe \"requirements for existence ,\" seen in this way, form a \ndirect link between practical matters , such as health and hu-\nman potentiality , and seemingly remote matters, such as \ncosmology. \nTo discover such \"rules of stability\" for complex structures \nrequires that we imaginatively extend the rules or laws that we \nnow recognize . Such an imaginative extention , in searching \nfor adequate hypotheses, can be seen as an expansion of phys-\nics, or as a \"reducing up\" of physics to biology . \nThe insistence that formal deductive reasoning should fonn \nthe link between our present physical ideas, and our \n49 \n\ndescription of biology , is what forces the reductionists to as-\nsert that our existence is the result of random mutations plus \nnatural selection. My preference for the use of imagination to \nextend physical ideas, rather than logical deduction to \"apply\" \nthose ideas, comes simply from my feeling that we don't yet \nknow everything , and that in searching for new knowledge we \nshould avoid routes that lead us to believe nothing is there \neven before we have looked . \nNOTES: \nIn directing our attention toward \"rules of stability ,\" I think \nthe following are some of the processes and principles we \nshould consider : \nSystems in which energy (guiding or driving energy) is add-\ned and given off at every point, systems in which no part is in \nequilibrium. This is how the world is, but it is usually omitted \nfrom \"scientific\" descriptions, because of its complexity . \nAsymmetry as a general aspect of interaction. \nHysteresi s, or system memory . This is one aspect of the \nreality of time. \nLong range order. This simple idea is often negle cted. It is \nimplicit in hysteresis. \nOscillating reactions , as a paradigm for various physical \nprocesses , in which energy differences create structure in both \nspace and time. \nThe processes of resonance as they contribute to stability \nof structures , and as involved in long-range order, hysteresis, \noscillating reactions , asymmetry , etc. \nAll stability is metastability . \n50 \n\nOne of my professors, Francis Reithet , pointed out the fun-\ndamental importance of Le Chatelier's principle for biochemis-\ntry. Another professor, Sidney Bernhard , fundamentally \nchanged and expanded our understanding of biochemistry by \nshowing that glycolytic enzymes operate in a tightly organized \nsystem. Human health and the health of the planet are dete-\nriorating in spite of the grandiose claims of the reductionists . \nSatisfactory solutions to complex problems will be possible \nonly if we directly confront the complexity. Vemadsky con-\ncretized Le Chatelier's equilibrium principle in relation to bio-\ngeochemistry , and similar methods can probably be applied to \nmany other complex systems. The number of elements and \nthe organizational diversity of elements in the system will have \nto be taken into account in concretizing and applying the \nideas. \nSI \n\nCHAPTER 6 \nTHE EX-RAINFORESTS OF THE PACIFIC \nNORTHWEST \nIn a recent television piece, Stub Stewart, one of our local \ntimber barons, said that when he looks at an ancient forest he \nsees money ; an average fir tree represents more than $2000, \nhe said. (In Ernst Schachtel's analysis of perception types, \nthis is the lowest, undeveloped or degraded type of percep-\ntion, based on self-centered utility, rather than on grasping the \nactual nature of the thing.) Considering that this un-intelligent \nsort of perception is typical of people who have power , I want \nto point out some of the neglected money related effects of \nmature forests of giant trees. \nThese forests , which the elderly timber baron described as \nrest homes which should be removed and replaced with kin-\ndergartenly tree farms , are often described as being biological-\nly static systems which , for example, make no contribution \ntoward absorbing the carbon dioxide produced by industry . \n(The people who use this argument would have a point, as far \nas the carbon dioxide question goes , if they proposed to plant \nnew forests in shopping centers and other places that don't \nhave trees now. But replacing a big forest by a little forest \nadds carbon dioxide to the environment. 1 don't consider the \n\"greenhouse effect\" to be a problem, but I mention it as an ex-\nample of how even their own arguments weigh against their \nintentions .) \nThe fact that I think is crucial for the world's future is that \nrainforests energetically are comparable to volcanos,( I) \n52 \n\nexcept that their energy is primarily biological, and that their \neffects contribute massively to the stability of the biosphere. \nAlthough net growth per year (in the sense of added biomass) \nis greater in a tree farm, the internal flow of energy is greater \nin an ancient forest than anywhere else on earth, and it is this \nhigh rate of \"metabolism\" which gives the great forests their \npowerful influence on the rest of the world . Bioenergetically, \nthey can be compared to the brain of an animal: intense, sta-\nble, and essential to the existence of the whole.(2,3) \nIf we imagine an ideal green slime resting on an ideal \nbrown goo (in some future time), we could suppose that the \nsun's energy was being absorbed and used in photosynthesis \nwith some efficiency at any moment. The difference between \nthis simple system and the rainforest has to do with the com-\nplexity of fife's interaction with the environment: the great age \nof the forest reveals the stability of its integration with the \nworld's weather system . \nMetabolic processes occurring at night influence daytime \nprocesses; winter events influence summer events; soil events \ninfluence air events . Time is bound into the system. The flow \nof energy is dominated by nearly horizontal switchbacks, rath-\ner than by uncontrolled vertical surges . Space is bound into \nthe system, for example by the mysteriously powerful pump-\ning systems involved in transpiration . (The secretion of \ndroplets at the ends of leaf-veins under certain conditions \nshows that osmosis and evaporation are not adequate to ex-\nplain the movement of the attitude of our science es-\ntablishment to this fundamental problem offers great \nopportunities for sociological investigation .) \nA century ago, Darwin showed that the folding movements \nof many plants at sunset have the function of preventing ra-\ndiant heat loss; that is, the leaves arrange themselves so that \n53 \n\nthey radiate their metabolically derived energy toward other \nleaves , rather than toward the dark, energy-absorbing sky. He \nshowed that the angle of the leaf at night could make the dif-\nference between life and death . \nWater is a very good absorber of heat (infrared radiation). \nFor example, a spectrum of the energy radiated from a per-\nson's hand reveals a deviation from the expected curve, as a \nresult of infrared absorption by water. The mass of water in-\nside a tree is therefore metabolically relevant, even though \nmost of the metabolism of a tree is near its surface . The \nheight and density of the forest will also affect its thermal and \nmetabolic stability . In humans, about 75% of our metabolic \nenergy is lost as radiant heat. In a cold environment , the ener-\ngy lost as radiant heat is important to any organism . The ra-\ndiant interaction of organisms in a rainforest is immense. It is \nanother factor which distinguishes forests from tree fanns. \nThe Food and Agriculture Organization of the U.N. defines \nforests as \"lands bearing vegetative associations dominated by \ntrees of any size, exploited or not, capable of producing wood \nor of exerting an influence on the local climate or on the water \nregime .\" Everyone who listens to weather reports on televi-\nsion and radio should be aware that the forests, and their de-\nstruction , are affecting their weather. Fanners and the owners \nof ski resorts are aware that drouths affect their income , so \nthey shouldn't have too much trouble grasping the implica-\ntions of deforestation . The loggers talk about the importance \nof their jobs, relative to the importance of the environment; \ndrouths and floods, caused by deforestation , have obvious \neconomic consequences, which must be taken into account. \nIvory dealers say \"but I have to make a living\" even if ele-\nphants become extinct. Drift-net fishennen say \"I have to \nmake a living,\" even if entire populations of porpoises are \n54 \n\ndestroyed , Every region and industry seems to have people \nwho feel that their present jobs are more important than the \nvery ecosystem which is the foundation for their present \"har-\nvesting\" job. This pathological sort of perception resembles \nthe type of autism in which the victim devours part of his own \nbody, unless restrained . Just as Gorbachev said that the sur-\nvival of humanity transcends the class struggle , protection of \nthe environment must transcend the witless arguments of \nthose who insist that they must be allowed to consume these \nresources now, before it's too late for them to enjoy this one \nlast harvest. \nIn Alaska, gigantic Sitka spruce are being turned into wood \npulp to make into rayon shirts. In Oregon and Washington , \nmany ancient trees are made into pulp for newsprint and \nwrapping paper. Redwood is so resistant to decay that \nhouses built from it shou ld last forever , but most of the \nhouses built from the extinct redwood forests have been bull-\ndozed into splinters and hauled to landfills, as the cities grow \nand change , One California company which had been slowly \ncutting its large timber holdings was recently forced to begin \ncutting trees as fast as possible , because of debt created when \nit was acquired by junk-bond billionaire Hurwitz . The for-\ntunes created by this destruction of wealth are stimulating the \nconcentration of wealth and power , but do not seem to be \nleading to the production of new wealth . The condition of \ntowns and regions which have depended on the timber indus-\ntry speaks eloquent ly of what the timber baron's \"wealth\" \namounts to in human terms. \nThe alternative sources of cellu lose for rayon and paper are \nnumerous. Besides cotton , linen, and hemp, various types of \npaper have been made from straw , esparto grass , jute, sisal, \ncane , and bamboo . The use of wood for building house s is \nlargely a cultural matter, since there are many better and \n55 \n\nchcaper materials. For example, J lived in a two-storey adobe \nhouse built around 1450 , which had survived several major \nearthquakes without damage. It had 12 ft. ceilings, and didn't \nneed air conditioning even in hot weather . When the drainage \nis good, these mud buildings are not damaged even by torren-\ntial rains. My father built an adobe house in the 1930's which \nis still in good condition . Even the shingles were made of \nclay, mixed with an emulsion of tar for water-proofing . These \nhouses can never be destroyed by fire, and they don't have the \ntoxic fumes often produced by chemically treated wood \nproducts . \nEven northern forests can provide rich harvests of products \nother than wood, without causing ecological damage . Resins , \ndrug s, hormones , and food materials are produced in abun-\ndance , though the moronic practices of clear-cutting and \nslash-burning have eliminated some of the potential forest \ncrops . According to the calculations of biologist Curt Mitch-\nell, the forests of Oregon can produce at least $4,000 worth \nof materials per acre per year other than trees. \nAbout 96% of the redwoods which used to extend from \nSan Francisco to southern Oregon are gone. Only about 2 \nsquare miles of redwoods remain in Oregon , and many of \nthese are scheduled to be sold and logged this year. The red-\nwoods illustrate some of the interactions between trees and \nclimate. The coast redwood (Sequoia sempervirens) can \nreach a height of more than 350 feet. It requires areas which \nprovide summer fog as well as winter rain. In some areas, it is \nestimated that 50% of the annual precipitation is in the form \nof fog caught on their leaves, so it is obvious that their great \nheight makes a major contribution to the water-economy of \nthe region . \n56 \n\nThe Sierra redwood (Sequoiadendron giganteum) grows at \na higher elevation, on the western slopes of the Sierra Nevada \nMountains of California . Their massive trunks apparently rep-\nresent an adaptation to the absence of the summer fog--their \nwood is about 50% water, so the thick trunks function as \nstorage tanks to sustain activity through the dry seasons \n(Figure 1;;.) ______________ ....., \n\u2022\u2022 , \nLeft, righl, .Sierra Redwood. \nDisregarding the soil's water-retaining capacity in an an-\ncient forest , just the storage of water in the trees themselves \ncan amount to thousands of tons per such quantities of \nwater have significance even geologically . According to AY. \nLapo . in Traces of Bygone \"the content of water \nin the tissues of living organisms is approximately five times \ngreater than in all the rivers of the globe .\" \"I-Ialfthe water ... \nin the roots of plants is renewed in several minutes . As a re-\nsult, the water cycle on land is determined almost exclusively \nby the transpiration of the plants .\" \nThe humidity of the air passing through a tree farm is much \nlower than that passing through a real forest . Locally , this de-\ntermines what can live and thrive . On a larger scale , differ-\nences in temperature and humidity affect wind flow . I think \n57 \n\nthis is why the humid ocean winds are increasingly being di-\nverted toward British Columbia, and away from Oregon and \nCalifornia, where they used to provide dependable winter pre-\ncipitation. (Since ocean currents are guided by winds, the dis-\nruption of weather patterns is likely to become \nself-stimulating . ) \n2500 years ago, Theophrastu s recorded cases in which a \nregion's climate was permanently altered by deforestation and \nswamp draining , with the result that rich agricultural produc-\ntivity was lost forever . The difference between the small scale \nof the ancient Greek ecological damage and the present scale \nof defore station suggests the scale of the damage which is be-\ning done to modem agriculture . \nDeforestation of the Pacific Coast is moving from south to \nnorth . The areas that are immediately \"downwind\" from the \ntreeless coast are the places that will feel the earliest effects \non their weather. California and Nevada are now facing their \nfourth consecutive drouth , and have just experienced the \ndriest December in history . Farmers have been warned to ex-\npect a 20% cut in water deliveries this summer. The decreased \nproduction of food is likely to cost the region several billion \ndollars this year, and there is no reason to believe that the old \nweather patterns will return , without the forests . \nSince deforestation causes the soil to be washed away , \nmuddy water causes massive destruction of fish. Reservoirs \nbehind dams have filled rapidly with mud, shrinking their stor-\nage capacity, and their ability to control floods and to provide \nwater for irrigation . \nIn the 1920's, an economist, S.G. Strumilin, showed that \nmoney spent on education gave a 27-fold return; more recent-\nly, J.K. Galbraith said that the return is about 100 times the \ninvestment. and is greater than the return on investments in \n58 \n\nrailroads , dams , or factories . Buckminster Fuller talked about \ndoing more with less; this is the meaning of applying science \nto economic production maximizing effects while minimizing \nthe means. \nTo have an economy that develops qualitatively , rather than \nquantitatively , means that the extractive industries will de-\ncrease, while the complexity , intensity and appropriateness of \nuse of the materials will increase steadily . Investment in hu-\nmanity means increasing productivity and enjoyment , by im-\nproving human health, intelligence , skill and knowledge. \nWhile the economists showed the value of investing in \ntraditional schools, the returns would be greater , and the costs \nsmaller , if we began to apply thought and knowledge to un-\nderstanding the learning process better. The useful part of \neducation is that which stimulates the imagination. The useful \npart of knowledge is that which expands human possibilities. \nIf the biosphere continues to be degraded, human possibilities \nwill be stunted , at best. \nI think we have to start seeing jobs in resource-extraction \nas an index of poverty , to the extent that they degrade the bio-\nsphere . A definition of wealth must consider both quantity and \nquality of production. Environmentalists and ecologists have \nto do some intelligent thinking about economics , so they can \nhelp the people in power to think more realistically . \n\u2022 \nThe greatest fraud now current in the mass media is the \nidea that we must choose between the health of our environ-\nment and the vitality of the economy or our standard ofliving . \nJust as competition from Japan and Germany is causing big \ncorporations to move quickly to get out of the weapons busi-\nness and to reinvest in the consumer economy , the present \nanti-environmental direction of our economy depends on rela-\ntively few decisions made by big corporations (and supported \n59 \n\nby their agents in government). Since they can get away with \nmaking stupid decisions . they make them. \nThe stylish science-talk about global warming doesn't really \ntake very much into account, beyond a few cultural stereo-\ntypes . The most important context to take into account is the \nimportance of moving toward an economy which develops \nqualitatively rather than quantitatively. There is no foresee-\nable limit to the qualitative development of the economy. If \nwe can shift from an extractive-degradative economy to one \nwhich develops by investing in education, science . culture . \nand human well-being, we will have a future in which to dis-\ncover whether the biosphere-noosphere has any limits to its \ndevelopmental potential . \nNOTES: \nI. In the sense that the heat of volcanos can \"drive\" \nchanges in ocean currents: winds , \"driven\" by forests , are the \nother major influence on the patterns of ocean currents , and \nthus on the distribution of solar energy around the planet. \n2. Following the brain analogy, a system of tree fanns is \nlike the anencephalic it can grow if fed, but can nev-\ner contribute to the world's advance . \n3. Rainforests illustrate the first and second principles of \nthat biogenic migration of chemical elements \ntends to the maximum, and that the development of stable lifc-\nforms serves this tendency. \n\". \n60 \n\nPART 2: \nENERGY PROBLEMS \n\"Energy is the only life, alld is from the Body. ... \nEnergy is eternal delight. \" \nw. Blake \nAn emphasis on energy is rapidly gaining acceptance in \nbiology, if not in medi cine. Just twenty years ago, many \nbiologists denied that Atkinson's idea of the cellular \"energy \ncharge\" had meaning or relevance for living systems, but the \nidea is now widely recognized, and most biolo gists would \nprobably admit that it has at least some relevance for some sit-\nuations . In this section, I discuss some of the practical conse-\nquence s and application s of the idea that we should focus on \nthe role of energy in biological adaptation. Energy , in an im-\nportant sense, is prior to information , especially in the context \nof biology . \n61 \n\nCHAPTER 7 \nA UNIFYING PRINCIPLE \nFor many cells, the threshold for excitation (and response) \nis governed by the energy charge of the cell. This is clearest in \nthe case of brain cells: seizures can be produced by either hy-\npoxia or hypoglycemia , and in the low energy state of hypo -\nthyroidism , deep normal sleep is seldom possible . Muscle \ncells. secretory cells, and immune cells behave similarly . I be-\nlieve we are at the beginning of a therapeutic revolution based \non this, and other closely related principles . It is easiest to un-\nderstand these relationships if we use a graph, with \"energy \ncharge\" on one axis, and with \"intensity of stimulation\" on the \nother . This graph represents the relationship of an organism \nto its environment, or of a cell or tissue to its (internal) envi-\nronment (Figure 1). \n62 B high energy, \nstate of readiness A \ntherapeutic \nregion of spasm, cell division e ..... ___ ....... , \ncoma, protective inhibition \nc \n\nThe regions labeled with A, B, C, and D can be thought of, \nfor the sake of illustration , as the following functional states \nof the organism : \nA --Adventure \nB --A baby sleeping \nC --Cautious conserving of energy \nD --Stressed to death. \nThe ideal therapy is one which restores the cellular energy \nthoroughly, so the organism regains its full capacity to adapt , \nand seeks appropriate stimulation. Good nutrition and sleep \nare sufficient therapy for a healthy young organism . For old \nor sick organisms , artificial sleep and special nutrition can be \nusefuL The use of sedatives to produce an \"artificial coma\" is \nan old technique which is now being used more often to treat \ndrowning victims and other brain-injured patients. \nSedation or anesthesia decreases the use of energy . making \nit possible to recover a store of energy , and the efficient . re-\nlaxed state of readiness that goes with an adequate reserve of \nenergy . Thyroid and other hormones can increase the rate at \nwhich energy is produced, but some of the steroid hormones \nalso have the sedative and anesthetic actions which provide \nthe other aspect of recovery : while production of energy in-\ncreases, wasteful use decreases . \nThe idea of the \"therapeutic vector\" means that any treat-\nment should combine preservation of energy with restoration \nof energy production . Shock , which is a state of suppressed \nenergy production, can be used to illustrate this approach. \nSeveral times in the last 50 years great advances were made \nin understanding the nature of shock, but they tend to be ig-\nnored or forgotten . I think this is because our medical culture \n63 \n\nhas lacked a unifying principle which would integrate physi-\nology and biochemistry into a functional whole. \nUnder extreme conditions, the state of shock can develop . \nBlood circulation becomes so inefficient that the organism of-\nten dies from the shock state itself. It has been traditional to \nadminister adrenalin to shock patients to raise their blood \npressure, but adrenalin is often already present at a high level , \nand more can simply exacerbate the problem. This is because \nthe arterioles contract in shock . and under the influence of \nadrenalin (and cortisone) . \nEarly in Hans Selye's study of the steroids, he noticed that \nestrogen treatment causes the same changes which occur in \nthe shock phase of the stress reaction . Many years later I not-\niced that oxygen deprivation causes the same biochemical \nchanges that occur with an estrogen excess , and with old age, \nand I proposed that estrogen acts by interfering with the use \nof oxygen. In the mid-l 940s a group of researchers , believing \nthat energy depletion was the basic cause of shock, demon-\nstrated that intravenous injection of the \"energy molecule\" \nATP caused animals to recover which otherwise would have \ndied from shock. \nATP isn't the sort of chemical that is likely to interest the \nphannaceutical industry, and although other people have dem-\nonstrated that it has therapeutic value in a variety of diseases, \nthe dominant attitude has been to scoff that it is \"only a vaso-\ndilator .\" But the tone of smooth muscle in blood vessels is \nlargely a function of the energy charge of the muscle cell. \nThus . intravenous glucose can restore the balance between the \nmuscle tone of arteries and veins . and it has been used many \ntimes to bring patients out of shock. If a physician is focus-\nsing on his patient's extremely low blood pressure , a vasodila-\ntor is the last thing he would consider. and salt water is often \n64 \n\npreferred in place of glucose, but restoring energy should be \nthe basic aim. \nKeeping in mind the relationships between excitation and \ninhibition discussed above (Figure I), we can visualize how \nthe energy supply to vascular smooth muscle normally func-\ntions as part of a self-regulating system, and how a failure of \nenergy can produce the self-defeating shock state (Figure 2). \n65 f,/,ud. optln \n,nuiol\" \neapUlifY bed. IllIutl calli \nw,1I clYien'ted and ncurllhad \nseml-\nCOnlllcled ulna halp \n10 malnlin blood prcnUfl In \nclpUiarle, ,nd teturn blO(ld \n,f!Ic1enlly 10 Iho hUll \n\u2022 cunstrictcd ;lrtcr io!c$ \nIngb to flow \n,-' IIUUC \n1 ... ,11 doycloP c<.icm;) and compron \no'Yllcn dellciant rcduced \nHal O hbcf;)leS Iton. lIuue \nIn)uty and Inflammation \nlimp . b;lUooning veir \npooling blood. delayed \nto Ille 1\\\".111 \n\nIn the blood vessels at the left side of Figure 2, the arte\u00b7 \nrioles are in the high energy resting state, while the veins are \nin the middle . active zone . On the right, the arterioles are re\u00b7 \nceiving \"depleted\" blood , lacking oxygen or sugar for exam\u00b7 \npie, and so are now in the middle energy , active state. Passing \nthrough the capillaries , most of the blood's remaining oxygen \nand nutrient s are extracted by the tissue cells, leavin g only \nminimal energy supplies for the veins, which are therefore in \nthe lowest energy state , \"protective inhibition,\" in which there \nis no muscle tone. \nBesides helping to explain the shock state itself, this rela\u00b7 \ntionship of vascular tone to cellular energy helps to explain \nthe circulatory distre ss which is associated with fatigue , old \nage, hypothyroidism , and estrogen excess. \nBacterial endotoxin causes some of the same effects as \nadrenalin. When stress reduces circulation to the bowel , caus-\ning injury to the barrier function of the intestinal cells, endo-\ntoxin can enter the blood , contributing to a shock state, with \nfurther impairment of circulation . In old age and in \"winter \nsickness ,\" something like a chronic borderline state of shock \ncan develop. Intra venous glucose has been used successfully \nto bring patients out of septic shock . The tonic effect s of in\u00b7 \ntravenous local anesthetics are, I think , largely the result of \ntheir ability to open the arterioles. Magne sium and vitamin A \nalso have some ability to normalize blood vessel tone, and can \nhelp to maintain the barrier function of the bowel . \nWhether a tissue is hypera ctive or underactive, it is possible \nthat a systemic energy deficit is responsible. Symptomatic re-\nlief is rational ifit is consistent with restoration of energy . \nGlucose is often thought of as the most direct source of en-\nergy, but other substances are apparently used even more \neasily. \"Ketones\" (for example , alpha-keto\u00b7 or hydroxy-\n66 \n\nbutyrate) are used more easily . at least in some circumstances. \nShort and medium chain fatty acids are used more easily than \nglucose, and it is apparently this fact which accounts for their \npresence in milk. Their effects on cells--induction of hormone \nreceptors and other specialized cell functions . suppression of \nstress-induced enzymes, stimulation of energy production in \nfat cells, inhibition of cancer cell division and viral expression , \netc. --are what we would expect of an ideal energy source. \nUnfortunately . commercial milk animals are fed large amounts \nof grain, the oils of which act in opposition to the short and \nmedium chain fats. Some tropical fruits and coconut oil pro-\nvide some of these efficient and protective energy sources . \nAs little as one or two teaspoonfuls of coconut oil per day ap-\npears to have a strong protective effect against obesity and \ncancer. \n67 \n\nCHAPTERS \nSTEROIDS \nThis type of molecule might be the most common carbon \ncompound in the universe . It is made by single celled organ-\nisms, by plants , and by animals, and has many kinds of func-\ntion. The steroid hormones are involved in all aspects of \nanimal physiology, and overlap with control functions of the \nnervous system , peptide hormones, metabolites, prostaglan-\ndins, cyclic nucleotides, etc. Sometimes people speak of \"ste-\nroids\" when they mean glucocorticoids such as cortisol or a \nsynthetic like dexamethasone , or, among athletes , when they \nmean anabolic steroids or synthetic androgens ; and so it is \ncommon to associate \"steroids\" with harmful side effects . All \nfoods contain steroids and sterols (a major type, containing an \nalcohol group and a side-chain) some of which are beneficial \nand some of which are toxic or allergenic. \nIn animals, cholesterol is the basic sterol molecule, which is \nmassively converted into other substances, including the ste-\nroid hormones . Thyroid honnone and vitamin A are required \nfor this conversion. The first step occurs in the energy-\nproducing mitochondrion, where cholesterol loses its side-\nchain and is slightly oxidized . producing pregnenolone. Being \nless fat soluble than cholesterol, pregnenolone leaves the mi-\ntochondrion , so it can't inhibit its own synthesis. Rather, it \nseems to stimulate its own synthesis, though this isn't as clear-\nly established as in the case of progesterone . \nDepending on the tissue, pregnenolone will be converted by \nenzymes in the cytoplasm into either progesterone or DHEA \n68 \n\n(dehydroepiandrosterone) . The fact that progesterone (and \nprobably pregnenolone) stimulates its own synthesis means \nthat takin g it does not suppress the body's ability to synthesize \nit, as happens with cortisol. Sometimes, one dose or a few \ndoses can restore the body's ability to produce enough of its \nown. \nProgesterone also allows the thyroid gland to secrete its \nhormones , especially when the thyroid function has been in-\nhibited by estrogen . Since the thyroid hormone is needed to \nproduce progesterone, a supplement of either tends to \nnormalize both thyroid and progesterone production. \nProgesterone and DHEA are the precursors for the other \nmore specialized steroid hormones , including cortisol , aldos-\nterone (sodium-retaining hormone) , estrogen , and testoster-\none. The formation of these other hormones is tightly \nregulated , so that taking the precursor will correct a deficien-\ncy of a specialized hormone , but will not create an excess . At \nleast in the case of progesterone , an excess tends to balance \nor neutralize an excess of the specialized hormone , so it has \nbeen described as having anti-androgenic , anti-estrogen , anti-\naldosterone , and anti-cortisol functions . \nMany steroids have a protective (\"catatoxic\") action \nagainst a wide variety of poisons. Some of the quick effects \n(e.g., within 10 minutes) of progesterone and pregnenolone \nprobably represent a catatoxic action, as well as a neutralizing \nor balancing of excessive estrogen or cortisol. Improved me-\ntabolic efficiency, sparing oxygen and glucose , will have a \nquick effect in reducing edema . \nDuring pregnancy, very large amounts of progesterone are \nmade. It protects and stabilizes practically aU functions of \nboth the mother and the fetus . Progesterone , glucose and the \nthyroid honnones powerfully influence the brain development \n69 \n\nand intelligence of the baby , probably by influencing both the \nnumber and the size of brain cells, and the quality of their \nfunctioning . \nPart of progesterone's protective effect is a result of its \nquieting effect on cells. For example , it tends to prevent sei-\nzure activity in brain cells. During childbirth , its nonnal func-\ntion is to act as an anesthetic. When the level of estrogen is \ntoo high, progesterone can't achieve this effect. In a non-\npregnant person, it is important to determine the minimum ef-\nfective dose by taking only a few drops at a time, and repeat-\ning this small dose about every 20 minutes until symptoms \nhave been controlled. Otherwise , serious \"drunkenness\" can \nhe produced, with loss of coordination , and even \n\u2022 unconSCiousness. \nThe only solvent for progesterone which isn't toxic and \nwhich will dissolve an effective quantity. is vitamin E. In this \nform , it can be absorbed through the skin or other membranes, \nor can be taken orally . Taken orally , it is absorbed as chylo-\nmicrons, going into the general circulation (as vitamin E \ndoes), instead of to the liver where it would be prepared for \nexcretion. In this form, therefore , it is fully and quickly avail-\nable to all tissues. It is approximately 20 times more powerful \nin its action than other preparations , so it is important to use it \nin physiological quantities , rather than in the huge doses com-\nmonly given rectally or by injection. Ten or 20 mg. is often an \neffective dose, though people with low thyroid or high estro-\ngen sometimes use 50 to 100 mg. per day. In the customary \n10% solution . one drop contains about 3 mg. progesterone, \nand 1 mi. (114 tsp.) contains 100 mg. The first dose should \nnever be more than 15 mg. \nPregnenolone, taken orally, does nothing noticeable to a \nhealthy animal or person, but if the stress-related hormones \n70 \n\narc elevated , they return to normal when pregnenolone is tak-\nen. The brain conta ins much more pregnenolone , DHEA , and \nprogesterone than do other organs or the blood, and these \nlevels decrea se progressively with age. Older people are more \nlikely to feel an effect from pregnenolone , than are young \npeople . A tenth of a gram is a reasonable first dose , though \nsome people seem to need as much as I gram per day. \n71 \n\nCHAPTER 9 \nTHYROID \nMeasuring the amount of thyroid hormone in the blood isn't \na good way to evaluate adequacy of thyroid function , since \nthe response of tissues to the honnone can be suppressed (for \nexample, by unsaturated fats). \nIn the 1930's accurate diagnosis was made by evaluating a \nvariety of indications, including basal oxygen consumption, \nserum cholesterol level , pulse rate, temperature , carotenemia, \nbowel function , and quality of hair and skin. A good estimate \ncan be made using only the temperature and pulse rate. \nOral or armpit temperature , in the morning before getting \nout of bed, should be around 98\" F, and it should rise to 98.6\" \nby mid-morning. This is not valid if you sleep under an elec-\ntTic blanket , or if the weather is hot and humid . A person who \nis hypothyroid produces heat at a low rate. but doesn't lose it \nat the normal rate, since there is less sweating, and the skin is \nrelatively cool. Many hypothyroid people compensate with \nhigh adrenalin production (sometimes 40 times higher than \nnormal), and this tends to keep the skin cool, especially on the \nhands , feet, and nose . The high adrenalin is the consequence \nof low blood glucose , so a feeding of carbohydrate , such as a \nglass of orange juice, will sometimes lower the pulse rate mo-\nmentarily . Healthy populations have an average resting pulse \nrate of about 85 per minute . Especially in hot weather it is \nuseful to consider both temperature and pulse rate. \nThe Achilles tendon reflex is another quick way to estimate \nthyroid function . This reflex is used because of the \n72 \n\ninsignificant weight of the toes in relation to contraction of \nthe gastrocnemius muscle . The T (repolarization) wave on \nthe electrocardiogram is a similar indicator of the rate of ener-\ngy production . Thumping the Achilles tendon causes the \nmuscle to contract (unless it is already in a semi-contracted \nstate, which isn't uncommon) . The contraction consumes en-\nergy, and the muscle can't relax until enough energy has been \nproduced to restore the threshold and the readiness for a new \ncontraction. \nIf energy production is efficient , relaxation is faster than the \npassive return motion of the foot, so the foot swings freely \nback to its original position, and over-shoots slightly, causing \na slight swinging action . In hypothyroidism, the foot returns \nas if controlled by a pneumatic door-closer , and settles slowly \nand precisely into its relaxed position , sometimes with a hesi-\ntating, intermittent motion. This slow replenishment of ener-\ngy, and slow relaxation, can cause muscles to cramp easily . \nThe aChing leg muscles of children at the end of an active day \nare often a sign of hypothyroidism, and sometimes the gas-\ntrocnemius muscle becomes very swollen and hypertrophied \nin hypothyroid children. The same process, of slow energy \nregen eration , can cause rhythm disturbance in the heart, and \noften causes insomnia and restless sleep. \nThe thyroid gland secretes about 3 parts of thyroxin to one \npart of triiodothyronine, and this allows the liver to regulate \nthyroid function , by converting more of the T4 to the active T) \nwhen there is an abundance of energy. Glucose is essential \nfor the conversion, so during fasting there is a sharp decrease \nin metabolic rate, and in experiments, 200 or 300 calories of \ncarbohydrates can be added to the diet without causing fat \nstorage. \n73 \n\nWhen the liver is the main cause of hypothyroidism , your \ntemperature (and especially the temperature of your nose , \nhands and feet) will fall when you are hungry, and will rise \nwhen you eat carbohydrates. If a hypothyroid person has a \nvery slow pulse , and feels lethargic, it seems that there is little \nadrenalin ; in this case, a feeding of carbohydrate is likely to in-\ncrease both the pulse rate and the temperature , as the liver is \npermitted to form the active T3 hormone . \nWomen often have above-average thyroxin , with symptoms \nof hypothyroidism. This is apparently because it isn't being \nconverted to the active form (T3)' Before using a Cytomel \n(T3) supplement, it might be possible to solve the problem \nwith diet alone . A piece of fruit or a glass of juice or milk be-\ntween meals, and adequate animal protein (or potato protein) \nin the diet is sometimes enough to allow the liver to produce \nthe honnone. If Cytomel is used , it is efficient to approximate \nthe physiological rate of T 3 formation , by nibbling one (10 or \n25 mcg.) tablet during the day. When a large amount is taken \nat one time, the liver is likely to convert much of it to the in-\nactive reverse-T ) form , in a normal defensive response . \nWomen normally have less active livers than men do. Es-\ntrogen can have a directly toxic effect on the liver, but the \nnormal reason for the difference is probably that temperature \nand thyroid function strongly influence the liver, and are gen-\nerally lower in women than in men. Estrogen inhibits the \nsecretion of hormone by the thyroid gland itself, probably by \ninhibiting the proteolytic enzyme which dissolves the colloid . \nProgesterone has the opposite effect, promoting the release of \nthe honnones ITom the gland . At puberty , in pregnancy , and \nat menopause , the thyroid gland often enlarges , probably as a \nresult of estrogen dominance . \n74 \n\nThyroid function stimu lates the liver to inactivate estrogen \nfor excretion, so estrogen dominance can create a vicious \ncircle, in which excess estrogen (or deficient proge sterone) \nblocks thyroid secretion, causing the liver to allow estrogen to \naccumulate to even higher levels . Progesterone (even one \ndose , in some cases) can break the cycle . Howe ver, if the \ngland is very big, the person can experience a few months of \nhyperthyroidism , as the gland returns to nonnal. It is better to \nallow the enlarged gland to shrink more slowly by using a thy-\nroid supplement. If an enlarged gland does begin to secrete \ntoo much thyroid hormone. it can be controlled with tablets of \npropylthiouracil , or even with raw cabbage or cabbage juice , \nand cysteine-rich meats , including liver. \nBesides fasting, or chronic protein deficiency , the common \ncauses of hypothyroidism are excessive stress or \"aerobic\" \n(i.e., anaerobic) exercise, and diets containing beans , lentils, \nnuts, unsaturated fats (including carotene) , and undercooked \nbroccoli , cauliflower, cabbage, or mustard greens . Many \nhealth conscious people become hypothyroid with a synergis-\ntic program of undercooked vegetables, legume s instead of \nanimal proteins, oils instead of butter, carotene instead of vita-\nmin A, and breathless exercise instead of a stimulating life. \n75 \n\nCHAPTER 10 \nTHE STRESS OF DARKNESS \nCortisol begins to rise as soon as there is darkness, regard-\nless of sleep or waking . Artificial light, and its absence, clear-\nly can determine the time at which cortisol begins to risc. \nFalling glucose is the signal for cortisol to rise. Dreams are \nclosely associated with the chemical-physiological mobiliza-\ntion in response to low blood glucose. (Rising adrenalin \nprobably mediates the cortisol response to decreasing \nglucose.) \nSleep minimizes the increase of cortisol . The inhibitory , \nsleep inducing brain chemicals , GABA and the sleep peptide , \nhave a quieting, anti-stress effect even during waking stress . I \nSleep (and the inhibitory chemicals) reduce energy expendi-\ntures , conserving glucose. \nThe mitochondria, by their ability to use oxygen, are re-\nsponsible for the norma1 efficient use of glucose. \nBeginning at sunset , darkness progressively damages mito-\nchondria structurally and functionally. Mitochondrial damage, \nand the functional impairment of organs such as the heart \nmuscle , reach a peak at dawn .2 \nDuring the day (in organisms which survive the night) , mi-\ntochondrial structure is restored , and organ function im-\nproves , with the peak being reached at sunset. \nIn winter, there is cumulative damage to mitochondria , be-\ncause of too few daylight hours to complete the rebuilding of \n76 \n\nmitochondria .3 During the summer (in organisms that live \nlong enough) the cumulative damage is mostly repaired . \nA residue of altered cell and tissue structure , and of impaired \nenzyme function , remains under natural conditions of day-\nnight cycles . \nIn the dark of polar winter, ordinary artificial light provides \nsome protection during the 16 hours when it is used , but dur-\ning the dark hours when lights are off. healthy young people \nshow the darkness-related signs tha
