ocorticoid hormones . While estrogen is still sold for \n\"estrogen replacement therapy\" of menopausal symptoms, the \ntypical symptoms of menopause (such as osteoporosis and hot \nflushes) can be produced by cortisol, and it is clear that these \nsymptoms coincide with loss of the protective steroids such as \nprogesterone, and not with a deficiency of estrogen . \nThe skeletal changes (shrinkage, curving of the back , mov-\ning forward of the lower jaw) which are so characteristic of \nold age in humans, also occur in other animals in aging and \nunder the influence of the stress hormones . Since the protec-\ntive hormones depend on the ability of mitochondria to con-\nvert cholesterol into pregnenolone, it is clear that damage to \nmitochondria will affect our supply of protective hormones at \nthe same time that our energy supply is failing, forcing us to \nshift to the atrophy-producing stress hormones, including cor-\ntisol. Simple factors which protect the mitochondria are \nknown to have profound therapeutic effects. At a certain \npoint, I think we will understand mitochondrial protection \nwell enough to prevent and cure the basic pathologies of ag-\ning. The Mayans and Eskimos studied by Crite produced \n25% more biologicaJ energy at rest than people in the U.S. \nand Europe. They are culturally and nutritionally very differ-\nent from each other , but they have enough in common to \nmake them very different metabolically from the Euro-\nAmerican culture . What they have in common is possibly \nsomething as simple as the absence of thyroid-inhibiting sub-\nstances in their diet. \n126 \n\nI think it is likely that our present knowledge of mitochon-\ndrial protection could give the average adult about a 50% in-\ncrease in biological energy . To go beyond that level, it might \nbe necessary to start at an earlier age, to allow body propor-\ntions to develop appropriately . For example , to handle a \ndoubling or tripling of basal metabolic activity , a lung capacity \nof four or five liters would probably be needed . Like people \nwho grow up in the high Andes , lung capacity would develop \nin proportion to need. (Incidentally , such a change occurring \nin most people would add billions of liters of water per day to \nthe the average person vaporizes about a liter per \nday.) \nThe thymus gland is extremely sensitive to stress , and atro-\nphies quickly under the influence of cortisone or the sex ste-\nroids , but it can also regenerate under the influence of thyroid \nand proge sterone (and under some circumstances, probably \nDHEA) or just good nutrition. Chronic atrophy of the thymus \nproduces immunological weakness. Infectiou s diseases , then, \nare not so different from the degenerative diseases, since the \nfailure of biological energy , and the resulting stress response , \ncan be responsible for both classes of sicknes s. Even radi-\nation damage, which seems like a fairly exotic problem in \ncomparison to infections and aging, is ameliorated by things, \nlike thyroxin , which increase energy production (Timchenko \nand Antipenko . \"Conditions for the use of thyroxine as an an-\ntimutagen after total-body x-irradiation ,\" Radiobiologiya \n21(2) , page 204,1981). \nSince the DNA repair proces s is energy dependent, greater \nbiological energy prevents mutations. It used to be a common \nbelief among biologists that the \"wear and tear\" of being alive \nwould cause mutations , as well as other cell damage. Howev-\ner, many Jines of evidence show that stress and ener,gy deple -\ntion are common causes of chromo some damage .' Even free \n127 \n\nradical damage , which is popular as an explanation for aging , \ntends to become worse when energy is deficient6 (fasting or \nemotional stress. e.g.), and not as a result of living itself. \nIdeas of \"original sin,\" \"karma,\" \"bad genes\" or \"wrong \nconsciousness\" are often invoked to \"explain\" suffering and \ndisease . The most offensive example of this that I have heard \nwas when a well known writer and lecturer claimed that peo-\nple who are raped or murdered , even the victims of Ausch-\nwitz, including children, were responsible for their fate, \nthrough some mysterious spiritual defect . Even most of the \nconventional theories of aging and degenerative diseases con-\ntain a strong tendency to blame life itself as being at fault for \nits suffering. \nSzent-Gyorgyi, in discussing some of his experiments with \nheart muscle , said \"function builds structure, which increases \nthe capacity for further function.\" The flow of energy through \nsubstance increases the order in that substance. More life and \nmore energy can solve many of the basic problems of life. \nREFERENCES \nI. J. B. Storer, \"Relation of lifespan to brain weight. body \nweight, and metabolic rate among inbred mouse strains,\" Exp. \nGeronl2, 173-182 , 1967. \n2. E. Jablonska and M. J. Lamb, \"The inheritance of acquired \nepigenetic variation,\" J 7neor. BioI. 13, 69-83 , 1986 . \n3. P. P. Rumyantsev, \"Interrelations of the proliferation and \ndifferentiation processes during cardiac myogenesis and re-\ngeneration,\" Inl. Rev. Cylo/. 51, 187 (I 977} . \n128 \n\n1. O. Oberpriller , et al., \"Nuclear characteristics of cardiac \nmyocytes following the proliferative response to mincing of \nthe myocardium in the adult newt,\" Cell & Tissue Research \n25,619 (1988) . \nW. C. Claycomb and R. L. Moses, \"Growth factors and TPA \nstimulate DNA synthesis and alter the morphology of cul-\ntured terminally differentiated adult rat cardiac muscle cells,\" \nDev. BioI. 127, 257(1988). \n4. L. V. Polezhaev , Loss alld Res/oration of Regenerative Ca-\npacity ill Tissues and Organs of Animals, Harvard Univ . \nPress , 1972. \n5. Barbara McClintock , \"The significance of responses of the \ngenome to challenge,\" Science 226, 792-801 (1984) . \n6. L. Meszaros and A. Nemeth , \"Protection against lipid per-\noxidation by substrate oxidation of mitochondria,\" Acta B;o-\ne-himh :a et Biophys;ca Amdemiae ,)'cienliarum Hungaricae \n17(1-2). 1982 . \nProtective effects of red light: \nE. A. Gorbatenkova, et ai., \"Photoreactivation mechanism of \nhelium-neon laser on superoxide dismutase ,\" Dokl. Akad \nNauk. USSR , pp. 995-999, 1988 . \nA K. Srivastava , et aI., \"Induction of free radicals in seeds by \nhigh intensive flashes and effects on phosphorous metabo-\nlism,\" BioI. Planl. (Prague) 26(2), 88-98, 1984 . \nNOTES: \n* \"The breeding rate is found to vary with the increasing \nscope and degree of care from parents. The decrease in the \nnumber of eggs and young is associated with a higher nervous \n129 \n\norganization expre ssing itself especially in intelligence , and \nhelplessness is made concomitant with intelligence as its nec-\nessary condition .\" P . E. Davidson , p. 68 in The Recapitu-\nlation Theory and Human Infancy, Teachers College , \nColumbia University, 1914. \n\"'* \"Vernalization\" of grains might be thought of as suppres-\nsion of neoteny , or activation of \"restraint genes .\" \n130 \n\nCHAPTER 18 \nTHE TRADITION OF TRUTH \nSeveral years ago I was thinking about the different levels \nof ability among famou s painters of history, and I read about \nthe family origins of some of them; the painters that I consid-\nered to have the best ability turned out to have come from \npoor families , in which skill in a craft was accepted as the way \nto earn a living. The bad--but famous--painters had \"noble\" \norigins , in which there was no tradition of skilled work. Paint-\ners who were \"insiders ,'! familiar with the attitudes of the rich \nwho paid for the picture s, knew what things would flatter , \nwhat thing s were fashionable , and what would contribute to \nprestige . The people from a lower class , however , had to be \nvery skilled at painting jf they were to succeed. \nI think this illustrates something general about truth . A \nperson's vitality is drawn forward by meaninbrful work , that is, \nwe grow to meet the demands of an important opportunity . \nFrans Hals' paintings could only have been done by an alert \nmind, and one which had been alert for a long time learning \nthe skills of drawing and painting . That skill revealed a large \namount of truth . On the other hand, from Rubens we don't \nlearn much except that rich people ate well and dreamed of \ngrandiosity . \nWilliam Morns said, \"It is workmen only and not pedants \nwho can produce real and vigorous art.\" I think something \nsimilar should be said for science . \nWhile some people explore and solve important problems, \nothers do not explore , and even reject solutions to problems \n131 \n\nwhen they are made available by the workers who produced \nthem . \nOne of my recurring objects of thought has been the slow-\nness with which raw knowledge is assimilated . For example, I \nhave been thinking about Broda Barnes's work on the pre-\nvention of heart disease with thyroid extract. He did solve \nmuch of \"the riddle of heart attacks,\" but recent statements by \nthe Heart Association show that the dominant forces in the \nhealth busines s haven't learned anything at all from his work , \nwhich be began 50 years ago. His work is clearly presented , \nnot hard to understand, and it is scientifically so sound that no \none challenges it, at least not on the scientific level. It is ig-\nnored , rejected by people who choose not to be bothered to \nread it. How many people have died from heart disease , since \nhis work first became available? (And how many more from \ncancer , tuberculosis , and other diseases he showed occur \nmainly among hypothyroid people ?) \nI suggest that the resistance to Barnes's discoveries (and to \nnutritional therapies , etc.) has this explanation : that the health \nbusiness is a Rubens-equivalent. There may be a family tradi -\ntion of practicing medicine , but the child experiences family \nstatus long before he can experience the work of healing or \nthe learning of special skills. Rather than an apprenticeship , it \nmore closely resembles inherited nobility. Consider the char-\nacter of most of the people who choose the profession, their \nmotives, the way they are instructed , the meaning of truth in \ntheir lives . \nBut a few individuals within the profession live their lives \nfor a different purpose, or cluster of purposes . They don't \nchoose their problems in the way most likely to draw the fa-\nvor of the powerful. Rather , there seems to be a need to un-\nderstand, to take actions which lead toward the truth . I \n\\32 \n\nsuspect that an \"apprenticeship\" has somehow been served in \nmost of these cases. \nSeen from a distance, it may seem that such people know in \nadvance where the truth is, so they can proceed in the right \ndirection. Deep involvement in the problem, investment of \nsome of your life in the work, reveals that the truth is every-\nwhere, and is clarified and arranged through the technical ac-\ntions of the worker. The production of (or \"discovery\" of) \ntruth is nothing mysterious, as most philosophers and some \nscientists would have us believe. \nIn the Spanish culture in which Picasso grew up, there was \nthe category of \"genius ,\" and Picasso clothed himself with the \nattributes of genius ; he fulfilled his father's expectations, be-\nlieved that he was that, and found a culture willing to believe \nit. \nAt that point , he could do no everything he did was \nthe work of genius--\"look at him, every scratch he makes with \na pen is a stroke of genius . II Criticism becomes impossible . \nThe mystique around medicine is very similar. The public isn't \nqualified to criticize , and members of the profession arc reluc-\ntant to criticize, because the myth must be preserved . \nAll the sciences , the military, and the activities of many \npoliticians (the mystique of anti-communism in particular) \npropagate a way of living which just finds truth irrelevant. \nMention \"truth\" in a roomful of scientists and you will hear a \nroomful of hoots and jeers, as if God had just walked to the \npodium at an atheists' convention . \nBut some people do take truth seriously, and a few try to \nfind the \"secrets\" of people who have had it abundantly . Wil-\nhelm Reich felt it had to do with a right relationship to the \nbody and its energies ; Einstein identified it with one's life. \n133 \n\nRobert Creegan, in lhe Magic of Truth, tries to clarifY its na-\nture, and to reveal where it is in our life. The physiologist \nUkhtomskii was interested in the same problem. what it is that \nallows some people to directly see the important truth . while \nothers are concerned only with self-assertion. Describing one \nkind of clear perception, Ukhtomskii says, \"I learned that it is \ncreated by a great physical effort, a tradition handed down \nfrom others, and an attitude toward the world as toward a be-\nloved , respected companion with whom one is close to the \npoint of intimacy .\" He says \"it is only via culture in the whole \nman, the culture in his deeds (will and love) that a vision can \nbe achieved .... \" Tradition , effort , attitude , and culture--I \nwill be saying more about these later, in connection with \nmeaningful work. \nCreegan tries to say the same thing Ukhtomskii said 40 \nyears earlier ; some of his statements are worth quoting, just \nbecause he is a contemporary American. I'The best way to as-\nsert that a step is possible is, more often than not, just to take \nthat step.\" ''It may be shown that all human effectiveness in-\nvolves a special exhibition of truth.\" \" ... A plenitude of truth \nin action belongs to the fullest , most effective living .\" \"The \nsocial reinforcement of unimaginative living, however, tends \nto restrict and retard the advancement of science itself.\" \"In-\ntellectual achievement is facilitated by exercises directing \nimagination away from obsessive channels.\" Rather than ab-\nstract exercises, Creegan might have considered the beneficial \neffects of meaningful work. \nThe Indo-European civilizations were formed by conquer-\ning many other, older civilizations ahout 3500 years ago; the \nsurvivors in the conquered cultures effectively became slaves, \nuseful workers. Long after the Romans had conquered the \nEtruscans , they returned to the north and conquered newer \nEuropean cultures . The productive cultures kept some of \n134 \n\ntheir roots , because that is where their usefulness came from --\ntheir abilit y to do things well enough to sustain themsel ves \nand also the conquerors . The Roman s busied themselves with \nmilitary proce sses and record-keeping . \nAll of the European civilizations had a similar internal divi-\nsion; at first different languages made the separation most ob-\nvious , but even after a kind of cultural unity had been \nimposed , the separation of productive and governing classes \npersisted. Sometimes the cycle was repeated several times (as \nin England) , but always with the same overall outcome--if \npeople were not highly productive, they were not worth con-\nquering and enslaving . \nKeeping this in mind , we can look at all kinds of cultural \nproducts , and see the results of this social division. In phys-\nics, we can compare the experimental attitude of Michael Fa-\nraday , the blacksmith's son, with the pompous errors of Lord \nKelvin . Tn literature and the other arts, the richne ss of imme-\ndiacy and realism in certain works distinguishes itself from the \nself-assertive fantasies and status obse ssions of other works . \nWilliam Morris pointed out the similarity between the cul-\nture of the Romans and their subjects , and the culture of the \nworkers and capitalists of his time , and he observed that these \ntypes expressed themselve s in their art and science as different \nmental types. The productive people were described as con-\nstructive minds and \"eye\" people, or as \"visionaries and prac-\ntical people ,\" whose work would be characterized by \nsensuous realism . The ruling classe s he described as having \nanalytical minds, concerned with formula s, labels , abstra ctions \nand theories , or formalisms. \nCreegan and Ukhtom skii wrote about the two attitudes--\nfull living vs. status concems--and Morri s observed that there \nare two culture s, sustaining those two attitudes , and showed \nl3S \n\nthe importance of recognizing their products all around us, so \nthat we can learn to evaluate them, according to their origins \nand their purpose s. \nOur intelligence develops as we grow into the world , such \nas it is, and our world includes things that we learn about, and \nthe people that we learn from . As we learn our language, we \nare learning the knowledge , the abilities, of the people who \nuse that language . That is the culture that we learn, and it \nmay contain elements that are true, useful techniques , and \nother elements which stunt us, negate our curiosity, or turn us \nback from the world . \nPhilippe Aries , in Centuries of Childhood, showed that \n\"childhood\" is a modern phenomenon, that children used to be \nthought of as little adults . From an early age they participated \nin the work of the family , and the life of the society . (Some \nrelated ideas are discussed by Jerome Bruner in the New York \nReview of Rooks, Oct. 27, 1983 .) \nIf children are isolated from any intelligent work that the \nparents may perfonn , the world that they learn is one of func-\ntionless entertainment. Any tradition passed down by their \nparents is one of attitude, rather than of ability. If the child is \nallowed to be present when the parents work , the child wants \nto participate , to help, and to the extent that the children can \nparticipate, they are apprentices, and they learn effectiveness, \npersonal power. If they are not apprentices, they still adopt \nthe world of their parents as it is present in their speech, and \nthey may receive a sense of power , but in this case their expe-\nrience is that to belong is enough to he effective , that they \nI!deservel! status. And if they donlt receive this inherited sense \nof status, they may inherit helplessness . \nIf work is removed from the presence of children , how is \nthe enabling truth which is in our culture to he distinguished \n136 \n\nITom the useless aspects of the culture ? If we lack a tradition \nof skilled work , then the point William Morris made becomes \nessential--we have to learn to reject the bad which is present \nin all the products of our culture--Iiterature, painting , science, \nand so on. \nTo illustrate the double nature of our science , I will con-\ntrast two French scientists , de La Mettrie and Descartes . \nThinking of several kinds of biological facts , including the \nintrinsic motility or irritability of the intestine and heart , and \nthe regen eration of the hydra ITom small fragments , Julien de \nla Mettrie propo sed a new kind of physiology , based on the \nidea of organization. He suggested that thought was as natu-\nral for an organ with the structure of the brain , as beating was \nfor the heart. He considered thought to be perfectly compat-\nible with organized matter , and \"to be apparently one of its \nproperties--along with Electricity , Mobility , Impenetrability, \nExtension , and so on. . .. No: there is nothing base about \nMatter, except to those crude eyes which fail to recognize her \nin her most brilliant creations ; and Nature is an Artist of un-\nlimited capacities .\" He said that we should welcome our \nnalural status , \"cherishing life, scarcely understanding how \nfeelings of disgust can taint the heart in this home of delight .\" \n(Compare Ukhtomskii 's statement quoted above .) \nOne of de La Mettrie's physiological observations has been \nverified by recent experiments , nearly 250 years later--he not-\niced that his thoughts were quicker when his pulse was accel-\nerated by a fever. \nAccording to Toulman and Goodfield (The Architecture of \nMatter) , it was de La Mettne's uncompromising materialism \nthat caused his (truthful) physiology of organization to be for-\ngotten by the scientific tradition , while Rene Descartes' double \nreality--mind and matter as separate substances , interacting \n137 \n\nonly in humans , and there only at one point , which he thought \nmight be the pineal gland--allowed him to compromise with \nreligious beliefs . \" ... There had in fact to be a compromise ; \nand the terms of this compromise have deeply influenced the \nsubsequent development of science . Even today , their mark is \nevident in the structure of scientific ideas and institutions. \" \n(Page 165.) \nFor Descartes , science shouldn't mess with either God or \nthe human mind. Theories about nature, including animals , \ncould not refer to mentality. The traditional Christian sense of \ndisgust for the body and matter had its influence on Descartes \n(and on the scientists who still follow his doctrines) , but it was \nexplicitly repudiated by de La Mettrie . \nAbove I have said that involvement in work orients a per-\nson toward the truth , that is, your \"hypotheses\" grow out of \nexperience with the subject matter . Descartes explicitly \nclaimed that it didn't matter how you choose your hypothesis: \n\"Even supposing that I had assumed these principles at ran-\ndom, without having had reason to be convinced of their \nsoundness, there would still be as good reason to suppose \nthem the true causes of all that I have inferred , as in the case \nof a code deciphered by guesswork . II A more perfect example \nof Morris's \"theoretical\" type would be hard to find. I don't \nknow anything about de La Mettrie's childhood , but Des-\ncartes' father was a government official. I could give many \ncontemporary examples, but these people were important in \nthe history of philosophy and science , and they illustrate that \nboth substance and method of science will vary systematicall y \naccording to one's attitude toward the world . \nIf more scientists felt toward the world as La Mettrie and \nUkhtomskii did, there would be not only a different \"science ,\" \nbut a different world . \"Nature is an artist of unlimited \n138 \n\ncapacities ,\" but such art is invisible to those who consider sci-\nence to be a matter of decoding a message written once in \ndead matter. \nTHE FUTURE OF WORK \nSeveral years ago, in the quarterly publication Social \nSciences , I noticed an article by a man whose specialty was \nexploring the future of work ; he projected a future in which a \nperson's desire for growth and exploration is realized in his \nwork . This person's job was to clarifY the changes that must \nbe made in the \"economy\" so that it will serve humanity--the \nworkers and consumers--instead of vice versa . \nPreviously , in Mind and Tissue, I had briefly discussed \nsome Soviet views on labor : That work tends toward percep-\ntion, as machines become available ; politics , work , culture , \nand science interpenetrate; brain function, education . science, \nand work have much in common--an emphasis on purpose \nand goals, deep reorganization , and complex perceptual inter-\naction with the material. P. K. Anokhin and A. A. Ukhtom-\nskii, and their students have created a sound basis for the role \nof goals and future thinking . \nThe attitude toward the future is an important part of how \nwe orient ourselves and what concrete things we do to pre-\npare for the future . A mechanistic view argues that we can't \nintervene to change the future, that it must fundamentally re-\nsemble the past, and that if people just invest in things that \npromise to give them a good profit the future will be nice. \nAnother view sees the future as being composed of choices \nwhich lead to new choices, with new possibilities emerging as \nchoices are put into action . \n139 \n\nIt's important that people start talking about the possible \nchoices we have. If we accept that \"the choice\" is between \nbeing unemployed and having a job, the job we get is not like-\nly to be what we want to do with our lives . And \"status\" isn't \nwhat I'm talking about. Giving maximum meaning to our \nlives should be one of the basic things that we demand of our \nwork. \nI. To start with concrete and familiar thing s, we might first \nwant to discuss what work is, and why-wunder capitalism , and \nalso under fascism, primitive cultures, and socialism . The is-\nsue of specialization could be considere d here . \n2. This might be followed by considering what work could \nbecome , and how . The nature of history, time, and culture \nshould be considered, as well as the projections that are made \nby different groups . \n3. And at some point, I think it is important to consider \nhow work shapes us, how we are our work , and why it de-\nfines what we can be. Cultural, intellectual , and biological in-\nfluence s should be considered. \nThere are some things I want to quote, because they sug-\ngest some of the things that work is, what it does to us, and \nwhat it should be. \nAbout 1790 , William Blake wrote the poem \nwhich begins \"London\" , \n140 \"I wander thro' each charter'd street , \nNear where the charter'd Thames does flow, \nAnd mark in every face I meet \nMarks of weakness, markd of woe . \n. . . the mind-forg'd manacles I hear.\" \n\nAnother poem , \"The Human Abstract ,\" begins \n\"Pity would be no more \nIf we did not make somebody Poor .... \" \nRepeatedly, Blake tried to define the mechanisms of op-\npression and limitation of the human personality. He ob-\nserved that the State chartered corporations , licensed \nthat it used false science, devious moralizing and religion, and \nilliteracy to create a culture of obedient drudgery . Commer-\ncial interests, he pointed out, distorted and degraded human \nlife, art, and science . \n\"Schoolmaster of souls, great opposer of change, \narise'! 0 how could')t tholl deform those beautiful \nproportions OJ life & person; for as the person, so \nis his life proportion'd. \" \n\"lhy self-destroyillg , beast jorm'd Science shall be \nthy eternal lot. \" \nBlake referred to factories as the \"Satanic Mills ,\" whose \ntechnology was invented \n\"To pelplex youth. .. & to bind to labours Of day \n& flight ... that they might file and polish. .. hour \nafter hour, laborious workmanship, Kept ignorant \nof the use that they might spend the days of wisdom \nIn sorrow full drudgery to obtain a scanty pittance \noj bread. In ignorance 10 view a small porlioll & \nthink thaI All. And call it demonstration , blind to \nall the simple rules oj life. \" \nSeveral people in the following century were influenced by \nBlake's attitudes and perceptions, but most of them wanted to \nretreat to a simpler past, rather than (as Blake desired) to ad-\nvance into a more generous future. \n141 \n\n\"And when all Tyranny was CIII off from Ihe face \nof Ihe earlh living flames winged wilh imellect and \nReason, round Ihe Earth they march in order, flame \nby flame. . .. Slarl forth lhe trembling millions into \nflames of mental fire ... \"Why sit I here & give lip \nall my powers 10 indolence ... ? \nThat idea, that people would \"ignite mentally\" when op-\npression disappears , has become a recurring controversy . \n(J.D. Unwin vs. J. Prescott , for example.) In 1961 , James \nHiggins was discussing the historical lethargy of people in \nLatin America, which is usually blamed on the tropical heat or \nan intrinsic character trait of the people. Describing the peo-\nple he had met on previous trips to Cuba, who seemed lazy, \ncareless , and sluggish , he described the change he saw after \nthe revolution : \n\"And Ihen Ihey began 10 build, sing, dance, talk, 10 \ncreate dreams and star! realizillK them Ihe next day, \n10 plan , laugh, enjoy , to suddenly find that once \nthey had knocked down certain artifiCialities, Ihere \nwere 110 longer any reasons whatsoel 1er for nol \nlOVing and helping one another. They broke \nthrough inlo the open and life became possible, thai \nis, full of possibilities, real olles. \" \nUndoubtedly the invasion and blockade subsequently af-\nfected their energies, but for a time it was a remarkable phe-\nnomenon. J.P. Sartre described it as sleep being driven from \nthe island along with the imperialists. \nI think this \"sense of possibility\" is an important subject to \nstudy. Poets have led the way, but science can follow. \nThe \"romantic\" poet, Hugo von Hofinannsthal, said \n142 \"The necessary is always possible. Hi.\\\u00b7{ory \nproceeds in just thaI way, that something hardly \n\ncredible is treated by a few as if it could be \nimmedialely realized. \" \nThere is a sense that the future is open , or at least that it \ncan be opened by our mental work. The musician Keith Jar-\nrett said, \n\"People expect beautiful melodies. But I already \nknow the melodies . So does everybody else. Rather \nthan look for more beautiful melodies, .. \npurpose should be to find blind spots. \" \nOur present lives are usually divided between routine work \nand entertainment . The entertainment is supposed to enliven \nus, to help us recover from the deadening effects of routine \nwork. Some people put great energy and concentration into \ntheir hobbie s, becau se they find the activity intrinsically inter-\nesting. Such intrinsic value and interest is what should be de-\nmanded of our work. But for many people , free time is \nroutinized too. To them , Jarrett's suggestion ' sounds like \nnothing but hard work. This is where the whole person has \nbeen affected by a certain approach to work , and work is seen \nas something to avoid--the idle rich seem to have found the \nonly satisfactory life. \nPeople like Blake , Higgins , and Marx have realized that \nthere are different ways of being , that one is fragmented and \ndiminished , and the other is whole , alive , and growing. When \npeople feel that they are in possession of their own lives , then \nproblems become opportunities . Each problem leads to new \nproblems. The world draws us forward , and we are not de-\nfined by an \"occupation\" or \"profession ,\" but by the work we \nhave achieved , and the problems we have confronted . \n143 \n\nCHAPTER 19 \nTHE EXPANDING EARTH \nIn 1959 I was assigned to teach a geography course that I \nwasnlt prepared for, so I looked around the college 's \n1 DO-year-old library for some ideas. In one old book , I saw \nan argument for an expanding earth , based on several types of \ngeological evidence . including fossilized sand dunes which \nwere supposedly too steep to have been formed under the \npresent gravitational force . Later ) when I looked at a map of \nthe floor of the Atlantic Ocean, it seemed easy to interpret the \nroughly parallel ridges (which weren't known in the mid-19th \ncentury when the expanding-earth/increasing gravity idea had \nbeen proposed) as the traces of past volcanic insertions along \na central crack , which had led to the separation of the Ameri-\ncas from Africa and Europe . Other people have continued to \nargue that the earth might have been much smaller in the dis-\ntant past. \n144 \"Several geolOgists , notably Oakley Shields, have \nshown that not only the Atlantic margins but also \nthose of the Pacific Ocean can be fitted together , with \nAustralia against western South Ameri ca, for example. \nBut if the Pacific Ocean farmed by the division of Aus-\ntralia and South America at the same time that the At-\nlantic formed by the division of Africa and South \nAmerica , all continents must have been drifting away \nfrom each other. Ihis, of course, is impossible unless \nthe Earth, like the universe, has expand ed within the \nlast few hundred million years. Such expansion, in \n\nfact, has been ably argued by the Australian geologist \nS. Warren Carey . ,,/ \nOddly, most steady-state universe theories which balance \nlost matter with newly created matter , tend to imagine the \nnewly created matter as appearing only in stars or in empty \nspace . I think there is something safely abstract and \"acade-\nmic\" about theories which ignore the earth as a possible \nsource of new any heat inside the earth apparently seems \nless threatening if it is merely the cooling embers of a cosmi-\ncally remote fire. \nWhen N. A. Kozyrev theorized that time's asymmetry \nmight itself be a source of stellar energy, he predicted that \nplanets would also have a steady source of internal heat in \nproportion to their mass , and his prediction matched the \nknown heat of the earth, but it also predicted that Jupiter \nwould be almost star-like in its heat emission , and that even \nthe moon would produce some internal heat. He measured \nhot lunar emissions in 1960 , and later space exploration con-\nfirmed several other major predictions of his. I think Kozy-\nrev's work should at least make people recognize that even \nlocal matter is cosmic .2 \nV.L Vemadsky , widely known as a crystallographer and \nbiogeochemist, was able to see the cosmic , philosophical , and \nhuman implications of concrete geological things . Hannes \nAlfven , who argues that observable (i.e., in the laboratory) \nelectrical forces can explain large processes , such as the de-\nvelopment offonn in galaxies, also confronts the conventional \nattitude which prefers to separate earthly science from cosmic \nscience. Mendeleev , in the last century , and a few contempo-\nrary scientists , including the astronomer Thomas Gold , have \nbelieved that petroleum was formed deep in the earth by geo-\nlogical processes . These ideas , in giving a more creative role \n145 \n\nto the depths of the earth , have obvious cosmological \nsignificance . \nFred Hoyle and his colleagues have done some work which \nparallels that of Vemadsky, and which encourages a livelier \nway of thinking about cosmology. They have gathered spec-\ntroscopic evidence that cosmic dust (which makes up a sig-\nnificant part of the mass in the universe) more closely \nresembles bacteria than the other materials or particles which \nhave been suggested (E. coli were used for spectroscopic \ncomparison). \nRather than admit that certain facts are not explainable by \nany present conceptions, many so-called scientists will deny \nthat such observations were made . Others will change the \nrules of reason , by subjectivizing science, resorting to opera-\ntionalism , or to paradoxes such as wave-particle dualism . \nInstead of leading to a science-mysticism , the existence of \nstrange and conflicting observations should stimulate people \nto examine their assumptions , and to think new thoughts, and \nto devise new experiments . \nIn Frederick Soddy 's last book , he suggested that cosmic \nrays might represent atoms which had been newly formed in \ninterstellar space , and he mentioned that the permeation of \nspace by ionized atoms, moving at high speed , would produce \nan evenly distributed microwave radiation . The existence of \nsuch radiation has been used by others to argue for the Big \nBang story about the origin of the universe, so it is interesting \nthat it was first mentioned in connection with a theory of con-\ntinuous creation . \nEarly in his career , Soddy sided with Rutherford in decid-\ning that the energy of radium came from within the atoms , \nand not from the interaction of the atoms with an energetic \n146 \n\nmedium or ether. But the question of the new creation of \nmatter, of interaction s of particles in relatively empty space, \nhas suggested to several physicists that the properties of \n\"empty\" space should be re-examined . \nH. C. Dudley and others argued that a background com-\nposed of energetic neutrinos could explain many known pro-\ncesses as well as, or better than, present theories . Dudle y \nargued , for example, that nuclear fission might be random \nonly on a relatively gross scale, and that there might be micro-\nscopic domains which resonate in certain ways with the neu-\ntrino background . He argued that unsuspected simple \nconditions might be able to induce or \"catalyze\" the reso-\nnance , leading to fission or fusion under \"mild\" or ordinary \nconditions . Unknown to Dudley , an experimental physicist \n(Anderson) had demonstrated non-random nuclear decay in \nradioacti ve carbo n when it was applied in a monomolecular \nlayer to aluminum foil. (By chance, Anderson's and Dudle y's \npapers--one experimental, the other theoretical--were pub-\nlished within a week of each other.) \nSoddy's , Dudley's , and Kozyrev's intuitions about the ways \nin which new ener!,,), and matter appear in the universe try to \ncombine nearly imperceptible phenomena (time , neutrinos , \nbackground radiation) with very important proces ses (stellar \nenergy, nuclear energy, cosmic rays, the creation of matter) . \nCreation is at the heart of existence , they might say, but is too \noften overlooked . \nThe idea of an expanding earth make s the intuition more \nimmediate and concrete. S. W. Carey has surveyed the physi-\ncal processes that might account for the geological facts \nwhich point toward expansion (indicating growth that is prob-\nably increasing exponentially, with a present annuaJ increase \nof about 3 square kilometers of surface area), and he has \n147 \n\nproposed his own variant of physical theory to clarifY his \nintuition . \nBut beyond the geological or cosmological issues , the ex-\npanding earth is a rich metaphor. The nature of star-energy, \nand the origin of life can't be such remote or abstract issues if \nwe begin to sense the earth swelling, under and around us. \nThe nature of being is one boundary of the problem of un-\nderstanding our own existence, and it is a moving boundary . \n\"More, more!\" is not (as Blake understood) a mistaken desire. \nAnother aspect of the problem of understanding has to do \nwith our perception itself. Energized , intentional and per-\nsonal, it is also responsive and public and endlessly flexible . It \nis part of the world, and the same motors that drive other pro-\ncesses must shape it. We might rephrase Le Chatelier's prin-\nciple , in the way V. I. Vernadsky did, to say that systems use \nthe energy that's available, and that our perceptions and social \nunderstandings are supported by energy flowing into the \nwhole system. And again, there is no foreseeable limit to the \nintensity and richness of perception and understanding. The \navailability of appropriate energy--e .g., the right foods and the \nright fields and the right stimuli--would be the only limiting \nfactor. \nThough the \"Dead Matter\" theorists now dominate educa-\ntion, research , and medicine , and control so many other sys-\ntems that the world is objectively in decline (toxins , radiation, \ndeforestation , malnutrition, shrinking brains, extinction of spe-\ncies) , techniques are now available to repair much of the dam-\nage and to start on an upward course. The repair and \nredirection begin within a system of passive constraints-- \"a \nMundane Shell .\"\u00b7 The only thing that can resist the construc-\ntive organizing flow of energy is the absorptive, entropic \n148 \n\nprinciple of disorganization, and as Blake pointed out, there is \na limit to contraction, but no limit to expansion. \nS. W. Carey's image of the earth as an opening bud is a rea-\nsonable metaphor for our present situation: \nNOTE: N \n> - -[,j .. s;-, , , , , \nr,;;;,;;,,;;; ...\u2022 \"'0 \\ \nI \nI \nI , , \n, , , , \n\" , \n*Blake's phrase \"Mundane Shell\" refers to the confining na-\nture of fixed opinions and beliefs in our culture . \nREFERENCES: \nI. P. D. Lowman, Jr., \"Faulting Continental Drift,\" pages \n34-39 , The 1986 . \n2. N. A. Kozyrev, Possibility of Fxperimental Study of the \nPropertie s of Time, JPRS: 45238 , May 2, 1968 , \n149 \n\n150 At length for ript;\" he-im.':l
