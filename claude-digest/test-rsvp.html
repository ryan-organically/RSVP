<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RSVP Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #121010; --surface: #1e1b18; --border: #3a3530;
    --text: #e8e4df; --dim: #8a857e; --accent: #e84040;
    --hover: #252220;
  }
  .light {
    --bg: #faf8f5; --surface: #f0ede8; --border: #d5d0ca;
    --text: #1a1a1a; --dim: #7a756f; --accent: #e84040;
    --hover: #e8e5e0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; transition: background 0.2s, color 0.2s; }
  button { font-family: 'DM Sans', sans-serif; cursor: pointer; -webkit-appearance: none; appearance: none; background: none; border: none; color: inherit; padding: 0; margin: 0; }
  input, textarea { font-family: 'DM Sans', sans-serif; -webkit-appearance: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

  /* Views */
  .view { display: none; }
  .view.active { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }

  /* ── Library ── */
  .lib-header { padding: 36px 20px 0; max-width: 680px; margin: 0 auto; width: 100%; }
  .lib-header h1 { font-family: 'Source Serif 4', Georgia, serif; font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
  .lib-header h1 span { color: var(--accent); }
  .lib-header p { color: var(--dim); font-size: 14px; margin-top: 6px; line-height: 1.5; }
  .tabs { display: flex; gap: 0; margin-top: 20px; border-bottom: 1px solid var(--border); }
  .tab { border-bottom: 2px solid transparent; color: var(--dim); padding: 10px 18px; font-size: 14px; font-weight: 400; transition: all 0.15s; }
  .tab.active { border-bottom-color: var(--accent); color: var(--text); font-weight: 600; }
  .lib-body { padding: 20px; max-width: 680px; margin: 0 auto; width: 100%; flex: 1; }

  .btn-primary { background: var(--accent); color: #fff; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; }
  .btn-outline { border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 18px; font-size: 14px; font-weight: 500; transition: all 0.15s; }

  .book-card { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); width: 100%; text-align: left; transition: background 0.15s; margin-bottom: 8px; -webkit-touch-callout: none; }
  .book-card:active { background: var(--hover); }
  .book-title { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .book-meta { font-size: 12px; color: var(--dim); margin-top: 3px; }

  .search-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 14px; font-size: 14px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--dim); }

  .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--dim); padding: 6px 14px; font-size: 13px; }
  .chip:hover { border-color: var(--accent); color: var(--text); }

  .guten-card { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; }
  .guten-cover { width: 44px; height: 64px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--dim); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

  textarea.paste-area { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 14px; font-size: 14px; resize: vertical; outline: none; }

  /* ── Reader ── */
  .reader-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .reader-bar button { color: var(--dim); font-size: 14px; }
  .reader-title { font-size: 13px; color: var(--dim); max-width: 45%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .word-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; cursor: pointer; min-height: 280px; user-select: none; position: relative; overflow: hidden; }
  .word-display { font-family: 'Source Serif 4', Georgia, serif; letter-spacing: 0.02em; line-height: 1.2; min-height: 1.2em; white-space: nowrap; transform: translateX(var(--orp-offset, 0px)); }
  .word-display .orp { color: var(--accent); font-weight: 700; }
  .word-display .orp-before, .word-display .orp-after { display: inline; }

  .controls { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .progress-bar { width: 100%; height: 6px; background: var(--surface); border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.1s; }
  .progress-info { font-size: 13px; color: var(--dim); }
  .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .ctrl-btn { border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 500; transition: all 0.15s; }
  .ctrl-btn.playing { background: var(--accent); border-color: var(--accent); color: #fff; }
  .wpm-row { display: flex; align-items: center; gap: 10px; }
  .wpm-label { font-size: 14px; color: var(--dim); min-width: 75px; font-weight: 600; }
  input[type=range] { accent-color: var(--accent); width: 180px; }
  .options-row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: center; font-size: 13px; color: var(--dim); }
  .options-row input[type=number] { width: 58px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 2px 6px; font-size: 13px; }
  .hint { font-size: 11px; color: var(--dim); opacity: 0.5; }

  .chapters-toggle { cursor: pointer; font-size: 13px; color: var(--dim); margin-top: 4px; }
  .chapters-list { max-height: 200px; overflow-y: auto; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); margin-top: 8px; width: 100%; max-width: 480px; }
  .chapter-item { padding: 8px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; color: var(--dim); display: flex; align-items: center; gap: 8px; transition: background 0.15s, color 0.15s; position: relative; }
  .chapter-item:hover { background: var(--hover); color: var(--text); }
  .chapter-item:last-child { border-bottom: none; }
  .chapter-item.active { color: var(--accent); font-weight: 600; }
  .chapter-item.bookmarked { color: var(--text); }
  .chapter-icon { flex-shrink: 0; width: 16px; text-align: center; font-size: 11px; opacity: 0.5; }
  .chapter-item.active .chapter-icon { opacity: 1; }
  .chapter-item.bookmarked .chapter-icon { opacity: 1; color: var(--accent); }
  .chapter-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chapter-progress { flex-shrink: 0; font-size: 10px; color: var(--dim); opacity: 0.6; font-weight: 500; }
  .chapter-tooltip { position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 11px; padding: 4px 10px; border-radius: 6px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 20; margin-bottom: 4px; }
  .chapter-item:hover .chapter-tooltip { opacity: 1; }

  .theme-fab { position: fixed; bottom: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); color: var(--dim); border-radius: 50%; width: 40px; height: 40px; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; }

  /* Loading overlay */
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; }
  .loading-overlay p { color: var(--dim); font-size: 15px; }

  .hidden { display: none !important; }

  /* Delete confirm */
  .del-btns { display: flex; gap: 6px; }
  .del-btn { border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
  .del-confirm { background: #c0392b; color: #fff; }
  .del-cancel { background: var(--border); color: var(--text); }
  .del-x { color: var(--dim); font-size: 16px; padding: 4px 8px; opacity: 0.5; }

  /* ── Dev Digest ── */
  .digest-card { padding: 16px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; text-align: left; width: 100%; -webkit-touch-callout: none; transition: background 0.15s; }
  .digest-card:active { background: var(--hover); }
  .digest-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .digest-title { font-weight: 700; font-size: 15px; }
  .digest-time { font-size: 11px; color: var(--dim); }
  .digest-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .digest-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  .tag-critical { background: #e8404020; color: #e84040; border: 1px solid #e8404040; }
  .tag-high { background: #e8840020; color: #e88400; border: 1px solid #e8840040; }
  .tag-done { background: #40b86020; color: #40b860; border: 1px solid #40b86040; }
  .tag-info { background: #4088e820; color: #4088e8; border: 1px solid #4088e840; }
  .tag-decision { background: #a855f720; color: #a855f7; border: 1px solid #a855f740; }
  .digest-summary { font-size: 13px; color: var(--dim); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .digest-block-count { font-size: 12px; color: var(--dim); margin-top: 6px; }

  /* Reader color for digest blocks */
  .word-display.tag-critical .orp { color: #e84040; }
  .word-display.tag-high .orp { color: #e88400; }
  .word-display.tag-done .orp { color: #40b860; }
  .word-display.tag-info .orp { color: #4088e8; }
  .word-display.tag-decision .orp { color: #a855f7; }

  /* Digest reader block indicator */
  .block-indicator { position: absolute; top: 12px; right: 16px; font-size: 11px; font-weight: 600; padding: 0; border: none; background: none; }
  .block-label { position: absolute; bottom: 16px; left: 16px; right: 16px; text-align: center; font-size: 12px; color: var(--dim); font-family: 'DM Sans', sans-serif; opacity: 0.5; background: none; border: none; }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner"></div>
  <p id="loadingMsg">Loading...</p>
</div>

<!-- ════════ LIBRARY VIEW ════════ -->
<div id="libraryView" class="view active">
  <div class="lib-header">
    <h1><span>R</span>SVP Reader</h1>
    <p>Speed read anything. One word at a time, as fast as your brain can handle.</p>
    <div class="tabs">
      <button class="tab active" id="tabMyBooks" onclick="switchTab('mybooks')">My Books</button>
      <button class="tab" id="tabFree" onclick="switchTab('free')">Free Library</button>
      <button class="tab" id="tabDigest" onclick="switchTab('digest')">Dev Digest</button>
    </div>
  </div>
  <div class="lib-body">
    <!-- My Books panel -->
    <div id="panelMyBooks">
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
        <button class="btn-primary" onclick="document.getElementById('fileInput').click()">Upload File (.txt .docx .pdf)</button>
        <input type="file" id="fileInput" accept=".txt,.docx,.pdf" style="display:none" onchange="handleFile(event)">
      </div>
      <details style="margin-bottom:20px">
        <summary style="cursor:pointer;font-size:14px;color:var(--dim);margin-bottom:8px">Paste text directly</summary>
        <textarea id="pasteArea" class="paste-area" rows="5" placeholder="Paste your book text here..."></textarea>
        <button class="btn-primary" style="margin-top:8px;display:none" id="pasteBtn" onclick="importPaste()">Import Text</button>
      </details>
      <div id="bookList"></div>
    </div>
    <!-- Free Library panel -->
    <div id="panelFree" class="hidden">
      <div class="search-row">
        <input class="search-input" id="gutenSearch" placeholder="Search 60,000+ free books..." onkeydown="if(event.key==='Enter')searchGutenberg()">
        <button class="btn-primary" onclick="searchGutenberg()">Search</button>
      </div>
      <div id="gutenSuggestions" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px"></div>
      <div id="gutenResults"></div>
      <div id="gutenEmpty" class="empty-state">
        <div class="empty-icon">🌐</div>
        <p>Search Project Gutenberg's library of 60,000+ free public domain books.</p>
      </div>
    </div>
    <!-- Dev Digest panel -->
    <div id="panelDigest" class="hidden">
      <div id="digestList"></div>
    </div>
  </div>
  <button class="theme-fab" onclick="toggleTheme()" id="themeFab1">☀</button>
</div>
<div id="readerView" class="view">
  <div class="reader-bar">
    <button onclick="goToLibrary()">← Library</button>
    <span class="reader-title" id="readerBookTitle"></span>
    <button class="btn-outline" style="padding:6px 10px;font-size:12px" onclick="toggleTheme()" id="themeFab2">☀</button>
  </div>

  <div class="word-area" id="wordArea">
    <div class="block-indicator hidden" id="blockIndicator"></div>
    <div class="word-display" id="wordDisplay"></div>
    <div class="block-label hidden" id="blockLabel"></div>
  </div>

  <div class="controls">
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-info">
      <span id="wordCount">0 / 0 words</span> · <span id="timeLeft">~0 min left</span>
    </div>
    <div class="btn-row">
      <button class="ctrl-btn" id="skipBack50" title="Back 50">⏪</button>
      <button class="ctrl-btn" id="skipBack10" title="Back 10">◁</button>
      <button class="ctrl-btn" id="playBtn" style="padding:10px 28px">▶ Play</button>
      <button class="ctrl-btn" id="skipFwd10" title="Fwd 10">▷</button>
      <button class="ctrl-btn" id="skipFwd50" title="Fwd 50">⏩</button>
    </div>
    <div class="wpm-row">
      <span class="wpm-label" id="wpmLabel">300 WPM</span>
      <input type="range" min="50" max="1200" step="10" value="300" id="wpmSlider">
    </div>
    <div class="options-row">
      <label style="display:flex;align-items:center;gap:6px">
        Font
        <input type="range" min="28" max="120" value="64" id="fontSlider" style="width:80px">
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="accelCheck" style="accent-color:var(--accent)">
        Accel to
        <input type="number" id="accelTarget" value="600" min="100" max="1500" step="50">
        WPM
      </label>
    </div>
    <div id="chaptersSection" class="hidden" style="width:100%;max-width:480px">
      <details>
        <summary class="chapters-toggle">Chapters (<span id="chapterCount">0</span>)</summary>
        <div class="chapters-list" id="chaptersList"></div>
      </details>
    </div>
    <div class="hint">Tap to play/pause · Swipe to skip · ↑↓ speed</div>
  </div>
</div>

<!-- pdf.js loaded on demand -->
<script>
// ── State ──────────────────────────────────────────────────
const S = {
  library: [],       // [{id, title, wordCount, source, addedAt}]
  textCache: {},     // id -> text string (in-memory)
  currentBook: null,
  words: [],
  chapters: [],
  wordIndex: 0,
  playing: false,
  wpm: 300,
  fontSize: 64,
  theme: 'dark',
  accelMode: false,
  accelTarget: 600,
  accelStart: null,
  accelDuration: 30,
  timer: null,
};

const GUTENBERG_API = 'https://gutendex.com/books';
const PUNCT = {'.':2.5,'!':2.5,'?':2.5,',':1.5,';':1.8,':':1.8,'—':1.4,'–':1.4};
const SUGGESTIONS = ['Pride and Prejudice','Moby Dick','Frankenstein','Art of War','Origin of Species','Sherlock Holmes','Dracula','Republic Plato'];

// ── Storage (localStorage) ─────────────────────────────────
function saveLib() {
  try {
    const meta = S.library.map(({id,title,wordCount,source,addedAt}) => ({id,title,wordCount,source,addedAt}));
    localStorage.setItem('rsvp-lib', JSON.stringify(meta));
  } catch(e) { console.warn('saveLib:', e); }
}
function loadLib() {
  try { return JSON.parse(localStorage.getItem('rsvp-lib')) || []; } catch { return []; }
}
function saveText(id, text) {
  try { localStorage.setItem('rsvp-t-'+id, text); } catch(e) { console.warn('saveText:', e); }
}
function loadText(id) {
  try { return localStorage.getItem('rsvp-t-'+id); } catch { return null; }
}
function saveBM(id, idx) {
  try { localStorage.setItem('rsvp-bm-'+id, idx); } catch {}
}
function loadBM(id) {
  try { return parseInt(localStorage.getItem('rsvp-bm-'+id)) || 0; } catch { return 0; }
}

// ── Helpers ────────────────────────────────────────────────
function tokenize(t) {
  return t.split(/\s+/).filter(w => w.length > 0 && /[a-zA-Z0-9]/.test(w));
}
function calcORP(word) {
  const len = word.replace(/[^a-zA-Z0-9]/g,'').length;
  if (len <= 1) return 0;
  return Math.floor(len / 2);
}
function wordDelay(word, baseMs) {
  let m=1; const last=word[word.length-1];
  if (PUNCT[last]) m=PUNCT[last];
  if (word.length>8) m=Math.max(m,1.3);
  return baseMs*m;
}
function detectChapters(text) {
  const lines=text.split('\n'), chs=[{title:'Start',index:0}];
  let wc=0;
  for (const line of lines) {
    const t=line.trim();
    if ((/^(chapter|part|section|book)\s+[\divxlc]+/i.test(t)||(/^[A-Z][A-Z\s:.\-—]+$/.test(t)&&t.length>3&&t.length<80)) && wc>0)
      chs.push({title:t.slice(0,60),index:wc});
    wc+=t.split(/\s+/).filter(w=>w).length;
  }
  return chs;
}

// ── Rendering ──────────────────────────────────────────────
function renderWord(word, size) {
  const el = document.getElementById('wordDisplay');
  if (!word) { el.innerHTML=''; return; }
  el.style.fontSize = size+'px';
  const clean = word.replace(/[^a-zA-Z0-9'''-]/g,'');
  const orpIdx = calcORP(clean);
  let cc=0, before='', orp='', after='';
  for (let i=0;i<word.length;i++) {
    const ch=word[i], isA=/[a-zA-Z0-9]/.test(ch);
    if (isA) {
      if (cc<orpIdx) before+=ch; else if (cc===orpIdx) orp+=ch; else after+=ch; cc++;
    } else {
      if (cc<=orpIdx) before+=ch; else after+=ch;
    }
  }
  el.innerHTML = `<span class="orp-before">${esc(before)}</span><span class="orp">${esc(orp)}</span><span class="orp-after">${esc(after)}</span>`;
  // Pin ORP character at horizontal center of word-area
  el.style.setProperty('--orp-offset', '0px');
  requestAnimationFrame(() => {
    const orpEl = el.querySelector('.orp');
    if (!orpEl) return;
    const areaRect = document.getElementById('wordArea').getBoundingClientRect();
    const areaCenter = areaRect.left + areaRect.width / 2;
    const orpRect = orpEl.getBoundingClientRect();
    const orpCenter = orpRect.left + orpRect.width / 2;
    el.style.setProperty('--orp-offset', (areaCenter - orpCenter) + 'px');
  });
  if (S.digestMode) updateDigestIndicator();
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateProgress() {
  const pct = S.words.length>0 ? (S.wordIndex/S.words.length)*100 : 0;
  document.getElementById('progressFill').style.width = pct+'%';

  if (S.digestMode && S.digestBoundaries) {
    const block = getCurrentDigestBlock();
    const blockNum = block ? block.blockIdx + 1 : 1;
    const total = S.digestBlocks.length;
    document.getElementById('wordCount').textContent = `Block ${blockNum} of ${total}`;
    const blocksLeft = total - blockNum;
    const wordsLeft = S.words.length - S.wordIndex;
    const secsLeft = Math.ceil(wordsLeft / (S.wpm / 60));
    document.getElementById('timeLeft').textContent = secsLeft > 60 ? `~${Math.ceil(secsLeft/60)} min left` : `~${secsLeft}s left`;
  } else {
    document.getElementById('wordCount').textContent = `${S.wordIndex.toLocaleString()} / ${S.words.length.toLocaleString()} words`;
    const left = Math.ceil((S.words.length-S.wordIndex)/S.wpm);
    document.getElementById('timeLeft').textContent = `~${left} min left`;
  }
}
function updatePlayBtn() {
  const b=document.getElementById('playBtn');
  b.textContent = S.playing ? '❚❚ Pause' : '▶ Play';
  b.classList.toggle('playing', S.playing);
}

function renderLibrary() {
  const el=document.getElementById('bookList');
  if (S.library.length===0) {
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📚</div><p>No books yet. Upload a file or grab one from the Free Library.</p></div>';
    return;
  }
  el.innerHTML = S.library.map(b => `
    <button class="book-card" type="button" data-bookid="${b.id}">
      <div style="flex:1;min-width:0;text-align:left">
        <div class="book-title">${esc(b.title)}</div>

      </div>
      <span class="del-x" data-delid="${b.id}">✕</span>
    </button>
  `).join('');

  // Attach events via delegation
  el.querySelectorAll('.book-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (e.target.closest('.del-x')) {
        e.stopPropagation();
        confirmDelete(e.target.closest('.del-x').dataset.delid);

      }
      openBook(this.dataset.bookid);
    });
  });
}

// ── Book operations ────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg||'Loading...';
  document.getElementById('loadingOverlay').classList.remove('hidden');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

async function openBook(id) {
  const meta = S.library.find(b=>b.id===id);
  if (!meta) return;
  showLoading('Loading book...');

  // 1. Memory cache
  let text = S.textCache[id] || null;
  // 2. localStorage
  if (!text) text = loadText(id);
  // 3. Re-fetch from Gutenberg
  if (!text && meta.source==='gutenberg') {
    showLoading('Re-downloading from Project Gutenberg...');
    text = await fetchGutenbergText(meta.title.split('—')[0].trim());
    if (text) { S.textCache[id]=text; saveText(id,text); }
  }
  if (!text) { hideLoading(); alert('Could not load book. Try deleting and re-adding it.'); return; }

  S.textCache[id]=text;
  S.currentBook=meta;
  S.words=tokenize(text);
  S.chapters=detectChapters(text);
  S.wordIndex=Math.min(loadBM(id), S.words.length-1);
  S.playing=false;

  // Switch to reader
  document.getElementById('libraryView').classList.remove('active');
  document.getElementById('readerView').classList.add('active');
  document.getElementById('readerBookTitle').textContent=meta.title;

  renderWord(S.words[S.wordIndex], S.fontSize);
  updateProgress(); updatePlayBtn();

  // Chapters
  if (S.chapters.length>1) {
    document.getElementById('chaptersSection').classList.remove('hidden');
    document.getElementById('chapterCount').textContent=S.chapters.length;
    renderChapters();
  } else {
    document.getElementById('chaptersSection').classList.add('hidden');
  }
  hideLoading();
}

function renderChapters() {
  const cur=[...S.chapters].reverse().find(c=>S.wordIndex>=c.index);
  document.getElementById('chaptersList').innerHTML = S.chapters.map((ch,i) => {
    const nextIdx = i < S.chapters.length-1 ? S.chapters[i+1].index : S.words.length;
    const chapterWords = nextIdx - ch.index;
    const isCurrent = cur === ch;
    const isBookmarked = isCurrent && S.wordIndex > ch.index;
    const wordsInto = Math.max(0, S.wordIndex - ch.index);
    const pct = chapterWords > 0 ? Math.round((wordsInto / chapterWords) * 100) : 0;
    const isPast = S.wordIndex >= nextIdx;
    const minsLeft = Math.ceil((chapterWords - wordsInto) / S.wpm);

    let icon = '';
    if (isPast) icon = '\u2713';          // checkmark for completed chapters
    else if (isBookmarked) icon = '\u{1F516}'; // bookmark for current reading position
    else if (isCurrent) icon = '\u25B6';  // play triangle for active chapter

    let cls = 'chapter-item';
    if (isCurrent) cls += ' active';
    if (isBookmarked) cls += ' bookmarked';

    const tooltip = isCurrent
      ? `${wordsInto.toLocaleString()} / ${chapterWords.toLocaleString()} words \u00B7 ${pct}% \u00B7 ~${minsLeft} min left`
      : `${chapterWords.toLocaleString()} words \u00B7 ~${Math.ceil(chapterWords / S.wpm)} min`;

    const progressText = isPast ? '100%' : isCurrent ? pct + '%' : '';

    return `<div class="${cls}" onclick="jumpTo(${ch.index})">
      <span class="chapter-icon">${icon}</span>
      <span class="chapter-label">${esc(ch.title)}</span>
      ${progressText ? `<span class="chapter-progress">${progressText}</span>` : ''}
      <span class="chapter-tooltip">${esc(tooltip)}</span>
    </div>`;
  }).join('');
}

async function fetchGutenbergText(query) {
  try {
    const res = await fetch(`${GUTENBERG_API}?search=${encodeURIComponent(query)}&languages=en`);
    const data = await res.json();
    const book = data.results?.[0];
    if (!book) return null;
    const fmt=book.formats||{};
    const url=fmt['text/plain; charset=utf-8']||fmt['text/plain']||fmt['text/plain; charset=us-ascii']||Object.entries(fmt).find(([k])=>k.startsWith('text/plain'))?.[1];
    if (!url) return null;
    const r=await fetch(url);
    return await r.text();
  } catch(e) { console.error(e); return null; }
}

async function importBook(title, text, source='import') {
  const id='book-'+Date.now()+'-'+Math.random().toString(36).slice(2,8);
  const wordCount=tokenize(text).length;
  const meta={id,title,wordCount,source,addedAt:new Date().toISOString()};
  S.textCache[id]=text;
  S.library.unshift(meta);
  saveLib(); saveText(id,text);
  return meta;
}

// ── File handling ──────────────────────────────────────────
async function handleFile(e) {
  const file=e.target.files?.[0];
  if (!file) return;
  showLoading(`Processing ${file.name}...`);
  try {
    let text='';
    const name=file.name.replace(/\.[^.]+$/,'');
    if (file.name.endsWith('.pdf')) {
      text = await extractPDF(file);
    } else {
      text = await file.text();
    }
    if (text.trim().length<10) { alert('Could not extract text.'); hideLoading(); e.target.value=''; return; }
    const meta=await importBook(name,text);
    renderLibrary();
    await openBook(meta.id);
  } catch(err) { alert('Failed: '+err.message); hideLoading(); }
  e.target.value='';
}

async function extractPDF(file) {
  if (!window.pdfjsLib) {
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload=()=>{ window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; res(); };
      s.onerror=rej;
      document.head.appendChild(s);
    });
  }
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for (let i=1;i<=pdf.numPages;i++) {
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    // Join items with awareness of spacing — items with hasEOL get newlines
    let pageText='';
    for (const item of content.items) {
      if (!item.str) continue;
      pageText += item.str;
      if (item.hasEOL) pageText += '\n';
      else pageText += ' ';
    }
    text += pageText + '\n\n';
  }
  // Clean up PDF artifacts
  text = text
    .replace(/\f/g, '\n')                    // form feeds
    .replace(/[^\S\n]+/g, ' ')               // collapse whitespace (not newlines)
    .replace(/\n{3,}/g, '\n\n')              // collapse excessive newlines
    .replace(/(\w)-\n(\w)/g, '$1$2')         // rejoin hyphenated line breaks
    .replace(/([a-z])\n([a-z])/g, '$1 $2');  // rejoin mid-sentence line breaks
  return text;
}

async function searchGutenberg(query) {

  document.getElementById('gutenSearch').value=query;
  document.getElementById('gutenResults').innerHTML='<div style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto 12px"></div>Searching...</div>';

    const res=await fetch(`${GUTENBERG_API}?search=${encodeURIComponent(query)}&languages=en`);

    const books=data.results||[];
    if (books.length===0) {
      document.getElementById('gutenResults').innerHTML='<div class="empty-state">No results. Try a different search.</div>';
      return;
    }
    document.getElementById('gutenResults').innerHTML=books.map((b,i)=>{
      const author=b.authors?.[0]?.name||'Unknown';
      const hasText=Object.keys(b.formats||{}).some(k=>k.startsWith('text/plain'));

      return `<div class="guten-card" style="opacity:${hasText?1:0.5}">

}
window._gutenResults=[];

async function downloadGuten(idx) {
  const book=window._gutenResults[idx];
  if (!book) return;
  showLoading(`Downloading "${book.title}"...`);
  try {
    const fmt=book.formats||{};
    const url=fmt['text/plain; charset=utf-8']||fmt['text/plain']||fmt['text/plain; charset=us-ascii']||Object.entries(fmt).find(([k])=>k.startsWith('text/plain'))?.[1];
    if (!url) { alert('No text version.'); hideLoading(); return; }
    const res=await fetch(url);
    const text=await res.text();
    const author=book.authors?.[0]?.name||'Unknown';
    const meta=await importBook(`${book.title} — ${author}`, text, 'gutenberg');
    renderLibrary();
    await openBook(meta.id);
  } catch(e) { alert('Download failed: '+e.message); hideLoading(); }
}

// ── Playback ───────────────────────────────────────────────
function togglePlay() {
  S.playing=!S.playing;
  updatePlayBtn();
  if (S.playing) {
    S.accelMode=document.getElementById('accelCheck').checked;
    S.accelTarget=parseInt(document.getElementById('accelTarget').value)||600;
    if (S.accelMode) S.accelStart=Date.now();
    tick();
  } else {
    clearTimeout(S.timer);
    S.accelStart=null;
  }
}

function tick() {
  if (!S.playing||S.wordIndex>=S.words.length-1) {
    S.playing=false; updatePlayBtn(); return;
  }
  let wpm=S.wpm;
  if (S.accelMode&&S.accelStart) {
    const p=Math.min((Date.now()-S.accelStart)/1000/S.accelDuration,1);
    wpm=S.wpm+(S.accelTarget-S.wpm)*p;
  }
  const w=S.words[S.wordIndex]||'';
  let delay=wordDelay(w, 60000/wpm);

  // Extra pause at digest block boundaries
  if (S.digestMode && S.digestBoundaries) {
    const nextIdx = S.wordIndex + 1;
    const isBlockBoundary = S.digestBoundaries.some(b => b.wordIndex === nextIdx);
    if (isBlockBoundary) {
      delay += 1000;
      // Flash blank briefly at boundary
      setTimeout(() => {
        document.getElementById('wordDisplay').innerHTML = '<span style="opacity:0.15">···</span>';
      }, delay * 0.3);
    }
  }

  S.timer=setTimeout(()=>{
    S.wordIndex=Math.min(S.wordIndex+1, S.words.length-1);
    renderWord(S.words[S.wordIndex], S.fontSize);
    updateProgress();
    // Auto-save bookmark every 50 words
    if (S.wordIndex%50===0 && S.currentBook) saveBM(S.currentBook.id, S.wordIndex);
    tick();
  }, delay);
}

function skip(n) {
  S.wordIndex=Math.max(0, Math.min(S.wordIndex+n, S.words.length-1));
  renderWord(S.words[S.wordIndex], S.fontSize);
  updateProgress();
}
function jumpTo(idx) {
  S.wordIndex=Math.max(0, Math.min(idx, S.words.length-1));
  renderWord(S.words[S.wordIndex], S.fontSize);
  updateProgress(); renderChapters();
}
function seekProgress(e) {
  const rect=e.currentTarget.getBoundingClientRect();
  const x=(e.clientX-rect.left)/rect.width;
  jumpTo(Math.floor(x*S.words.length));
}
function setWpm(v) { S.wpm=parseInt(v); document.getElementById('wpmLabel').textContent=S.wpm+' WPM'; }
function setFontSize(v) { S.fontSize=parseInt(v); renderWord(S.words[S.wordIndex], S.fontSize); }

function goToLibrary() {
  S.playing=false; clearTimeout(S.timer); updatePlayBtn();
  if (S.currentBook) saveBM(S.currentBook.id, S.wordIndex);
  S.digestMode = false;
  S.digestBlocks = [];
  S.digestBoundaries = null;
  document.getElementById('blockIndicator').classList.add('hidden');
  document.getElementById('blockLabel').classList.add('hidden');
  document.getElementById('wordDisplay').className = 'word-display';
  document.getElementById('readerView').classList.remove('active');
  document.getElementById('libraryView').classList.add('active');
  renderLibrary();
}

function confirmDelete(id) {
  if (confirm('Delete this book?')) {
    S.library=S.library.filter(b=>b.id!==id);
    delete S.textCache[id];
    saveLib();
    try { localStorage.removeItem('rsvp-t-'+id); localStorage.removeItem('rsvp-bm-'+id); } catch {}
    renderLibrary();
  }
}

  if (e.code==='ArrowRight') skip(10);
  if (e.code==='ArrowUp') { S.wpm=Math.min(S.wpm+25,1200); document.getElementById('wpmSlider').value=S.wpm; setWpm(S.wpm); }

});

// Swipe support for iPad
let touchStartX = 0, touchStartY = 0;
document.getElementById('wordArea').addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('wordArea').addEventListener('touchend', function(e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2) {
    // Horizontal swipe
    if (dx > 0) skip(-20); else skip(20);
  } else if (Math.abs(dx) < 15 && Math.abs(dy) < 15) {
    // Tap (not a swipe)
    togglePlay();
  }
});

  el.querySelectorAll('.digest-card').forEach(card => {

function openDigest(id) {
  const session = DIGEST_SESSIONS.find(s => s.id === id);
  if (!session) return;

  // Convert digest blocks into word arrays with metadata
  S.digestMode = true;
  S.digestBlocks = session.blocks;
  S.digestBlockIdx = 0;
  S.currentBook = { id, title: session.title };

  // Flatten all blocks into words with block boundary markers
  const allWords = [];
  const blockBoundaries = []; // [{wordIndex, tag, blockIdx, text}]
  session.blocks.forEach((block, bi) => {
    blockBoundaries.push({ wordIndex: allWords.length, tag: block.tag, blockIdx: bi, text: block.text });
    const words = tokenize(block.text);
    words.forEach(w => allWords.push(w));
  });

  S.words = allWords;
  S.digestBoundaries = blockBoundaries;
  S.wordIndex = 0;
  S.playing = false;
  S.chapters = blockBoundaries.map((b,i) => ({
    title: `${TAG_COLORS[b.tag].label}: ${b.text.slice(0,50)}...`,
    index: b.wordIndex
  }));

  // Switch to reader
  document.getElementById('libraryView').classList.remove('active');
  document.getElementById('readerView').classList.add('active');
  document.getElementById('readerBookTitle').textContent = session.title;

  updateDigestIndicator();
  renderWord(S.words[0], S.fontSize);
  updateProgress(); updatePlayBtn();

  // Chapters
  document.getElementById('chaptersSection').classList.remove('hidden');
  document.getElementById('chapterCount').textContent = S.digestBlocks.length;
  renderChapters();
}

function getCurrentDigestBlock() {
  if (!S.digestMode || !S.digestBoundaries) return null;
  let current = S.digestBoundaries[0];
  for (const b of S.digestBoundaries) {
    if (S.wordIndex >= b.wordIndex) current = b;
    else break;
  }
  return current;
}

function updateDigestIndicator() {
  const indicator = document.getElementById('blockIndicator');
  const label = document.getElementById('blockLabel');
  if (!S.digestMode) {
    indicator.classList.add('hidden');
    label.classList.add('hidden');
    return;
  }
  const block = getCurrentDigestBlock();
  if (!block) return;
  const c = TAG_COLORS[block.tag];
  indicator.classList.remove('hidden');
  indicator.style.color = c.fg;
  indicator.textContent = `${c.label} · ${block.blockIdx+1}/${S.digestBlocks.length}`;

  label.classList.remove('hidden');
  label.textContent = block.text.length > 80 ? block.text.slice(0,80)+'…' : block.text;

  // Tint the ORP color based on tag
  const wordEl = document.getElementById('wordDisplay');
  wordEl.className = 'word-display tag-' + block.tag;
}

....... 131 \nChapter Nineteen : The Expanding Earth ........................... 144 \n\n\u2022 \n\n/' INTRODUCTION \nIn this book I offer some practical methods for solving \nhealth problems by increasing biological energy. The method s \ncan be applied by people to them selves, or by physicians to \ntheir patients. But energy and indiv!duality and thought are so \nclosely associated that full access to the value of these tech-\nniques might require the integrated and balanced approach \nthat can be provided by a new theoretical orientation . I offer \nsome suggestions on the way our inner world can mesh with \nthe outer world , in such an enerh'Y-based orientation. And the \ntheory might not be of general interest unles s its meaning can \nbe concretized in some specific situations . Other people are \nworking on the same kinds of theorie s, and other people have \nworked out parts of the various techniques , but my effort here \nis to offer something like a \"technology of life,\" which unites \ntheory and practice. \nI intend to show that the human substance isn't simply a \nmetastable , transient event , but that it is rather a pioneering \nprobe into a new system. Self-organizing systems decay only \nif they have assimilated inertia , and--with a little support of \nthe right kind- -the centers of degen eration can become centers \nof regeneration. \nBiogenic stimulators , adaptogens , spontaneou s healing , \ncancer , aging, and reproduction are considered here in the \nlight of the best available knowled ge of developmental sys-\ntems in biology and non-equilibrium processe s. Beside s \nI \n\nhaving the practical value of bringing coherence into our un-\nderstanding of some things that have been merely \"therapeutic \napproaches,\" I hope it will also help to shift the theoretical fo-\ncus in the study of self-ordering processes away from the \ninformational-statistical , and toward the to interpret \nstructure , phase and state in terms of energy and history, be-\nfore considering their abstract , informational properties . \n2 \n\nPART ONE: \nASPECTS OF WHOLENESS \n\"Reason, or the ralio of all we have already known, is nol \nthe same that it shall be when we know more. The bounded is \nloathed by its possessor. The same dull round, even of a uni-\nverse , would soon become a mill with complicated wheels. 1f \nthe many become the same as the few when possess'd, More! \nMore ! is the cry of a mistaken soul; less than All cannot sat-\nisfy Man. \" W. Blake \nOnce we begin to believe in the future, we understand the \npossibility of learning more , and of being more . We appreci-\nate the unexpected , and we even anticipate the opportunity to \nconfront it. \nThere is an inertia that makes it easy to over -value present \nknowledge . If we have enough energy (and enough time) , we \novercome the inertia . The desire for wholeness can lead us \ntoward a more appropriate kind of science, and also toward a \nmore perfect world. \n3 \n\nCHAPTER) \nASPECTS OF WHOLENESS \nHolism is the observation that, although natural objects can \nbe resolved into their parts, the parts are to some extent \nshaped by their participation in the whole object For exam-\nple, in organic chemistry it is recognized that the reactivity of \nan atom or radicaJ is modified by adjoining parts of the mole-\ncule, by the solvent , etc. Holism would never have been \nnamed , except that it is so common in our scientific tradition \nfor someone to say \"We know all there is to know about the \nparts (atoms , surfaces , fields, genes, etc.), so we can foresee \nthe result of their combination.\" Good engineering involves \nknowing the properties of the materials so thoroughly that ac-\ncurate predictions can be made about their behavior in new \nstructures, but good science requires a willingness to accept \nthe unpredicted when it occurs. Holism, or a non-dogmatic at-\ntitude toward the world , recognizes individual uniqueness , \nrather than averages , and is likely to look for complex causes \n(especially environmental influences), rather than too easily \nascribing traits \"to the genes .\" \nHistorically, a reluctance to distinguish our present knowl-\nedge from possible knowledge , and to distinguish our defini-\ntion of something ITom its real existence and fullest potential, \nhas characterized most of the people who oppose holism, and \ncall themselves reductiorusts . Consciousness, perception, \nsensation , pleasure , and intention have often been omitted \nfrom the world described by reductionists . If we are going to \n4 \n\nunderstand life and its possibilities , then it seems that we \nshould begin with an appreciation of its \"live liest\" aspects , as \nan essential dimension of our thinking, even if we are going to \nwork with some of its relatively inert aspects, such as viral \ngenetics. \nThe relation of energy to structure is, I think , the central \nquestion of biology . (The importance of the same question for \nthe physical sciences might indicate in a rough way how Hal-\ndane's predicted \"swallowing up\" might occur.) The ideas of \nresonance and hysteresis , which are only vaguely defined in \nphysics , have to do with the interaction of energy and struc-\nture on various levels of complexity and organization , and are \nexamples of physical concepts that can gain meaning and clar-\nity from biology .{I) When energy flows through matter , order \naccumulate s (as a result of resonance and hysteresis , for ex-\nample), but we hear so much about \"entropy ,\" \"randomness,u \nand \"symmetry\" that we forget most of the formative pro-\ncesses in the material world . \nHuman (and ecological) health obviously should have the \nbenefits of holistic science , but the actual situation is that \nbiology and medicine have become very product -oriented, and \nholistic considerations are increasingly left to a variety of \n\"funge\" occupations. Many of these alternative approaches \nare concerned with the idea of \"energy\" as the key to health, \nbut in general they lack simp le and effective methods for opti-\nmizing biological energy, and often use counter-productive \nmethods , such as prescribing linseed oil nutritional supp le-\nments. In the following pages I will show how some of the \nmost important achievements of ordinary science can be re-\ntrieved from the distortions of the medical promoters, and \nmade available for holistic use, that is, for appropriate use. \n5 \n\nNON-GENETIC BIOLOGY \nThe word , \"gene ,\" itself contains an ideology , since it im-\nplies origin. or genesis, though its main meaning is something \nlike \"a unit of continuity .\" Building on the wordts connota-\ntion, dogmatic geneticists explicitly stated their \"central dog-\nma\": that infonnation flows only from DNA to RNA, and only \nfrom RNA to protein. When Temin and Baltimore described \nthe \"reverse transcriptionll of DNA from RNA, all of the pro-\nfessional biologists I talked to said flatly that they didn!t be-\nlieve it was possible . Even when no one was threatening the \naddition of \"informationll to the chromosomes , the dominant \nbelief among biologists was that development was closely \ncontrolled \"by the genes,\" because the body owes its genesis \nto the genes . Intelligence, body proportions, and senescence \nwere said to be \"specifiedH or \"governed\" or \"programmed\" \nby the genes . The \"congenital\" condition was often taken as \nthe \"genetic\" condition . Textbooks said that the maternal in-\nfluence was only \"genetic ,\" because the fetus was \"insulated\" \nfrom events in the mother's body Gust as the \"germ line\" was \nisolated from events in the rest of the body) . Although many \nkinds of experiment showed both prenatal and transgenera-\ntional (see the environment \n6 Figure I. \nThe cumu-\nlalivc ef-\nfecls of \nfceding \nglandular \ntissu c. \n\non intelligence , body proportions , and rate of aging, the \ngenetics-reductionist school ignored them , and defined them-\nselves as the only scientific school ofbio I06'Y. \nENERGY AND THE BRAIN \nWhen I was a student of literature, I was interested in the \napparent energy differences between different writers and dif-\nferent social groups. The literature of dissent (I wrote my \nmaster's thesis on William Blake) always reveals an abun-\ndance, or excess , of ener6')'. I came to see literary \"periods\" \nor styles (classical , realist, Romantic , surrealist , etc.) as reflec-\ntions of a society's energy and structure . As I followed this \nline of thinking about the function of language in society , and \nin the life of the individual , I saw that Blake's descriptions of \nhis own use of images and symbols made sense in relation to \nbrain physiology . Even attitudes toward mathematical con-\ncepts, theories of ideal langua ges, and \"language philosophy\" \nrelated strongly to the person's attitude toward authority , en-\nergy, the body, and the nature of consciousness . (2) \nAfter I had spent a few years study ing and teaching lin-\nguistics , I decided to study brain physiology . At that time , a \ngroup at the University of California had already found that \nfreedom and stimulation caused a cumulative, transgenera-\ntional increase in the size of rats' brains . Continuing that \nwork, Marion Diamond has found that pregnancy , or proges-\nterone treatment increases brain size and inhibits the develop-\nment of age pigment (suggesting that longevity might also be \nincreased) . In 1968, another group found that prenatal hor-\nmone treatment (causing increased production of progester-\none) greatly increased the intelligence of rats. Several \n7 \n\nresearchers have shown that brain size relates strongly to both \nenergy production and longevity . A graph (Figure 2) suggests \nhow adaptive (mental) energy and longevity might relate . \n. other \nanhnols prOgeSIt:f,\";n';..-_---domlnant ... _ \ncretin \nordinate '\" mental energy \nabsdsslI ;; longevity \nAt a certain stage of gestation, there are more than twice as \nmany brain cells as there are at the time of birth, and it is like-\nly that good conditions for the mother and fetus--adequate \nblood volume, oxygenation, glucose , progesterone (3), thy-\nroid hormone , and absence of toxins and nutritional \nimbalances--can preserve some of the cells that would normal-\nly die. Since the brain and the liver regulate the amount of \nglucose and hormones in the body, the conditions under which \nthose organs develop will very likely influence their later func-\ntioning , and account for some of the transgenerational effects \nthat have been observed . \nMECHANISMS OF AGING \nAs I became aware of the influences of hormones and the \navailability of energy on the development of the brain, and the \n8 \n\neffects of the brain on aging (and became aware of the amount \nof dogma in the neuro-sciences) , 1 began to work on the ways \nin which energy metabolism affects reproductive failure , espe-\ncially in senescent decline of fertility . [hoped that working in \na less dogmatic area of physiology would still allow me to get \na better understanding of the organism in general, including \nthe brain . \nProfes sor Soderwall and his students at the University of \nOregon had shown that the corpora lutea (areas in the ovary \nwhich mainly produce progesterone) appeared to fail in aging \nhamsters , and that vitamin E supplements could extend fertil-\nity by a significant amount. His group showed that \"aged \nova\" were not responsible for infertility , but rather that the \nuterine environment was not suitable for implantation. Soder-\nwall had also demonstrated that excess estrogen could cause \nfailure of the pregnancy at any point , from failure of the em-\nbryo to implant , to resorption of the fetus at a late stage of \npregnancy. \nAlthough I had investigated the association of estrogen \nwith cancer, and knew from my own experience with mi-\ngraines that stress, diet and hormones interacted in powerful \nways , when I began to investigate the oxidative metabolism of \nthe uterus I didn't realize that it would involve a convergence \nof several of my main interest s. I was familiar with Otto War-\nburg's famous idea that cancer is caused by a urespiratory de-\nfect,\" and I knew that aged tissue has a diminished respiratory \ncapacity. \nThe text-books indicated that estrogen deficiency and \n\"aged ova\" were responsible for senescent infertility . (The \norigin of these ideas in a dogmatic matrix is another story \nwhich I have told elsewhere .) I found that the uterine endo-\nmetrium of old anima1s often consumed oxygen at a high rate, \n9 \n\nand showed other signs of being under the influence of exces-\nsive estrogen . As I tried to understand this, I saw that several \nthings could contribute to a high rate of oxygen consumption . \nEither too much estrogen , or too little progesterone could \nhave the same effect , since it is the ratio between these hor-\nmones which controls their effects . A vitamin E deficiency in-\ncreases oxygen consumption , and too much unsaturated fat \nhas the same effect. In a vitamin E deficiency , unsaturated \noils are oxidized in a way that produces \"age pigment ,\" also \ncalled ceroid pigment or lipofuscin . This pigment consumes \nboth oxygen and fuel, but produces no usable energy . Estro-\ngen excess synergizes with a deficiency of vitamin E to inten-\nsify the formation of this pigment. Partly, this might be \nbecause estrogen is a powerful stimulant of iron absorption , \nand iron is involved in the peroxidation that produces the pig-\nment . But low oxygen concentration is what causes the iron \nto become active in peroxidation , and estrogen acts in severa1 \nways to decrease the availability of oxygen . It appeared , \ntherefore, that many of the features of aging resembled an es-\ntrogen excess, rather than estrogen deficiency. \nThe way in which estrogen prevents or terminates pregnan-\ncy seems to be by causing the uterus to consume oxygen at \nsuch a high rate that there is no oxygen available for the em-\nbryo, which has a high requirement for oxygen beginning on \nthe day that it normally implants . The chronic or cumulative \neffects of estrogen, leading to formation of lipofuscin , happen \nto act in the same direction as estrogen itself, causing oxygen \nto be reduced , especially in the uterus , but in all other tissues , \ntoo (aging the whole organism). Estrogen excess can also de-\nstroy the corpora lutea, interfering with the production of pro-\ngesterone . Progesterone's effect in pregnancy is to assure the \navailability of oxygen and nutrients for the embryo, but it also \nhas the general effect of inhibiting the formation of lipofuscin, \n10 \n\nand of other aging signs , by improving efficiency. \n(Progesterone is unusual among the anti-stress steroids in \nhaving no harmful side-effects .) \nAlthough my work confinned the other research that had \nbeen done in Soderwall's lab in the preceding 25 years , the \nidea that estrogen's influence appears to increase with aging, \nand even to contribute to the process of aging , was contrary \nto the doctrine that has been promoted by the pharmaceutical \nindustry. Nevertheless , as I read more, I saw that there was \nreally no evidence contrary to what I had seen in my own \nwork . What existed was a web of interpretation which ex-\nisted to sell estrogen treatments . Even the fact that estrogen \ncauses abortion was \"ignored,\" very consciously , until the in-\ndustry had fabricated a more acceptable rationaJe with which \nto sell its \"contraceptive\" pills. \nThe idea of many factors acting in the same direction , and \ntending to have a cumulative effect, seemed to me to have a \ngeneral biological significance . It seemed to be part of the an-\nswer to the question of what it is which is lost, or accumu-\nlated , during aging , which accounts for the decreased ability \nto adapt to the changing environment. It seemed to say some-\nthing about the nature of Warburg's \"respiratory defect\" in \ncancer. The thyroid hormone , which governs respiration , is \nsuppressed by estrogen , and by unsaturated fats. The waste-\nful metabolism of estrogen dominance tends to use up glu-\ncose, and is likely to activate the stress hormones , including \ncortisol. The main features of aging can be produced directly \nby administering excessive amounts of cortisol. These fea-\ntures include atrophy of skin, arteries , muscle , bone , immune \nsystem , and parts of the brain, loss of pigment (melanin), de-\nposition of fat in certain areas , and slowed conduction veloc-\nity of nerve$. The physiology of aging (especially \nreproductive aging) overlaps the physiology of stress. \nI I \n\nLIFE-EXPECTANCY OF ADULTS \nWhen there are sewers and clean water . the death rate of \ninfants and children ITom infectious diseases isn't high. so the \naverage age of the population increases as a larger percentage \nof those born live into old age. Increased use of birth control \nwill also increase the average age of the population if fewer \nchildren are born each year. These changes in the birth rate \nand infant survival can happen at the same time that industrial \npollution is causing chronic poisoning which shortens the lives \nof mature people. \nTo understand the effects of aging on the risk of human \ndisease and death . we need infonnation specifically about pee\u00b7 \npie who have reached a certain age. There are several orga-\nnizations and individuals in the U.S. that have cleverly used \n\"re-standardized\" statistics to convince the public that cancer \nis being defeated, industrial pollution is hann1ess , sickness is \ncaused by the victim's own irresponsible choices , and that our \nlongevity has increased by several years in the last few de-\ncades . Old people are the most likely to die of cancer , and the \ncancer death rate for old people in the U. S. has been increas-\ning in recent decades, as has the cancer death rate for the pop-\nulation in general . The life expectancy for older people in the \nU.S. has barely increased a year in recent decades . 2,000 \nyears ago, the life-expectancy for older people seems to have \nbeen several years longer than it is now (Figure 3). \n12 , YEAR S OF i\\(JE \nFog ..... 3: (' ........ ,'.,' ..... .......... 01 ....... n ....... 01 ....... ...... \".... ....\"ooj r'Q. Ulo> ..... d.'L \n\nPUBERTY AND AGING \nMany studies have demonstrated that puberty seems to \ntrigger the mechanism of aging . and the idea of a \"death hor-\nmone ,\" located in the pituitary gland, has been suggested. \n(Figures 4 and 5.) Many degenerative diseases develop under \nI \n0.1 \nFigurc4: \nc. \nFigure \n13 I \n\\ OF TIlE SKIN (Tho:\"haJ .. of thi.. \ncum: is exactly like thai. ror <lotth 1M\" an=, \ndeath from l1li OOIlS<S, one! of \niron in Ib< Ii\u00bbueo) \nFermi . ( \n./ ,-, \nf\u00b7 . \nj, M.l\" '\" \ni I , .' , -\nill rurs -tOO \nOF TIlE SYSlR\\.l \n-' \n'. 51015 .' , ... '.'-' .... -. -,,/ J \nIa ,....1'11 _ 100 \n\nthe influenc e of exces sive estrogen and cortisone (and as a re-\nsult of the many metabolic changes which follow exposure to \nthose hormones) . Many of these diseases, especially those \nwhich appear after puberty and are more frequent in women, \ncan be treated very effectively with the anti-estrogen and anti-\nstress hormones , such as progesterone . \nHans Selye pointed out that estrogen treatment mimics the \nfirst, \"shock\" phase of the stress reaction . An excess of estro-\ngen (or any stressor) causes the pituitary to secrete prolactin \nand ACTH , and both of these hormone s act on the ovaries to \nstop progesterone production, and contribute in many other \nways to the process of atrophy . ACTH , of course, stimulates \nthe secretion of cortisol . The removal of the pituitary obvious-\nly isn't a practical way to delay senescence, but protection \nagain st the \"death hormones\" can be achieved to some extent \nby altering the diet to minimize the effects of estrogen and \ncortisol. \nHistorical and demographic studies show that certain \nconditions affect the age at which puberty occurs. Ashley \nMontague has argued that we need more neoteny , that is, that \nwe should try to preserve and to extend our youthful func-\ntions, because those are our most human qualities . If we can \ngeneralize from animal studies , delaying puberty could in-\ncrease brain size and longevity, improve intelligence , decrease \nviolence , and even make people physically more attractive \n(the \"cute puppy\" appearance is largely a matter of brain size \nin relation to the size of the face and body). I think this will \nbe the next step in human evolution . Just as nurturing, stimu -\nlation , and freedom promote improvement in the function and \nstructure of the brain , cruelty and oppression act in the oppo-\nsite direction. If puberty is delayed , then the importance of a \nculture which support s curiosit y, exploration , play and \n14 \n\nsensuous pleasure seems obviou s, so that biology and culture \nwill be mutually supportive. \nThe physiological age of the parts of an organism depends \nin some way on the developmental stage of the whole organ\u00b7 \nism. This contradicts the reductionists' idea that cells or tis-\nsues have an \"intrinsic\" lifespan which will cause them to \ndeteriorate after a certain limited number of divisions . When \npieces of breast tissue or skin were repeatedly transplanted \nfrom old animals to young animals of the same (syngeneic) \nstrain, they were still in good condition after ten \"life-time s,\" \nand their survival was apparently limited only by the necessit y \nof trimmin g them each time they were transferred . to make \nsure that no host tissue was transplanted with them . When \nold rats were grafted onto young rats, the old member of the \npair lived to twice the expected age. Recently . young female \nmice were grafted onto old females, to investigate any hor-\nmonal factors in aging . The ovaries of the young animal ap-\npeared to age, and its production of progesterone decreased . \nThat is, old tissue seems to become younger on young ani-\nmals, and young tissue can be \"aged\" by association with an \nold animal. \nThis kind of evidence (and the simple observation that the \ncells in skin and intestine undergo thousands of divisions in an \nindividual's life-time) strongly favors the idea that a systemic \nenergy problem is involved in aging. \nENERGY AND EVOLUTION \nV.I. Vemadsky believed that the earth's energy-exchange \nand substance-exchan ge proce sses were intensifying, and that \nthe biosphere would undergo another major increase in its \n\"metabolic rate,\" similar to that which appeared early in life's \n15 \n\ndevelopment with photosynthesis. M.1. Budyko (in Evolu-\nlion of Ihe Bio!Jphere, 1986) discusses the principle of \"aro-\nmorphosis ,\" in which the origin of higher types of animal is \nclosely associated with the availability of larger amounts of \nenergy in the environment , and with the appearance of new \nstructures which made possible a higher energy level of activ-\nity and more complex interactions with the environment.(4) \nWhen vertebrates developed an effective method of heat regu-\nlation , they were able to considerably increase their use of en-\ner!:,,),. The move from water to land requires greater ability to \nuse energy , as well as requiring new structures suitable to the \nnew way of living . \nWhen mammals and birds achieved the ability to sustain a \nhigh metabolic rate by keeping their bodies at a steady , fairly \nhigh, temperature , their \"food chain ,\" based on photosynthe-\nsis, consi sted of organisms that generally lived at a lower tem-\nperature. \nSugar s, proteins, and the saturated fats produced by wann \norganisms can be eaten by warm-blooded animals with no par-\nticular side-effects .(5) Organisms that live at low tempera-\ntures , however , contain unsaturated fats. The consumption of \nlarge amounts of unsaturated fats lowers the metabolic rate, \nand accumulated unsaturated fats are susceptible to a sponta-\nneous and toxic form of oxidation . (The toxic effects include \ndamage to the respiratory apparatus and to the circulatory and \nimmune systems, increased rate of aging , and cancer.) \nThese \"low energy\" foods in effect counteract the evolu-\ntionary achievement of a high metabolic rate. Several studies \nshow that decreased consumption of unsaturated fats can \ndelay puberty . Other studies show that an excess of unsatu-\nrated oil in the mother's diet can damage the development of \nthe fetus's brain. The choice of foods which have less \n16 \n\nunsaturated fat tends to reinforce the achievements of \nevolution. \nThe seed oil industry has created a national phobia about \nthe consumption of saturated fats and cholesterol, but there is \nno basis for the idea that those foods should be avoided . Peo-\nple with hypothyroidism are susceptible to heart disease, but \ntheir elevated blood cholesterol becomes normal when their \nthyroid function is restored . (Figure 6) The body's highest \nconcentration of cholesterol exists in the brain. The level of \ncholesterol in the blood strongly influences the production of \nthe protective honnones, such as progesterone . The brain \ncontains by far the body's highest concentration of these \nhonnones . \ncholesterol level ........ \nbasal metabolic \nrate thyroid therapy \nbegins \nAnother energy-promoting factor is visible light. In the \nwinter and at night the respiratory energy producing system is \ndamaged , and the protective honnones decline , and the harm-\nful stress hormones increase. The immune system becomes \nless active , and mortality increases. \n17 \n\nAlthough ultraviolet light interacts with unsaturated fats in \nthe skin to accelerate aging (E.R. Pinckney , Medical Counter-\npOint, Feb, 1973) and to produce cancer , ordinary visible light \nhas several beneficial effects in animals . One effect is the \"re-\ngeneration\" of the enzyme SOD (superoxide dismutase), by \ncausing its copper atom to be re-attached to the protein . \nLight also increases the activity of normal respiratory en-\nzymes, and tends to normalize (or maximize) the production \nof hormones, including progesterone and thyroid. \nAnimal migration to reproduce in regions with longer days \nis a way to benefit from this energy-promoting action of light. \nIn adult birds , the increase of hormones in the spring causes \nthe growth of new brain cells in the area that controls their \nsinging . (In humans, the space inside the cranium keeps in-\ncreasing into old age, and the amount of DNA in the brain \nalso keeps increasing with age, but it has been assumed that \nsuch changes in adult brains result from an increase in the size \nof nerve cells, and an increase in the number of connective tis-\nsue cells, rather than from a continuing increase in the number \nof nerve cells.) I would expect an increase in the temperature \nof the earth , and increased use of artificial light (or migration) \nto lead to a prolongation of youth and the development of \nbetter brains . \nMany years ago, people talked about the tendency toward \n\"cephalization\" in evolution . That is the tendency to create a \nhierarchical organization , with the size and importance of the \nbrain increasing with evolution . More recently , it was found \nthat both the intensity and the efficiency of respiratory eoerb!), \nproduction in the brain increase with evolutionary level and \nwith the degree of alertness . \nAnother seemingly directional tendency relating to energy \nproduction has to do with a non-random composition of the \n18 \n\nDNA. Aerobic DNA has a higher G+C (the \nbases guanine and cytosine) content than does that of \nanaerobes , and vertebrates have more G+C \nthan do lower organisms, with the G+C content again corre-\nsponding to the amount of oxygen used. Although the full \nmeaning of the G+C content isn't known , it is thought to af-\nfect the stability of the organism at various levels, and I sup-\npose this would allow the organism to thrive at higher \ntemperatures. \n\" -, --.-ch -\" \" =\" \n-\" \" 0 Eg o .\"!:::: 0::; 0\", +-\" \n19 \u00b7 \u2022 \" \u00b7 \n30 \n20 \nm\" 1.1 \n10 r ... 99 \no \no 10 20 30 40 50 \nFigure 7: \"Silent Nucleotide Substitution and G+C \nContent or some Mitochondrial and Bacterial Genes,\" \nT. H. Jukes and V. Bhushan. Journal oj Molec illar \nBiology 2-1. 1%6. \n\nThe association of G+C content with evolutionary level is \ninteresting because the changes occur in \"non-coding\" DNA, \nwhere the ordinary kind of selection, involving Hcoded\" pro-\nteins , isn't involved. The \"isolation\" of the genome, and the \nrandomness of its changes, used to be at the core of genetics ; \nI suspect this is why even most biologists aren't aware of this \nodd feature of DNA compo sition. The passage of time will \nanow people to disengage themselves from an embarrassing \ndogma . (Figure 7 shows the ascending G+C content for fruit \nfly, toad , mouse , cow, and human , in the DNA of the mito-\nchondrion, where energ y is produced .) \nPOLLUTION \nBesides the distortion of our food suppl y by the propagan-\nda of the seed oil industry , there is increasing contamination \nof our food supply by heavy metals . Lead , for instance , has \nbeen spread everywhere , largely as a result of its use in leaded \ngasoline. Food additives are often contaminated with heavy \nmetals from the sulfuric acid used in their manufacture . Many \npeople are aware of the famou s experiments in which food re-\nstriction increa sed the longe vity of animals , as if eating were \ntoxic . But removing toxic heavy metals from the food, with-\nout restricting the amount of food eaten, has had the same \nlife-extending effect in experimental animals. \nWhen estrogen is elevated (as at puberty , or in pregnancy , \nor with medical estrogen treatment) the absorption of iron is \nstimulated . During aging , the body's load of iron increases , \nespecially if there is a deficiency of copper , and the body's \ncontent of copper decreases with age. Copper is an essential \ncomponent of cytochrome oxidase , which has the crucial last \nposition in the mitochondrial respiratory system. Copper is a \ncomponent of the cytoplasmic SOD enzyme, which decreases \n20 \n\nwith age. Ceruloplasmin , a major copper-containing protein , \nhelps to keep iron in its safe oxidized form. Copper is in-\nvolved in the production of melanin (itself an antioxidant) and \nelastin . The loss of melanin , elastin, and respiratory capacity , \nwhich is so characteristic of senescence , is also produced by \nexcessive exposure to cortisol. \nThe protein , metallothionein, is rich in sulfhydryl groups , \nwhich bind heavy metals . It is assumed that this protein helps \nto detoxify and eliminate the toxic metals . This protein is in-\nduced by exposure to either a heavy metal or cortisol. A larg-\ner amount is produced in response to the combination of \nheavy metals and cortisol , than by either alone. Since copper, \nlike the toxic metals cadmium , lead, mercury , and silver , \nreacts strongly with sulfhydryl groups , the body is likely to \nlose some copper when it is subjected to heavy metals or cor-\ntisol. I think this chronic loss of copper accounts for the ob-\nvious features of aging , such as loss of elasticity of the skin, \nlungs , and blood vessels , the depigmentation (demelanization) \nof skin, hair, and (in Parkinson 's disease) substantia nigra , and \nfor the decrease in respiratory capacity. The replacement of \nthe copper by iron (and the loss of the copper-enzymes which \nprotect against iron-catalyzed free radicals) probably accounts \nfor the increased fonnation of lipofuscin during aging. When \ncopper-dependent mitochondrial respiration fails, lipofuscin \nhas the ability to sustain energy production through glycolysis \n(by keeping the coenzyme NAD, nicotinamide adenine dinu-\ncleotide, relatively oxidized), so it is possible that lipofuscin is \na primitive sort of defense against stress. \nIn animals , copper supplementation can restore natural col-\nor to white hair, and in one experiment , it increased longevity . \nAt present , there isn't enough knowledge about the safety of \ndifferent ways of administering supplemental copper. It can \nbe toxic, and it oxidizes other nutrients. Besides choosing \n21 \n\nfoods high in copper and low in iron and other heavy metals , \nother dietary choices which support thyroid function will tend \nto promote the retention of copper. Other dietary practices \ncan minimize our production of cortisol (e.g., combining fruits \nand proteins , since protein foods lower blood sugar and \nstimulate the secretion of cortisol) . \nSELF-ORDERING PROCESSES \nAn old idea in our culture , which still inclines many people \nto a \"billiard ball\" conception of mechanistic causality, is that \nmatter must be ordered \"from outside .\" For Descartes, this \ninvolved a material world which lacks \"secondary\" qualities, \ni.e., every quality other than being present in space . That ab-\nstract world was supplemented by an utterly separate world of \nmind and spirit. Descartes' spirit has continued to live in \nmany geneticists, who see \"selection\" as an ordering principle \nimposed upon a stupid sort of material substance, which can \nvary only randomly, by chance . \nThis genetic doctrine has a strong influence on medical \nthinking . Hundreds of diseases have been classified as \"genet-\nic diseases,\" and the idea is extended by showing an increased \nsusceptibility among certain genetic tissue types even to germ-\ncaused diseases and toxic sicknesses . Diabetes, allergies , ar-\nthritis, goiter , and myopia are often said to be \"caused by \ngenes ,\" despite clear evidence for the involvement of the envi-\nronment in producing them . \nSeveral famous molecular biologists have been writing and \nlecturing about their idea that everything in our behavior and \nculture (including art, politics , and language) is specifically \nprogrammed by genes. (It would seem that I performed ge-\nnetic surgery on one of these people , or caused him to mutate, \n22 \n\nwhen I pointed out some glaring errors in his ar,bJUment, and \nsaw that he subsequently changed his claims .) Physical sci\u00b7 \nence provides a much richer picture of the qualities and poten\u00b7 \ntial of the material world than geneticists recognize. Even \nmany physicists don't recognize the richness implied by the \nbody of experimental results in their field. Many well known \nphysical scientists have had relatively holistic attitudes (e.g. , \nJ.c. Bose, Michael Polanyi , B.V. Deryagin , Frederick Soddy , \nV.1. Vernadsky) . A rich view of physics has much to offer to \nbiology . However , when I say that a holistic view of biology \nis open to using physics and chemistry, as well as ecology . \nhistory , and cosmology , to achieve an adequate under stand-\ning, I should mention that there is a school of weird \n(immaterial and \"quantum\" centered) physics which is pres\u00b7 \nenting itself as a holistic world\u00b7view . To them , I think Eins-\ntein's remark still applies : \"You believe in a dice-playing God \nand I in perfect laws in the world of things existing as real ob\u00b7 \njects_ . _ .\" Elsewhere, Einstein observed that an object's fields \namounted to an exten sion of its material substance , i.e., he \npreferred to materialize fields, rather than to demateriali ze \nthings , as some of the popular philosophers of physics do.(6) \nThe orderly , epitaxial growth of crystals has been shown to \noccur across the thickness of a plastic film. A detailed study \nof this sort oflong-range ordering proce ss was made by Alex-\nander Rothen . He was able to demonstrate biologically spe-\ncific adsorption at relatively great distance s. Many other \ntypes of researc h in adsorption field s and long-range order \nmake it clear that the interaction s of atom s and molecules in \ncells needn 't be governed by either direct contact or by ran-\ndom motion . When cell components are rearranged , they re-\nturn to their normal position in relation to other components , \nrevealing a great capacity for self-assem bly or self-ordering . \n23 \n\nThe medical tradition of naturopathy recognizes a great ca-\npacity of the body for self-regulation and self-healing. I think \nthese attitudes can be usefully expanded now , in the light of \nnew knowledge about energy and structure . On the short \ntime scale in which we think about the health of an individual, \nand on the transgenerational scale relating to having healthier, \nmore intelligent children, and on the evolutionary time scale, I \nthink we can see a tendency , not just to preselVe homeostasis , \nbut to move upward in energy and greater generality of struc-\nture and function . To provide more energy and scope for us-\ning it stimulates our ability to use energy meaningfully . \nSOME IMPLICATIONS \nThere is considerable flexibility in living organisms, and in \nhigher and lower levels of organization , and we can see some \nof the ways in which structures of different complexity ac-\ncommodate themselves to the surrounding condition of ener-\ngy and structure . \nThe conditions under which the brain develops , including \ngestational support and the later nutritional , hormonal , and \nbehavioral conditions , the degree of stress and stimulation , \ncontribute to the brain's structural complexity and metabolic \nenergy use, and to the organism's ability to cope successfully \nwith the environment. \nVicious circles of physiology often stabilize an organism on \na low energy level , which may involve disease or rapid aging. \nThe existence of a few systems of positive feedback (self \nstimulation), however , indicates that in our fundamental struc-\nture we are biased in an expansive, upward direction . Proges-\nterone (and its precursors , pregnenolone and cholesterol) and \nthyroid hormones participate in some of the important \n24 \n\npositive feedback systems , involving energy production, stress \nresistance, and brain growth . \nIn therapy and in everyday living we can try to protect and \npromote our energy-producing and energy-using systems by \nseeking the stimulation, the conditions of light and tempera-\nture, and the foods that are appropriate for our evolutionary \nlevel . \nNOTES: \nI) Resonance has to do with approximately simultaneous \ninteractions between energy and matter , and hysteresis , with \nthe lingering effects of earlier interactions of energy and \nmatter. \n2) I circulated a questionnaire in 1957 among college stu-\ndents of various nationalities and classes . My conclusions \nsuggested that the contemporary white male Western abstract \npersonality was dysadaptive , in the sense that many vital abili-\nties or capacities were undeveloped or suppressed. \n3) Progesterone is one of the factors in a \"chemically defi-\nned\" medium for the growth of nerve cells in culture. The \nothers are insulin , transferrin , selenite, and putrescine . \n4) Budyko's idea that energy drives the biosphere is unfa-\nmiliar to our Anglo-American culture, which has tried to think \nof everything, even the weather (and especially evolution) in \nterms of mechanics , inertia , statistics , and hydrodynamics . \nThere is a resistance to the idea of directional, dynamic self-\ngoverning systems . The sun's energy for photosynthesis tends \nto be kept in a background role. \n5) \"Warm organisms\" means either organisms that keep \nwarm by internal heat production and temperature regulation \n2S \n\nor organisms that are warm because they are kept warm by \nthe environment. \n6) Paul Forman, in an article in Studies il1 the His(OIyof \nScience, gives some valuable historical infonnation on the so-\ncial factors involved in Germany of the J 920's, when physic s' \ndeparture from the world of real objects became so \n\u2022 conspicuous. \n26 \n\nCHAPTER 2 \nANOTHER VIEW OF EVOLUTION \nA few people have pointed out that order can't be expected \nto emerge from disorder, even \"if you wait long enough,\" un-\nless an ordering principle , a \"formative tendency,\" is present \nin the starting situation. \"Chaos,\" then, would be described as \n\"potential,\" and the development of organization would be \nmore like a snowball rolling downhill, than like the step-by-\nstep preservation of \"random variations\" over an almost infi-\nnitely long time scale . OUf knowledge of ourselves , and our \nsense of the meaning of life, are influenced by the answer to \nthis basic question about the nature of order , and of the origin \nof life. \nWhen complex organic compounds were found in petro-\nleum , some people argued that this was evidence that the pe-\ntroleum was the residue of dead organisms, that had seeped \ninto porous geological formations . Another view is that pe-\ntroleum was directly created by the earth, and that life is a \nparallel creation . \nIn 1859 , the year Darwin published his famous book , the \nfirst oil well was drilled in Pennsylvania, and chemists began \nto study petroleum with increased interest. When high-carbon \niron is dissolved in hydrochlori c acid, an oil appears on the \nsurface of the acid. Mende1eev noticed that it resembled natu-\nral petroleum , so he gave samples to people who were famil-\niar with petroleum from different parts of the world . All \nidentified its smell as that of petroleum , and some even \nthought they could identify the region it came ITom.(I) \n27 \n\nMendeleev and others proposed that molten metals deep in \nthe earth might interact with the carbon' present in minerals to \ncreate petroleum. \nRecently, Gustaf Arrhenius a
