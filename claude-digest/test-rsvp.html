t normally occur in older \npeople , such as an accelerated pulse.4 \nAlthough direct sunlight damages skin, people generally are \nhealthier in proportion to their exposure to sunlight. \nUltraviolet and blue light produce free radicals in living ma-\nterial , but they penetrate only a few millimeters into tissue. \nYellow , orange, red, and infrared rays penetrate much more \ndeeply . \nSmall organisms are able to set their biorhythms by a very \nweak light. Only bright lights can alter human rhythms. For \nexample , the cycle of body temperature can be changed, or \nthe rhythmic secretion of melatonin can be suppressed by \nlights stronger than 2500 lux. \nThree common biological pigments are able to absorb the \npenetrating red light: Biliverdin , blue copper proteins , and \nmelanin . \nThe presence of melanin in nerves suggests that it should \nbe considered as a candidate for the pigment which allows \nlight entrainment of rhythmic melatonin secretion . \nThe presence of copper proteins in every cell, and in the \nmitochondria , suggests that they should be candidates for the \n77 \n\nred light receptor which promotes respiratory function and \nrestoration of the mitochondria . \nThe presence of copper in the crucial respiratory enzyme , \ncytochrome oxidase, is of the greatest interest. \nBoth copper and light appear to be involved in other as-\npects of respiration, including cyanide detoxification .6 and \npossibly even in activation of the thyroid hormone.7 \nBesides darkness. hypoxia and overload stress (which is \nrelative hypoxia . in a sense) are the main things which damage \nmitochondria . Inhibitory analogs of GABA appear to be pro-\ntective in all types of stress . The anesthetic steroids , such as \nprogesterone , pregnenolone (and possibly DHEA) , also pro-\ntect against injury by stress , and probably work by some of \nthe same energy-sparing mechanisms. \nAnti-dark-stress substances would tend to minimize noctur-\nnal hypoglycemia by various mechanisms , including the inhibi-\ntion of insulin secretion . Acetylcholine and estrogen stimulate \ninsulin secretion. so cholinolytics (e.g., atropine) and anti-\nestrogens (e.g .\u2022 progesterone and DHEA) would tend to in-\nhibit it, and GABA helps by causing insulin uptake by red \nblood cells.1 \nBoth living at a high elevation and having high thyroid \nfunction increase the quantity of mitochondria in cells, and \nthis increase appears to be fairly permanent . Pretreatment \nwith thyroid honnone or with a time at high altitude increases \nthe ability to resist stress. \nLiving at high elevation or having high thyroid function \nalso increases the vascularity of tissues. that is, the number of \ncapillaries per unit of tissue . and increases the quantity of \nblood in the tissue , protecting against hypoxia. \n78 \n\nAvoiding excessive intake of unsaturated fatty acids and \niron will decrease the damage caused by unavoidable stress \n(including darkness). \nAnalogs of the inhibitory nerve transmitter , GABA, protect \nagainst damage to the mitochondria in the natural way that \nsleep does, minimizing the injury caused by cortisol. Milk and \nvarious fruits contain close analogs of GABA , some of which \nspecifically block formation of the catabolic stress enzymes . \nTo the extent that nocturnal stress resembles shock , taking \nsome extra salt at bed-time is logical . It lowers adrenaiin , and \ntends to increase blood volume . In hypoxic stress, tissue re-\ntains water, and increasing the sodium content of the blood \nopposes that tendency. It is often a remedy for insomnia . \nPenetrating red light is possibly the fundamental anti-stress \nfactor for all organisms. The chronic deficiency of such light \nis, I think , the best explanation for the deterioration which oc-\ncurs with aging. Enzyme changes , free radical changes , struc-\ntural and respiratory changes are all involved as consequences \nof darkness stress . \nJust as there are multiple hormonal and nervous systems \nwhich ensure the reliability of our physiology, we should ex-\npect red light to have more than one beneficial function. For \nexample , it could quench excited electrons, desorb inhibitory \ntoxins , maintain enzyme function, mobilize stored copper, and \nregulate the conductivity of subcellular structures. Red light , \napplied within the first several minutes following x-ray or \ngamma irradiation, protects organisms (from bacteria to mam-\nmals) from radiation injury .9 The activation of energy-\ndependent repair processes is clearly involved , but the exact \nphysical and chemical mechanisms still haven't been \ndetermined. \n79 \n\nDuring the winter when there isn't enough sunlight, it is \nhelpful to use seve ral hundred watts of incande scent lights. If \nbulbs with internal reflectors are used, 500 or 600 watts can \nbe bright enough to have a protective biological effect . \nNOTES \n1. G.T. Sukhikh, F.Z. Meerson, and l.I. Mikhaleva, \"Stress \nreduction of the resistance of the organism to tumor growth \nand prevention of this phenomenon by centra l inhibitory meta-\nbolites ,\" Bulletin of Experimental Biology and Medicine , \n1985 , pages 595-597 . \n2. VA Frolov, V.P. Pukhlyanko, and T.A. Kanskaya, \n\"Changes in left ventricular mitochondria in intact rabbits dur-\ning the 24 hour period ,\" Bull. ,\"!cpo Bioi. & Med, 1985 , pages \n353-356. \n3. V.A. Frolov, \"Seasonal structural and functional changes in \nthe rabbit heart,\" Bull. Exp. Bioi. & Med 97(4), pages \n420-423, 1984. \n4. A.L. Maksimov and T.B. Chernook, \"Biorhythmic aspects \nof intercontinental Antarctic adaptation,\" Izvestiya Akademii \nNauk Kirgirskoy SSR No.2, March-Apr. 1986 , pages 35-37. \n5. K. Honma , et aI., \"Entrainment of human circadian rhythms \nby artificial bright light cycles,\" Experielltia 43(5), 1987 , \npages 572-574 . \n6. U.T. Davies, The Clinica l Significance of the Essential \nBiological Metals, c.c. Thomas Publ. , 1972, page 112. \n7. D.o. Hemphill (editor), Trace Substances ill Enviro nmen-\ntal Health , Univ . of Missouri , 1979, pages 360-367 . M.Ya. \nShkolnik, Trace Elements in Plants, Elsevier, 1984, page177. \n80 \n\n8. L.l. Sandulyak, \"Erythrocytes as depots and carriers of in-\nsulin, \" U.'pekhi SovrememlOY Bi%gii /03(2), March-April \n1987 , pages 207-216. \n9. N.Y. Bulyakova and M.F. Popova , \"Stimulation of post-\ntraumatic regeneration of skeletal muscles of old rats after x-\nray irradiation ,\" Bull. Exp. Bioi. & Med. 103(4) , 1987 , pages \n548-550. \n81 \n\nCHAPTER II \nPREGNENOLONE \nMy interest in pregnenolone was the result of an accident. \nI had been experimenting with the solubility of various ste-\nroids. J found that pregnenolone isn't very soluble in vitamin \nE, and I saved the bottle containing vitamin E and pregneno-\nlone to use as a vitamin E supplement. I had another bottle of \npure vitamin E. \nIn 1983 , the ocean current called El Nino caused Oregon's \nweather to stay cloudy and rainy through the summer . I didn't \nhave my usual summer recovery from \"winter sickness,\" and \nby November I was becoming very sick. During a two week \ntrip I felt perfectly well, but except for that short time I kept \ngetting sicker and sicker (with inflammation of arteries, dental \nabscesses , asthma , migraines , and colitis). Lying in bed one \nday trying to understand what had happened during that two-\nweek trip, I remembered that I had used the vitamin E con-\ntaining a residue of pregnenolone on the trip, but used pure \nvitamin E after I got home . I immediately got out of bed and \ntook a pinch of pregnenolone . In about an hour, all of my \nsymptoms had stopped, and for over a week I was healthy and \nenergetic . But then I got sick again, and was so distracted by \nthe pain that it was several days before I remembered the \npregnenolone . Another pinch had the same dramatic sudden \neffect. Since then I have taken some almost every day. While \nI was sick I had pictures made for a passport, but they looked \nso odd that I got several more. The best of those, the least \nhaggard looking, is reproduced here. \n82 \n\n, \nBEli'ORE PRF..GNENOLONE: \nYNn ofdKUnlne: beatth with \"wIn -\nter sickn ess.\" Photograph July. \n1983. ;o.;ote tht drooping !!kin. Eye-\nc(wtrnl by tht saggin\\! ..... AFTER PREGNENOLONE : A ... \ntea wee-h ..... , 50 to 100 nq:. prr \nday. PhotogMlpb m1d-Seplt'mbt'r , \n1984 . I iWSp td that oonnectlv e tb-\nSIW ulls contract almo st like 50lOoth \nmuscle under the tfTects of pngn t-\n\"oltlfl\" ; Ihf'((\" Sf'f'ms to tw turtor \nwithout nltma. \nPregnenolone is known to be produced (in the mitochon-\ndria) from chole sterol. This is the first stage in the production \nof all of the steroid hormone s. Ifpregnenoione synthesis is in-\nsufficient , supplementary pregnenolone would help to main-\ntain an optimum level of the various other steroids . Agin g, \nstress, depres sion, hypothyroidism , and exposure to toxins are \nconditions in which synthesi s of pregnenolone might be \ninadequate. \n83 \n\nIn 1944 factory workers were given daily dose s of pregne -\nnolone and. on alternate weeks . a placebo. During the preg-\nnenolone week s. their piece-work output was significant ly \nhigher. Healthy youn g people who are not under stress do \nnot feel anything from taking even a very large dose (e.g .\u2022 one \ngram) . and no changes have been detected in blood glucose, \nproteins , amino acids . or salts. The urine apparently contains \nmore conjugated steroids (indicated by an increased tendency \nto foam) after taking a large dose of pregnenolone; I think \nlight is the main factor normally causing changes in the conju-\ngated steroid content of urine. \nThe skin and the brain are import ant sites of steroid synthe-\nsis, and they are usually ignored by endocri nologists investi-\ngating steroid hormones . Papa and Kligman (1965) showed \nthat adding pregnenolone or progesterone topically to skin \nwould restore youthful properties to aged skin. I think \nDHEA gives similar results , and (like progesterone) is more \neasily absorbed than pregnenolone. Both progesterone and \npregnenolone seem to improve the efficiency of blood circula-\ntion. I have seen grey -skinned depressed people turn pink and \nstart smiling shortly after taking pregnenolone . \nAbout 1950. pregnenolone was tested on several people \nwith exophthalmia from Graves' disease. and it was reported \nthat their eyes quickly receded toward a more nonnal position \nin their sockets. Having read this, J mentioned it to a desper-\nate woman with horribly bulging eyes. Her left eyeball was \nabout 50% exposed . and the other one was less extreme , but \nstill seriously protuberant. She took some pregnenolone as \nwe talked, and within an hour it seemed to me that her eyes \nwere receding . An hour after she took the pregnenolone. she \nsaid her eyes were feeling much better . I left her city early the \nnext morning, but she telephoned me the next day and claimed \nthat her eyes were completely nonnal. Without seeing her, I \n84 \n\ndon't know exactly what she meant by \"normal.\" This hap-\npened over two years ago, and I hope to visit her city soon to \nsee whether her eyes really became , and stayed , normal. \nFor many years it has been known that steroids , including \ncholesterol , have an anti-toxic effect. The cytochrome P-450 \nfamily of enzymes are an important factor in our resistance to \ntoxins. Moderate amounts of cortisol promote this system , \nbut larger amounts degrade it. Pregnenolone doesn't affect \nthe rate of synthesis of these enzymes, but it stabilizes them \nagainst the normal proteolytic enzymes, increasing their activ-\nity. I believe this stabilizing action is a general feature of \nthese steroids , explaining other anti-toxic effects such as \nblocking hemolysis, and probably many features of growth \nand differentiation, including control of cell division and pre-\nvention of atrophy . \nNOTE: \nAfter using pregnenolone for several years , I noticed that \nthe slack skin and other signs of aging were coming back. \nThat spring I increased my dose of pregnenolone, and did oth-\ner things to promote my own pregnenolone synthesis, such as \nusing larger amounts of coconut oil and getting a little more \nexposure to incandescent light. The effects of the supple -\nments are more noticeable in the summer , since that is when \nthe body's repair processes are greatest . Avoiding the de-\nstructive effects of northern winters (without migrating to the \nsouth) would seem to require artificial lights as bright as sum-\nmer daylight. \n85 \n\nCHAPTER 12 \nRESTORING HAIR COLOR \nLargely because of Albert Szent -Gyorgyi's explorations in \nbiological pigments as factors in cell-regulation and immunity , \nI have paid special attention to severa l pigments , such as \nmelanin , the black or brown pigment of hair and skin, of in-\njured potatoes , and of certain fungi, when damaged . When I \nlived in Montana, I knew many people whose hair became \ngrey in their late I wondered whether it was caused by \nlow thyroid, by an odd mineral balance . by frequent chilling of \nthe skin and scalp, or maybe just by their lack of fresh fruit \nand vegetab les. In Mexico . people in warm, humid tropical \nareas seldom lost their pigment . When I heard Carl Pfeiffer \nspeak, I noticed that both his skin and his hair were free of \npigment, though he was not an albino, and 1 wondered wheth-\ner his various mineral nutritional supplements had contributed \nto his fading . (He took sulfur every day, and avoided copper. \nHe also advocated the use of molybdenum as a nutritional \nsupplement.) \nUntil I was 4 or 5, my hair was white, and I took it as a hu-\nmiliating stigma of sexual in fact, everyone tends \nto darken as they grow up, especially around puberty . Many \npeople have wondered what function the melanin in frogs' \neggs might have , and a few years ago someone demonstrated \nthat it is what binds progesterone in the egg, and suggested \nthat it might have a similar function in other animals and other \ncells. \n86 \n\nA Japanese researcher found that each hair color is asso-\nciated with a certain pattern of several trace minerals . When \nhe removed all the trace minerals , every type of hair became \nwhite . When he added a characteristic pattern of trace miner-\nals, associated with a particular hair color, to a sample of de-\nmineralized hair, the color which was produced corresponded \nto the minerals added , and not to what the original color of \nthe hair had been . He concluded that people inherit a tendency \nto concentrate certain minerals in their hair. \nPeople who studied the effects of steroids on aging skin \nfound that the steroids which reversed structural age changes \nin the skin (progesterone , testosterone , pregnenolone) some-\ntimes restored hair growth . Occasionally , the hair that grew \nwas pigmented . Estrogen and cortisone accelerated the struc-\ntural change s of aging in the skin, but their effects on hair \nwere not mentioned. Vitamin A has anti-estrogen effects in \nskin and other tissues , and part of this effect might result from \nits ability to promote synthesis of pregnenolone and \nprogesterone . \nPhysicians have mentioned that a depigmented spot some-\ntimes appears in the skin over an area where they have in-\njected cortisone . The familiar association of severe stress \nwith sudden greying of the hair also would suggest that exces-\nsive cortisone destroys melanin . The average stress caused by \na particular climate would probably combine with any other \nfactors that are involved in regions where there is more or less \nwhite hair than average . \n1 think oxygen wastage is a central event in aging. Just as a \ncut potato requires oxygen to make melanin, so do our tis-\nsues. Iron tends to keep accumulating in our tissues with ag-\ning, and iron appears to be a factor in wasting oxygen \n(especially in age pigment). When oxygen is deficient, iron \n87 \n\nbecomes very toxic. Copper is involved in a process which re-\nstores iron to its non-toxic fOnTI. \nVitamin C in excess can contribute to the toxicity of iron, \nbut in the right amount , vitamin C is metabolically linked with \nvitamin E in protecting against the toxic free radicals pro-\nduced by iron. Vitamin A also functions as an anti-oxidant, \nwhen the amount of oxygen present is very low--which is \nwhen iron toxicity is at its worst. \nSomeone suspected that copper accelerated aging by caus-\ning free radical reactions , and fed a chelator (gluconic acid) to \nanimals, and extended their lives by 10 or 12% . In his next \nexperiment, he fed them both the chelator and extra copper, \nthinking he would counteract the life extension , but these ani-\nmals lived 22% longer. He next fed copper alone, and found \nthat it extended the life-span by about 11%, so its effect was \nadditive with that of the chelator. I suspect the chelator was \nremoving iron, and maybe other toxic metals. At a dose \nabout SO times larger than nonnal , copper did shorten the life-\nspan by several percent. \nBlack sheep will produce white wool if they are fed an ex-\ncess of molybdenum. This is supposedly caused by a displace-\nment of copper. I think we probably accumulate too much of \nthe wrong metals , such as iron, with aging and stress . \nI had some eyebrow hairs that were pure white; when one \nmatured and fell out, another white one would rcplace it. \nThey grow quickly, and have a short life cycle, so they are \nnice to experiment with. \nI went on a very low iron diet, eating mostly milk, with \nsome eggs, cheese, and citrus fruit, but with very little meat \nfor several weeks. I cooked eggs in a copper pan, to increase \nmy copper intake and to avoid iron absorbed from an iron \n88 \n\npan. I found a source of vitamin A without preservative , and \nbegan using large amounts of that, which I had not done for \nseveral years because of an allergy to the preservative. I in-\ncreased my doses of DHEA and pregnenolone . \nUsually on alternate days, I would rub vitamin A and vita-\nmin E (sometimes with DHEA), or a solution of copper ace-\ntate, into the skin around the white hairs. Within a few \nweeks, the bottom of one of the white hairs had begun to \ndarken (Figure I--the hair on the right) . Another hair (the \ncenter one) came out a couple of weeks later, and was dark-\nened along about half of its length . The third hair (on the left) \ncame out two or three weeks later, and was all black except \nfor 3 millimeters at the tip, which had begun growing about \nthe time the other two were changing color. It has been about \ntwo months since I stopped cooking regularly in copper (the \ntaste gets very tiresome), and none of the hairs has reverted to \nwhite . (The black lines were about 2 mm. apart; they allow \nboth colors to be seen in the xerox copy.) The fine tops of \nthe hairs end at lines 8, 9, and 7, going from left to right; each \nhair has a few mm. of intermediate light brown, which doesn't \nreproduce well. \n'.,.p., .\" '11''1;\u00b7 \u00b7'\u00b7'77\"07' \n\" \" .,\", . II _., 00.,,\" ' \u2022\u2022 \n\" TT \u2022. 0\"\" .. ''(;'.'77,7717' -'.'\" \n89 \n\nCHAPTER 13 \nARTHRITIS AND HORMONE BALANCING \nA very healthy 71 year-old man was under his house repair-\ning the foundation , when a support slipped and let the house \nfall far enough to break some facial bones . During his recov-\nery, he developed arthritis in his hands. It is fairly common \nfor arthritis to appear shortly after an accident, a shock, or \nsurgery , and Hans Selye's famous work with rats shows that \nwhen stress exhausts the adrenal glands (so they are unable to \nproduce normal amounts of cortisone and related steroid hor-\nmones) , arthritis and other \"degenerative\" diseases are likely \nto develop . \nBut when this man went to his doctor to \"get something for \nhis arthritis,\" he was annoyed that the doctor insisted on giv-\ning him a complete physical exam , and wouldn't give him a \nshot of cortisone. The examination showed low thyroid func-\ntion, and the doctor prescribed a supplement of thyroid ex-\ntract, explaining that arthritis is one of the many symptoms of \nhypothyroidism. The patient agreed to take the thyroid , but \nfor several days he grumbled about the doctor \"fixing some-\nthing that wasn't wrong\" with him, and ignoring his arthritis. \nBut in less than two weeks, the arthritis had entirely disap-\npeared. He lived to be 89, without a recurrence of arthritis . \n(He died iatrogenically , while in good health.) \nSelye's work with the diseases of stress , and the anti-stress \nhormones of the adrenal cortex, helped many scientists to \nthink more clearly about the interaction of the organism with \nits environment, but it has led others to focus too narrowly on \n90 \n\nhonnones of the adrenal cortex (such as cortisol and corti-\nsone) , and to forget the older knowledge about natural re-\nsistance. There are probably only a few physicians now \npracticing who would remember to check for hypothyroidism \nin an arthritis patient, or in other stress-related conditions . \nHypothyroidism is a common cause of adrenal insufficiency, \nbut it also has some direct effects on joint tissues . In chronic \nhypothyroidism (myxedema and cretinism) , knees and elbows \nare often bent abnonnally . \nBy the 1930's , it was well established that the resistance of \nthe organism depended on the energy produced by respiration \nunder the influence of the thyroid gland, as well as on the \nadrenal hormones , and that the honnones of pregnancy \n(especially proge sterone) could substitute for the adrenal hor-\nmones . In a sense, the thyroid honnone is the basic anti-stress \nhormone , since it is required for the production of the adrenal \nand pregnancy hormones . \nA contemporary researcher , F. Z. Meerson , is putting to-\ngether a picture of the biological processes involved in adapt-\ning to stress, including energy production , nutrition , \nhormones, and changes in cell structure . \nWhile one of Selye's earliest observations related gastroin-\ntestinal bleeding to stress , Meerson's work has revealed in a \ndetailed way how the usually beneficial hormone of adapta-\ntion, cortisone, can cause so many other harmful effects when \nits action is too prolonged or too intense . \nSome of the harmful effects of the cortisone class of drugs \n(other than gastro-intestinal bleeding) are: Hypertension , os-\nteoporosis, delayed healing, atrophy of the skin, convulsions , \ncataracts , glaucoma, protruding eyes, psychic derangements , \nmenstrual irregularities, and loss of immunity allowing infec-\ntions (or cancer) to spread . \n91 \n\nWhile normal thyroid function is required for the secretion \nof the adrenal hormones , the basic signal which causes corti-\nsone to be fonned is a drop in the blood glucose level. The \nincreased energy requirement of any stress tends to cause the \nblood sugar to fall slightly, but hypothyroidism itself tends to \ndepress blood sugar . \nThe person with low thyroid function is more likely than a \nnonnal person to require cortisone to cope with a certain \namount of stress . However , if large amounts of cortisone are \nproduced for a long time, the toxic effects of the hormone be-\ngin to appear . According to Meerson, heart attack s are pro-\nvoked and aggravated by the cortisone produced during \nstress. (Meerson and his colleagues have demonstrated that \nthe progress of a heart attack can be halted by a treatment in-\ncluding natural substances such as vitamin E and magnesium.) \nWhile hypothyroidi sm makes the body require more corti-\nsone to sustain blood suga r and energy production , it also \nlimits the ability to produce cortisone, so in some cases stress \nproduces symptoms resulting from a deficiency of cortisone , \nincluding various form s of arthritis and more generalized \ntypes of chronic inflammation . \nOften, a small physiological dose of natural hydrocortisone \ncan help the patient meet the stress, without causing harmful \nside-effects. While treating the symptoms with cortisone for a \nshort time, it is important to try to learn the basic cause of the \nproblem , by checking for hypothyroidism , vitamin A deficien-\ncy, protein deficiency , a lack of sunlight , etc. (I suspect that \nlight on the skin directly increase s the skin's production of ste-\nroids , without depending on other organs. Different steroids \nprobably involve different frequencies of light , but orange and \nred light seem to be important frequencies .) Using cortisone \n92 \n\nin this way, physiologically rather than pharmacologically, it is \nnot likely to cause the serious problems mentioned above . \nStress-induced cortisone deficiency is thought to be a fac-\ntor in a great variety of unpleasant conditions , from allergies \nto ulcerative colitis , and in many forms of arthritis. The stress \nwhich can cause a cortisone deficiency is even more likely to \ndisturb formation of progesterone and thyroid hormone , so \nthe fact that cortisone can relieve symptoms does not mean \nthat it has corrected the problem. \nAccording to the Physicians' Desk Reference, hormones \nsimilar to cortisone are useful for treating rheumatoid arthritis , \npost-traumatic osteoarthritis , synovitis of osteoarthritis , acute \ngouty arthritis, acute nonspecific tenosynovitis , psoriatic ar-\nthritis, ankylosing spondylitis , acute and subacute bursitis, and \nepicondylitis. \nAlthough cortisone supplementation can help in a great \nvariety of stress-related diseases , no cure will take place un-\nless the basic cause is discovered. Besides the thyroid , the \nother class of adaptive hormones which are often out of bal-\nance in the diseases of stress , is the group of hormones pro-\nduced mainly by the gonads: the \"reproductive hormones .\" \nDuring pregnancy these hormones serve to protect the devel-\noping baby from the stresses suffered by the mother , but the \nsame hormones function as part to the protective anti-stress \nsystem in the non-pregnant individual , though at a lower level. \nSome fonns of arthritis are known to improve or even to \ndisappear during pregnancy. As mentioned above, the hor-\nmones of pregnancy can make up for a lack of adrenal cortex \nhormones. During a healthy pregnancy , many hormones are \npresent in increased amounts , including the thyroid hormones. \nProgesterone , which is the most abundant hormone of \n93 \n\npregnancy , has both anti-inflammatory and anesthetic actions , \nwhich would be of obvious benefit in arthritis . \nThere are other protective hormones which are increased \nduring pregnancy . These include DHEA , which is being stu-\ndied for its anti-aging, anti-cancer, and anti-obesity effects . \n(One of the reasons that is frequently given for the fact that \nthis hormone hasn't been studied more widely is that, as a \nnatural substance, it has not been monopolized by a drug pat-\nent, and so no drug company has been willing to invest money \nin studying its medical uses.) Some of these hormones also \nhave the ability to control cell division , which would be im-\nportant in forms of arthritis that involve invasive tissue \ngrm.vth . Since DHEA can be easily metabolized into testos-\nterone (by the skin, for example), and into estrogen, I don't \nthink it should ever be administered alone , without an ap-\nproximately natural balance of pregnenolone and \nprogesterone. \nWhile these substances , so abundant in pregnancy , have the \nability to substitute for cortisone , they can also be used by the \nadrenal glands to produce cortisol and related hormones. But \nprobably the most surprising property of these natural steroids \nis that they protect against the toxic side-effects of excessive \nadrenal hormones. And they seem to have no side-effects of \ntheir own; after about fifty years of medical use, no toxic side \neffects have been found for progesterone or pregnenolone . \nPregnenolone is the material the body uses to form either \nprogesterone or DHEA. Other natural hormones , including \nDHEA, haven't been studied for so long, but the high levels \nwhich are normally present in healthy people would suggest \nthat replacement doses , to restore those normal levels , would \nnot be likely to produce toxic side effects. And, considering \nthe terrible side effects of the drugs that are now widely used , \n94 \n\nthese drugs would be justifiable simply to prevent some of the \ntoxic effects of conventional treatment . Especially during \npregnancy , it would seem logical to use the natural hormones \nand to avoid toxic drugs . \nIt takes a new way of thinking to understand that these \nprotective substances protect against an excess of the adre-\nnal steroids, as well as making up for a deficiency . Several of \nthese natural hormones also have a protective action against \nvarious poisons--Selye called this their \"catatoxic\" effect . \nBesides many people whose arthritis improved with only \nthyroid supplementation , I have seen more than 30 people use \none or more of these other natural hormones for various types \nof arthritis, usually with a topical application. Often the pain \nis relieved within a few minutes . I know of several other peo-\nple who used progesterone topically for inflamed tendons , \ndamaged cartilage , or other inflammations. Only one of these, \na woman with rheumatoid arthritis in many joints , had no sig-\nnificant improvement. An hour after she had applied it to her \nhands and feet, she enthusiastically reported that her ankle had \nstopped hurting , but after this she said she had no noticeable \nimprovement. (I applied it the first time , but I never saw her \nagain, and I suspect she didn't apply it as thoroughly as I had, \nmixing it with oil at the time of application .) \nWe often hear that \"there is no cure for arthritis, because \nthe causes are not known .\" If the cause is an imbalance in the \nnormal hormones of adaptation and resistance, then eliminat-\ning the cause by restoring balance will produce a true cure. \nBut if it is more profitable to sell powerful drugs than to \nsell the nutrients needed to form natural hormones (or to sup-\nplement those natural hormones) we can't expect the drug \ncompanies to spend any money investigating that sort of cure. \nAnd at present the arthritis market amounts to billions of \n95 \n\ndollars in drug sales each year. A drug company representa-\ntive recently told me that a substance which cures arthritis \nisn't a desirable product ; a good drug (from his company's \npoint of view) is one that has to be used for the rest of the pa-\ntient's life. \n96 \n\nCHAPTER 14 \nTHE CARPAL TUNNEL SYNDROME \nWhen a physician chooses the most profitable diagnostic \nand therapeutic approaches to a health problem, it is likely to \nbe considered fraudulent if the doctor is a chiropractor , but \nnot if the doctor is a surgeon. If a naturopath tells you that \nbed rest is the best treatment for a ruptured spinal disc, sur-\ngeons will warn you about the dangers of quackery , but the \nresearch clearly shows that, for safety and efficacy , surgery is \ndistinctly inferior to bed rest. \nThere are many other situations in which doing nothing , or \nusing a more conservative treatment , is clearly superior to the \nstandard medical or surgical treatment , but the medical indus -\ntry has learned how to control public opinion by manipulating \nthe mass media . \nBy consulting with thousands of women who believed they \nhad a hormone imbalance of some sort that their physicians \ncouldn't identifY , I began to see several clusters of symptoms \nthat responded immediately to a rational nutritional and hor-\nmonal anti-stress program. One of these clusters might be \ncalled Subtle Constellation of Absorbed-Mucoprotein-related \nsigns and symptoms, or possibly sub-clinical myxedema, \nthough neither term is likely to be widely adopted in the medi-\ncal community . \nWomen are several times more likely than men to have \n\"thyroid disease ,\" simply because estrogen tends to block thy-\nroid function . Estrogen-induced thyroid hypo-function can be \ncompensated to some degree by various honnonal \n97 \n\nadjustments ; elevated secretion of adrenalin and cortisol are \ncommon. When the compensation is inadequate , there will of-\nten be hypoglycemia and a tendency to form too much hista-\nmine . Too much adrenalin will cause cold hands and feet, too \nlittle will cause orthostatic hypotension (blacking out when \nyou stand up too quickly) and bowel spasms , for example . \nVarious water-binding glycoproteins are fonned under the \ninfluence of honnones or stress, but whatever proteins are in \nthe blood, including albumin , will show up outside the blood \nvessels , around the tissue cells, when the blood vessels be-\ncome leaky . Low thyroid, high estrogen, and high histamine \nare known to increase the permeability of blood vessels . \nPatients who have myxedema typically have mitral valve \nprolapse, and at autopsy it can be seen that the valve is thick-\nened into a jelly-like mass . Many women with the pre-\nmenstrual syndrome have a mitral valve heart murmur \npremenstruall y, but not at other times of the month. The jelly \ncan be formed and removed fairly quickly . \nOld text-books on the thyroid gland often listed emphyse-\nma as a symptom of myxedema. When rats are given a large \ninjection of estrogen, the oxygenation of blood in their lungs \nis sharply decreased in less than an hour . Although it is not \ncommon to test oxygen diffusion in humans , I know of two \nwomen in the same family who showed very poor pulmonary \noxygen diffusion after they were put on high doses of estro-\ngen. (Since estrogen inhibits thyroid secretion, and hypothy-\nroidism is associated with elevated estrogen, they should be \nconsidered together.) Leakage of proteins ITom capillaries in \nthe lungs is probably responsible for the decreased diffusion , \nby thickening the layer through which the oxygen must \ndiffuse . \n98 \n\nWhen myxedema exists in childhood, the cartilage in joints \nswells , and is defonned, causing a characteristic knock-kneed \nappearance. In a milder fonn , the swelling can cause joint \npain that doesn't involve the characteristic inflammation of ar-\nthritis. In a mild fonn, the calf muscles tend to swell after \nprolonged activity; the \"growing pains\" that are so common \naround the beginning of puberty are probably the result of a \ntemporary hypothyroid edema of the leg muscles. \nWhen a tendon swells, it is sometimes the result of a local \ninjury or of a particular over-use of a muscle, and in these \ncases local treatment can sometimes produce a permanent \ncure. But when the problem keeps recurring , or keeps show-\ning up in different areas , there is probably a general hormonal \nproblem . \nWhen a tendon in the wrist swells , it can cause numbness in \nthe hand , by pressing on a nerve which passes through the \ncarpal tunnel with some tendons . The tunnel is formed by a \nligament that holds the tendons in place , and swelling of the \nligament itself can contribute to compression of the nerve . \nEven the connective tissue that forms the nerve sheath itself \ncan swell. Many people with undiagnosed hypothyroidism \ncomplain that they \"have poor circulation ,\" and that their \nhands and feet go to sleep easily . These are two separate (but \nrelated) problems that can be relieved through a nutritional \nand hormonal anti-stress program. \nLow thyroid people often have cold hands and feet, and \nthey often have nerves that are over-sensitive to compression . \nPoor oxygenation is involved in edema , both as cause and \nconsequence . (I discuss this in more detail in \"A Unifying \nPrinciple ,\" chapter 7.) \nThus, swelling can cause compression and nerve injury in a \nway that is exacerbated by certain postures or repetitive \n99 \n\nnerves and arthritis commonly follow treatment of the carpal \ntunnel syndrome by surgery or local cortisone injection s. \nGlaucoma , a swelling of the jelly inside the eye, seems to re-\nsult from a honnonal imbalance, since it can be relieved quick-\nly by a natural hormone . Graves' disease , in which the \nmuscles behind the eyes swell, can also be aided by similar \ntreatments . In addition , \"epilepsy\" and symptoms ascribed to \n\"multiple sclerosis\" have been relieved by natural anti-stress \nand anti-edema honnones . \n100 \n\nCHAPTER 15 \nTHE PREMENSTRUAL SYNDROME \nFor at least 80 years, a syndrome of premenstrual tension \nhas been recognized and considered to be the result of an \novarian hormone imbalance. As early as 1912 , Annour & Co. \nwas selling desiccated corpus luteum for use in cases of ovari-\nan failure. and said that it \"prevents nervous symptoms ac-\ncompanying\" menstrual abnormalities. (New and Nonofficial \nRemedies , 1912 , Supplement , pages 158, 160.) It was also \nused to treat obesity and other physical conditions sometimes \nassociated with \"ovarian deficiency .\" \nBy the 19305 , when the specific ovarian steroids were iden-\ntified , there was a clear consensus that estrogen and proges-\nterone were involved in the syndrome, but there was some \nconfusion over the question of whether the cause was high es-\ntrogen or low progesterone. It seems to have been French en-\ndocrinologists who pointed out that either high estrogen or \nlow progesterone can cause the typical cyclic premenstrual \nsymptoms , since it is the ratio of estrogen to progesterone \nwhich determines the nature of the physiological response . \nBy the mid-1930s pure progesterone was on the market in the \nUnited States and Europe, and was widely used to treat prob-\nlems of pregnancy, menopause , dysmenorrhea, and the pre-\nmenstrual syndrome . \nAlthough it has been only in the last 20 years that animal \nstudies of the behavioral effects of the steroid hormones have \nbecome subtle enough to explain their role in emotions , de-\npression, aggression, etc., the more physical dangers of \n101 \n\nexcessive or unoppo sed estrogen were clearly recognized by \nthe late 1930s and the early I 940s: It was, for example , \nknown to cause cancer , infertility and miscarriages , excessive \nblood clotting , edema and a shock-like stress reaction . Other \ntoxic effects of estrogen--seizures, birth defects , toxemia of \npregnancy , increased intraocular pressure , atrophy or necrosis \nof various tissues , etc. --continued to be discovered. while the \nopposing steroid. progesterone , was found to offer protection \nagainst these , and still other, toxic effects . \nAlthough the premenstrual tension syndrome, in its behav-\nioral and subjective aspects is now recognized as a significant \n(and treatable) problem affecting a very large proportion of \nwomen in their reproductive years, another very important is-\nsue is that the honnone imbalance which causes the pre-\nmenstrual discomfort and disability also predisposes the \nsufferer to serious organic problems . \nWhile both animal studies and human studies have shown \nthat natural and synthetic progestins protect against estrogen-\ninduced cancers, and some other diseases, only natural pro-\ngesterone is recognized as having general value in the treat-\nment of the premenstrual syndrome. This is apparently \nbecause natural progesterone has a broad spectrum of intrinsic \neffects, and is easily metabolized into other active hormones \nas needed , that is, it is a basic precursor substance . It has \nbeen tested in isolation on practically every type of tissue, \nwhere it seems to have a stabilizing action: nerve, smooth \nmuscle , cardiac muscle , epithelial cells, cells of the immune \nsystem , etc. It is anti-spasmodic. anti-inflammatory, anti-\nmitotic in certain tissues, and (at high concentration) anesthet-\nic. Its use before and during pregnancy has been associated \nwith a lower than normal incidence of birth defects . \n102 \n\nAlthough natural progesterone has a broad spectrum of ac-\ntion and is remarkably free of side effects , the use of natural \nprogesterone has been limited by the expense and inconve-\nnience of the forms commonly used . Some women continue \nto use suppositories, because they do offer some relief of \nsymptoms, even though they are very messy, and they are \nnecessarily expensive, since only 5% or less of their proges-\nterone content can be absorbed . \nInjectable progesterone is both inconvenient and expensive . \nThe form commonly used contains 10% benzyl alcohol , as a \nsolvent and as a local anesthetic , since progesterone is not \nsufficiently soluble in ordinary vegetable oil, and can be pain-\nful when injected as an aqueous suspension . However, benzyl \nalcohol has significant toxicity to nerves , and can produce \nanaphylaxis.{ 1) Benzyl alcohol , in contact with tissue, \ncombines with water , causing progesterone to be deposited as \ncrystals. Even if oils needed a \"bacteriostatic agent ,\" the \nquantity used with progesterone has no justification except as \na solvent , but it is not described as such. The fact that injected \nprogesterone has been beneficial, in spite of the neurotoxicity \nand instability of the solvent, is another illustration of the pro-\ntective action of progesterone. \nMicropulverized progesterone is expensive when taken \norally, since it is poorly absorbed , and when absorbed it is \nquickly inactivated by glucuronidation, since it is exposed to \nenzyme action in the wall of the intestine itself and in the liver, \nif the individually absorbed molecules get that far before being \ninactivated . \nSubstances, even including peptides, which are absorbed by \nthe chylomicron pathway , reach the general circulation with-\nout being exposed to the inactivating glucuronide-transfer en-\nzymes of the intestine or liver. People often speak of \n103 \n\n\"avoiding the liver on the first pass,\" but in fact chylomicrons \npass through the liver many times before they are destroyed ; \nafter an hour , 10% of the chylomicrons are still circulating . If \nprogesterone is taken orally in oil in a truly solvated state, in a \nmonomolecular dispersion , it will enter the blood via the pro-\ntected chylomicron route . Merely mixing finely powdered \nprogesterone crystals with oil will not allow it to enter as chy-\nlomicrons ; the size of chylomicrons is very small. They are \nusually about 4000 Angstrom units in diameter . \nFats taken orally are almost 100% absorbed by the small in-\ntestine. Like other hydrophobic substances , progesterone will \nbe absorbed by adipose tissue and by the brain , but, unlike \nother steroid hormones , it also tends to be absorbed by red \nblood cells. Typically , the concentration of progesterone in \nred blood cells is twice that of the serum.(2) (And the brain \ncontains a still higher concentration .) These intracellular reser-\nvoirs of progesterone tend to prolong the elevated blood lev-\nels resulting from the absorbed chylomicron-progesterone , so \nthat the observed honnone levels after a single oral dose are \nmuch more stable than are the triglyceride levels after a single \nfatty meal. Typically , after a single oral dose of 100 mg. of \nperfectly dispersed progesterone, a post-menopausal woman's \nserum progesterone level will still be in the \"normal luteal \nphase range\" 24 hours later. The difference in efficiency--and \ntherefore in cost--between this form and the various crystal-\nline dispersions is very large . \nNatural progesterone therapy in the form described above \nremains the most direct and general treatment for PMS; thy-\nroid and vitamin A, and other normaJizers of mitochondriaJ \nrespiration , such as red light and short chain saturated fats, act \nin the same direction . Fiber, bowel stimulants and anti-\nspasmodics, and broad spectrum bowel \"disinfectants\" such as \nflowers of sulfur, sodium thiosulfate , and short and medium-\n104 \n\nchain saturated fatty acids , can contribute to alleviation of \npremenstrual symp toms (as discu ssed in other articles) . Peni-\ncillin can also tentativel y be added to the rational therapies for \nPMS , as a flora-normali zing one-time or occasional treatment , \nthou gh I think the other method s are so effective that any \nneed for penicillin would be rare. \nMy first suggestion for someone with PMS is to avoid thy-\nroid suppression (diet ; darkne ss and endurance exercise \nshould be avoided), and to use my carrot salad recipe : Grated \ncarrots, vinegar , coconut oil and salt are the essentials , garlic \nand olive oil are optional. Aceti c acid and fatty acids released \nfrom the coconut oil act at different levels , and the carrot fiber \nis a timed-relea se system which also binds toxin s and stimu-\nlates the bowel; the salt spares magnesi um and tends to inhibit \nexcessive prolactin release . Use of a balanc ed thyroid \n(Armour or Proloid) supplement can help to restore normal \nthyroid function by breakin g the cycle of stress. If these \nmethod s aren't enough , progesterone or pregnenolone can be \nsupplemented. Both of these help to normalize thyroid func-\ntion, and both have the \"catatoxic\" function of protectin g \nagainst a wide range of toxin s. \nREFERENCES \nI. T. E. Feasby, et al., \"Neurotoxicity of bacteriostati c water,\" \nN. Engl. J. Med. 308(6): 966-7,1983. \nE. T. Kimura , et aI., \"Parenteral toxicity studies with benzyl \nalcohol ,\" Taxieo l. Appl. Pharmacal. 18: 60-68 ,1971. \n1. A Grant, et aI., \"Unsuspected benzyl alcohol hypersensiti-\nvity,\" N. t:ngl . .J. Med. 306(2) : 108, 1962. \n2. E. Mulder , et al., \"Metabolism of fTee and conjugated ste-\nroids by intact and haemo lysed mammalian erythrocytes,\" \nBiochem. Biophys. ACla 260: 290-297 , 1972 . \n105 \n\nCHAPTER 16 \nRESTORING FERTILITY \nSince my study of the role of oxygen in fertility , between \n1970 and 1972, I have concentrated on working out the im-\nplications of what I observed , and have written very little \nabout the treatment of infertility. But every time someone \nwould mention that they were unable to get pregnant, I would \nexplain what could be done , and they would get pregnant , \nusually within a few weeks . The trick is simply to norma1ize \nthe use of oxygen , by normalizing everything related to hor-\nmones and nutrition. \nAGE LIMIT CONSIDERATIONS \nSeveral years ago, a friend of mine had a healthy baby a \nfew months after she had begun using sma11 supple'!Jents of \nhormones , and several years after her early menopause . I \nwondered whether age or the absence of menstruation might \nbe almost irrelevant to fertility , if the right balance and se-\nquence of hormones could be achieved . \nA gynecologist I knew had been giving his wife progester-\none since she was about 40, and at 60 she was youthful look-\ning, and still menstruating. I have known of many women \nwho still menstruated at 55, and--since diet and light and \nstimulation powerfully affect metabolism of honnones--it is \neasy to imagine that natural conditions could sometimes help \nto preserve fertility beyond that age. \n106 \n\nA grave monument in St. Peter's Church in East Oxford re-\ncords the death of a woman in childbirth at the age of 62. \nThe old medical and obstetrical journals have many reports \nof women who had children long after menopause . \nDepasse (Gazette Medical de Liege, Oct. I, 1891) de-\nscribed a woman who had a child at the age of 59 years 5 \nmonths . and who suckled the baby , and weaned it on her 60th \nbirthday . Her menopause had occurred 10 years before the \npregnancy. \nThe famous American physician , Benjamin Rush (in Medi-\ncal Inqu iries and Observations , Philadelphia , 1805) described \na woman of 60 who had a child . \nWallace (Philosophical Transactions of the Royal Society \nof London , vol. xxii, Page 543) reported a woman on the Isle \nof Orkney who had a child when she was over 60. \nThere have been a few reports of children borne by women \nof 70 (L'Union Medical du Canada, Montreal, Dec. 3, 1881) , \nand older (Mayham, in Medical Standa rd, Chicago , Jan. \n1891) . \nThere are a few accounts of even older women who had \nhealthy babie s, and occasionally a calcified fetus is found in \nthe uteru s of an extremely old woman during autopsy . The \nassumption that the \"child-bearing years\" end around the age \nof 50 has led to the conclusion that such fetuses have re-\nmained \"in utero\" for decades , but no one knows how long \nthe calcified fetus can persist in the uterus. \nTaboos undoubtedly influen ce the willingnes s of pregnant \nold women to tell their true age. Similarly , our cultu res have \ntended to blame women for all reproductive problems. (In \nNutrition for Women, I discussed some of the evidence that \n107 \n\nbirth defects are often the father's contribution , hut since then \nthe evidence in support of that view has become much clearer. \nMale geneticists used to have a little spiel which \"explained\" \nwhy women were responsible for Down's syndrome , etc., but \nit actually explained nothing .} \"Everyone knows\" that old \nmen can produce children far beyond the age at which women \nbecome infertile . Our culture honors old rnen who can repro-\nduce , and so the claims of fatherhood at a great age are likely \nto be more numerous than the claims of mothers that they are \nvery old. I knew a man in his 80s whose pretty wife of about \n30 had a baby, but not everyone believed he was the father. \nHowever , when a woman has menopause at the age of 47, \nmarries a 22 year old man when she is 52, and has children \nwhen she is 53 and 54 (Cachot, in Pacific Medica1 and Surgi-\ncal Journal , vol. xxvi, page 394, 1883-4) , there can't be the \nsame sort of doubt. In the latter case, one could assume that \na young husband optimized the couple's fertility . \nSince both parents are involved in reproduction, couples \nthat want to have children must consider the health of both. \nThyroid and pregnenolone and vitamin E are as important for \nmale fertility as thyroid and proge sterone and vitamin E are \nfor female fertility. (For example, supplernentary thyroid and \npregnenolone can raise a man's sperm count, by overcoming \nthe effects of stress.) \nTHE MECHANISMS OF FERTILITY \nSince it helps to have information from blood tests, physi-\ncians are often involved , and it is important that both the \nwoman and her doctor be aware of what the other is trying to \ndo. For example, the thyroid hormone, triiodothyronine (T 3)' \nis a key element in producing the energy needed for pregnan-\ncy to begin , but if there isn't enough cholesterol circulating in \n108 \n\nthe blood , it will be impos sible to synthesize enough proges-\nterone (and other steroids). Too much carotene , too little vita-\nmin A, not enough magnesium or sodium, and too much \ncortisol are common1y overlooked factors in infertility . \nIt isn't uncommon for women to experience monthly peri-\nods several months into even when there isn't \ncontinued monthly bleeding , the cervical mucus test will of-\nten show that there is a cyclic monthly shift toward estrogen's \ndominance. These are times when the probability of a miscar-\nriage is increased. \nThe most common time for miscarriages is at the ninth \nweek . At this time Gust as the placenta is about to take over \nthe bulk of hormone production from the ovaries) there is \nnormally a brief decrease in the ratio of progesterone to estro-\ngen. The decreased ratio of progesterone to estrogen is char-\nacteristic of normal menstruation, and when it occur s during \npregnancy, there will be either some degree of bleeding or a \nchange in the structure of the mucus, if not a miscarriage . Es-\ntrogen lowers the availability of oxygen , and progesterone in-\ncreases it. Bleeding is caused by changes in the blood vessel \n(spasm followed by dilatation) promoted by nerves , under the \ninfluence of estrogen and the resulting oxygen-deficiency . \nThe rate and quality of fetal development is influenced by \nthese hormone balances . \nIn animal experiments, an appropriate dose of estrogen ter-\nminates pregnancy at any stage. It is clear that lack of oxygen \ncaused by estrogen dominance is a major factor in miscarriage \nat any stage . The six-day-old embryo suddenly becomes de-\npendent on oxygen , just at the moment of readiness for im-\nplantation . Only a small excess of estrogen is needed to \nprevent implantation of the embryo , because progesterone is \nproduced in relatively small amounts at that early stage , but \n109 \n\neven late in pregnancy a dose of estrogen sufficient to over-\nride the effects of progesterone can destroy the fetus . \nIn smaller doses, estrogen damages the fetus without killing \nit, by stopping brain growth , for example . In the later stages \nof pregnancy , any slight oxygen deficiency causes an exces-\nsive use of glucose , as a partial compensation , and the result-\ning hypoglycemia can cause symptoms in the mother while \ndamaging the fetus . Morning sickness. temporary blindness , \nfainting , and seizures are common effects of low blood sugar , \nespecially after the fifth month , when the baby's brain is grow-\ning rapidly and consuming increased amounts of glucose . \nAdequate protein, glucose , and sodium to maintain blood \nvolume will prevent most of these problems of later pregnan-\ncy, unless the honnonal imbalance is very bad. Milk and fruit \njuice taken several times a day are usually helpful. Body tem-\nperature and pulse rate should be monitored , to see whether \nthe metabolic rate is approximately normal. Sometimes , a \nsingle dose of progesterone can norma1ize a pregnancy, but \nboth thyroid and progesterone should be considered for im-\nproving fertility and preventing miscarriage . Women who \nused progesterone before getting pregnant had babies with a \nvery low incidence of congenital defects (roughly 1/10 the \n\"normal\" rate), and women who used sizable amounts of pro-\ngesterone during pregnancy had outstandingly superior babies . \nThe things which sustain fertility , in its simple sense , also are \nthe things which optimize the life of the child . \n110 \n\nPART THREE: \nREGENERATING KNOWLEDGE \n\"As the true method of knowledge is experiment, the \ntrue faculty of knowing must be the faculty which \nexperiences. \" \nW. Blake \nOur organism has requirements that must be recognized , \nand one of these is the need to know , to have intellectual ade-\nquacy . Knowing takes energy, and our experience is in-\nfluenced by our biological state . We can improve our \ndevelopmental conditions, socially and materially , to bring our \nspecies up to a higher level cfmenta! energy . In this section , 1 \ndiscuss some of the biological , social , and ideological aspects \nof the problem--the problems of how to overcome inertia and \nfoster creative knowing. \nI I I \n\nCHAPTER 17 \nYOUTH, ENERGY, AND REGENERATION \nBeing alive is good for you. But our culture is saturated \nwith arguments to the contrary--that it is life which kills us, \nand self-denial which sustains us. It is always easier to blame \nthe victim than to searc h for the real cause of a problem. In \nthis chapter J will give some of the arguments in favor of life \nand more life, or rather , some of the evidence ITom which \nthose arguments can be made . \nFifty years ago, Clyve McCay reported that restriction of \ncalories in the diet increased animals' longe vity. At that time, \nmany biologists believed in an innate and universal \"metabolic \npotential,\" according to which each gram of living tissue \ncould produce only a certai n number of calories of energy \nmetabolically, beyond which it must decline and die. In Ray-\nmond Pearl's version, this limit was governed by heredity, and \nwas originally demonstrated by showing that different indi-\nvidua l organisms could survive total energy deprivation for \ndifferent lengths of slow metabolism postponed starv ing. \n(Obviously , starvation has no logical connection with aging.) \nLater, Pearl argued that more inten se activity accelerated \n\u2022 agmg. \nThere are now many people who argue that a low metabol-\nic rate, a low body temperature and slow heart beat indicate \nthat you shou ld live a long time: \"your heart can beat only so \nmany times.\" Most of these people also advocate \"condition-\ning exercise,\" and they point out that trained runners tend to \nhave a slow heart rate. (Incidentally , running elevates \n112 \n\nadrenalin, which causes increased clumping of platelets and \naccelerated blood clotting . Hypothyroidism--whether pre-\nexisting or induced by running --slows the heart , raises the \nproduction of adrenalin , and is strongly associated with heart \ndisease, as well as with high cholesterol.) \nEarly in the century , Alexis Carrell showed the importance \nof environmental factors in the aging process , by keeping \nchicken cells alive and functioning for many years beyond the \nchicken's normal life-span . In 1927 , Gennan researchers re-\nported that a fat-free diet prevented the occurrence of sponta-\nneou s cancers in rats. Since , a little later, other worker s \nfound that the elimination of unsaturated fats from the diet not \nonly prevented cancer , but also caused a large increase in the \nmetabolic rate, it might have been possible to conclude that it \nis not living which kills us, but something in the environment. \nSome people did draw that conclusion, but research funds go \nmainly to product-oriented research, and \"the environment\" \nhas been hard to package as a product. \nCarrell's work involved frequent changes of the fluid that \nthe chicken cells were growing in. Later , Hans Selye did an \nexperiment in living rats that seems to relate to the importance \nof frequent changes in the growth medium . Selye implanted \nglass tubes under rats' skin, and found that they were soon en-\ncapsulated by fibrous tissue, and that a filament of tissue then \ngrew down the tube , joining the membranes at the ends. \nWhen left undisturbed , this filament, isolated from the circu-\nlatory system , underwent very rapid aging . \nBut when SeJye drained the fluid at frequent intervals, the \nage-changes were prevented , and even when the rats died of \nold age, the filaments still appeared to be young . Another \ngerontologist, who had an extremely old and decrepit dog, re-\nmoved, a little at a time, the dog's blood , discarded the serum , \n113 \n\nand replaced the cells suspended in a saline solution; the dog \nappeared to be rejuvenated , and regained all its normal func-\ntions. The blood serum from young animals or people sup-\nports better cell growth in vitro than does the serum from \nolder individuals. \nTwo clear differences have been found between old blood \nand young blood . The albumin in old blood is in a more oxi-\ndized state . (I think it was the famous gerontologist, Verzar , \nwho first reported this.) Although , at least in aging humans, \nthere is much less oxygen in the blood, something causes the \nalbumin to be in a more oxidized state in older blood. The \nother distinct feature of older blood might also seem para-\ndoxical at first: the red blood cells are younger . That is, in an \nold individual, the red blood cells are more fragile--possibly \nfrom being more quickly damaged from oxidation --and are re-\nplaced sooner, and so, on average, they are many weeks \nyounger than the cells in a healthy young individual. \nNeither of these features is paradoxical. Poor oxygenation \nis a stress, and causes the waste of glucose and compensatory \nmobilization of fat from storage , and the relatively reducing \nenvironment in the cytoplasm causes the mobilization of iron \nfrom storage , in the toxic reduced (ferrous) form . Products of \nthe peroxidative interaction of iron with unsaturated fats are \nevident in the blood (and other tissues) during stress, and es-\npecially so in older animals . \nSeveral things relating to calorie-restricted diets are not \ngenerally known. First , in 1987 , Schroeder found that the re-\nmoval of toxic heavy metals ITom the diet had the same effect \nas caloric restriction . Second, although underfed animals \ngrow more slowly , their metabolism is not necessarily de-\npressed . (In fact, animals on a low protein diet have a higher \n114 \n\nrate of oxygen consumption than do the animals that eat a \nmore normal diet.) \nMany older studies found that rats which were deficient in \nthe \"essential fatty acids\" had the signs of hyperthyroidism, \nand were in a hyper-metabolic state . The avoidance of oxida-\ntively toxic heavy metals , and the maintenance of respiration, \nwith an absence of the highly peroxidizable unsaturated fats in \nthe diet (and a lower level of them in the storage tissues) \nwould probably make the animals tolerate stress better (EF A \ndeficient mitochondria are more resistant to oxidative injury , \nand vitamin E prevents many stress-associated problems), and \nmight inhibit the age-related oxidative changes in serum albu-\nmin, red blood cells, and other tissues . \nA third finding related to dietary restriction concerns pro-\ntein turn-over. One of the basic metabolic changes in aging is \nslowing of the rate of protein tum-over in cells, and it ap-\npears that dietary restriction enhances the protein tum-over \nrate in aging animals. I think it is likely that unsaturated fats \nand the amino acid, cysteine, both contribute to the age-\nrelated retardation of protein metabolism, but I don't think this \nhas been directly tested yet. \n(In reading the published research on dietary restriction and \nthe effects of unsaturated or saturated fats, it is important to \npay careful attention to the actual composition of the diet. \nThe cancer rate, for example, usually reaches a maximum and \nlevels off at a com oil content of less than 10% of calories, \nbut this content is often called a \"low fat\" diet. If a normal \nand low calorie diet both contain 6% com oil, which is clearly \ncarcinogenic , the animal s which eat less food will eat tess corn \noil, and will also tend to burn it more completely for energy , \nso there will be a major difference in the toxic effects of oil. \nLard is often the same as soy oil in linoleic acid content , yet it \n115 \n\nis too often described as a \"saturated fat,\" I read a publication \non the effects of a \"low fat\" diet, which contained 20% com \noil; sometimes I feel there is a deliberate attempt to mislead \nwhen language is used so arbitrarily.} \nBesides the observation of greater oxygen consumption in \nthe low fat animals , and high protein tum-over in calorie re-\nstricted animals, there are observations in a variety of organ-\nisms associating a higher metabolic rate with greater \nlongevity . While most longevity studies of flies involved al-\ntering the temperature of their environment, studies of differ-\nences of metabolic rate at a given temperature have in several \ncases found greater longevity in the high metabolizers. A \nstudy of 18 strains of mice found a clear association between \na higher metabolic rate and greater longevity . 1 Recent studies \n(e.g., Joseph Graves') are showing similar associations in \ninsects . \nSacher popularized the idea that a larger brain is associated \nwith a longer life span. and others more recently have refined \nthe idea in connection with body size, index of cephalization . \nand metabolic rate. For example, M. A. Hoffman (\"Energy \nmetabolism, brain size, and longevity in mammals,\" Quar. \nRev. Bioi. 58(4),495-512) said \" .. .it has been shown that the \nratio of cortex- to-brain metabolic rates is independent of body \nsize, and increases with the evolutionary level of brain devel-\nopment .\" (Figure I) It is interesting to consider that birds \ngenerally live longer than mammals of the same weight , \nthough their brains are usually smaller, and their body tem-\nperature is several degrees warmer . Among birds , parrots and \nother relatively large -brained birds have an extremely long life \nspan, compared with mammals of the same body size. For ex-\nample , a rat lives about 2 years, at 98 degrees F., and a me-\ndium sized parrot lives about 70 years, at 104 degrees . \nAccording to H. Rahn (\"Time , energy, and body size,\" \n116 \n\nchapter 16 in Physiology , editors C. V. Page-\nnelli and L. E. Farki, Springer-Verlag, 1988) , the total energy \nper gram of tissue per life span is about four times higher in \npasserine birds than in mammals . . ' \n\u00b7'1 , \n\u2022 \u2022 \u2022 \n\u00b7 , .',.,..'0 \n\u2022\u2022 \nRabhit file-pb.\", \nI I \nCbin'pln7.ee I \nW,lf \n\u2022...... -. I I \n1 \nI \nI : , \n\u2022. ,1 _-=---= . __ -c-_.,--_---\",--_..Ji \n;;; ICI' 10\" ..,0 'I)' >0\"' 1(\" \nE ....... Il:aIDIIofI IDdn x II ... , ....... _ not< ( ... , 0, mID \" \nFie. I, Hoffman: \"Enlargements or BraiD Sin Keep Pace With The \nFig 2, erile: \n117 , , \ni , ,l i \nj;;; \n.li f \u2022 \n\" ____ of Energ( \n_. , .. _ ... \",. ..,:., ... \" . \n._ ..... , .. , ... .. _.:.. .,.\". -.,.,--\" \n.... ---.. OXlo,>.nO N IN C .... LO ... ,\u00a3S PER DAY \n.. \n\nUndoubtedly, he meant us to infer that these \"uncivilizedtl \npeople fell on the same line as animals , because their brains \nlacked the cultural quiet parts . My interpretation is that they \nate traditional diets , rather than the grain-based diet of the \nUnited States and Europe which suppresses brain metabolism, \nin the same way that the \"normal\" animal diets suppress me-\ntabolism (and decrease longevity) . Many researchers (before \nthe late 1940's) found that about 40% of the people in the \nU.S. showed evidence of deficient thyroid function (low oxy-\ngen consumption and high serum cholesterol), and benefitted \nfrom taking a thyroid supplement. Cancer , heart disease, and \nhigh susceptibility to infections were found to be extremely \nprevalent in populations with subnormal thyroid function . \nLow thyroid function , relative over-feeding, and the pres-\nence of unsaturated oils in the diet are known to accelerate \nsexual maturity . Early sexual maturity has been associated \nwith premature aging and early death . Fish, octopuses, mice , \nhumans , and plants offer examples in which reproductive ma-\nturity initiates the aging process . Although it used to be said \nthat \"hot tropical\" people had early puberty , and \"cold north-\nern\" types had late puberty, the best available data contradict \nthat opinion. The oldest averages for the occurrence of pu-\nberty occur in tropical regions . (Figure 3) \nMere calorie restriction can delay puberty (and this usually \nmeans a low fat diet, for poor people in the developed coun-\ntries) as can be seen in data from Appalachia ; late puberty, ac-\ncompanied by very low birth weight for babies, is the typical \npattern of poverty . Given enough fat (especially vegetable oil, \nincluding that in beans and corn) , harsh conditions can prob-\nably cause earlier puberty. but I don't know of any clear evi-\ndence on this subject. \n118 \n\nIn the tropical regions where puberty doesn't occur until \nabout the age of 17, it seems that some of the heaviest birth \nweights occur, and high birth weight generally indicate s good \nmaternal nutrition. (Figure 4) These tropical areas generally \ncoincide with areas where coconuts are produced abundantly, \nand are used for food. Animal s fed coconut oil are lean, have \ndelayed sexual maturation , and have offspring with larger \nbrains than animals fed similar amounts of unsaturated oils. \nSince coconuts and related fruits contain sterols, their use \nmight have a direct hormonal action, in addition to the effects \nof the easily metabolized high energy short and medium-chain \nfats, which support an efficient and intense respiratory me-\ntabolism. The dietary honnone s are probably responsible for \nthe high metabolic rate of the Eskimos, too, except in that \ncase glands , skin, and brains are regularly caten. Tropical \npeople generally consume all parts of their food animals , too \n(except for vegetarian cultures such as Hindus , which use \nonly milk and butter from their cows) , though the Eskimos are \nunique in havin g, traditionally , a pure meat diet. \nW. Donner Denckla suggested that there is a \"death hor-\nmone\" in the pituitary gland, which appears at puberty and \ninitiates the process of aging by suppressing the use of oxy-\ngen. He maintained that merel y providing thyroid supplement \nwouldn't protect against it, and that it was a distinct hor-\nmone , although it tended to appear in tissue extracts in associ-\nation with prolactin and growth honnone. Although 1 think \nthere is still a lot to be learned about the pituitary hormones, I \ndon't think Denckla discovered anything except puberty . \nThe sex hormones- -especially estrogen--are closely in-\nvolved with respiration . My dissertation, \"Age-related oxida-\ntive changes in the hamster uterus,\" surveyed some to the \nsame information . Estrogen and prolactin do many things to \nintetfere with respiration . L. C. Strong, who developed \n119 \n\nstrains of mice with high estrogen and a tendency to die of \nmammary cancer, found that early sexual maturity was asso-\nciated with a shorte r life-span. Similar observations have been \nmade in humans . \n\u2022 \nFig. 4 -Blnh Weigl! \nCaribbean, Central Africa aad New Guinea have the \nh .. riesl blnh _Ights iD the .... rld: 3.4 kgs. \nI \nFig. 3 -Age al Pub .. ty \nCarib .... ,,: IS.1 yars; Ceall1ll Alrial! 16.5 -17 yean; \nNew Guia... 15.5 \u2022 18.4 years \n120 \n\nRather than supposing that we contain a system for self-\ndestruction , I suspect that reproductive maturity appears at a \ntime when the organism is experiencing a generalized , life-\nthreatening metabolic stress--name ly, aging--and that the me-\ntabolic slowing which begins at puberty signals the appropri-\nateness of reproduction , and makes the organism more \ndependent on the glucocorticoids (regulated by the pituitary) . \nThe accumulation of iron, unsaturated fats, and other toxins, I \nthink , are major signals for puberty. (Specifica lly, factors \nwhich inhibit cytochrome oxidase.) \nMarion Diamond, who studied the effects of stimu lation on \nrats' brain development , found that pregnancy or progesterone \ntreatment--like freedom and stimu lation --caused the brain to \ngrow , and estrogen--like stress--caused it to shrink . The \nlarger-brained animals had smaller faces , and the confined, \nstressed rats had smaller brains and bigger faces . (I see no \nreason to doubt that human proportions arc similarly in-\nfluenced by prenatal stress; Franz Boas, for examp le, found \nthat immigrants' childrens' head shapes were similar to head \nshapes in the new country , and unlike their parents.') These \nchanges are similar to the differences between small-faced ba-\nbies and large -faced adults . The observation that the babies of \none spec ies resemble the adults of a more highly evolved spe-\ncies has led to the idea of evolution through neoteny (or pae-\ndomorphism or juvenilization) , in which juvenile traits are \npreserved for a longer time in the offspring, and eventually \npersist even after reprodu ctive maturity is reached. * The same \nterms are somet imes used in describing plants , as well as \nanimals . \nSome feminists have objected to the characterization of fe-\nmale traits as \"paedomorphic ,\" considering it as another at-\ntempt to deny women equal social status with men. It was \ncommon for Ashley Montague's book , Natllral Supe riorit y of \n121 \n\nWomen, to be condemned by \"feminists\" as \"patronizing .\" \nNevertheless , I think it is a mistake to argue for a kind ofbio-\nlogical relativism (analogous to cultural relativism) which \navoids the idea of a possible evolutionary significance in cer-\ntain biological features. \nIf a certain substance , such as progesterone, closely reflects \nthe quality of environmental support and is intimately involved \nin realizing and sustaining our most characteristically human \nevolutionary features, I don't think we should deny its impor-\ntance just because of its greater importance in women than in \nmen. Progesterone's effects are \"neotenous ,\" in the sense of \nprolonging youthful traits . Women have several \"neotenous\" \nfeatures relative to men, including a bigger ratio of brain to \nlean body mass, a smaller face-to-cranium ratio , differences in \nvoice and body hair, less aggressiveness , and greater adapt-\nability . (In spite of the people who teach assertiveness, I think \nhigh adaptability and low aggressiveness are characteristic hu-\nman and primate traits, which are typical of infants , and are \nlikely to represent our species' future.) \nH. G. Wells wrote that \n122 \"7he creature called Homo sapiens emerges \nfrom among the earlier Hominidae, velY evidelllly , as \nanother of these relapses of the life-c-y cle toward>; an \ninfantile and biologically more flexible form which \nhave played so impOrlanl a role in the chequered his-\ntory of living things . He is not the equivalent of the \nadult Heidelberg or Neanderthal mall. He is, \nin his opening phase, the experimental , playful, teach-\nahle. precocious child, still amenahle to social subor-\ndination when already sexually adult. 7he \never-changing conditiol1 of Nfe had less and less tol-\neram :e for a final gross, overhearing adult phase, and \n\nit weill oul of the cycle. .. . .. the now IIl1l1ecesstllY \nprimordial adult Homo, for all effective purposes, \nfaded out, leaving as his successor the childlike Homo \nsapiens, who is, at his best, curious, teachable alld ex-\nperimental from Ihe cradle to the grave . \n... It is possible that the mass of COll/emporary \nmankind may not be as readily accessible to fresh \nideas as the younger, more childish mind\\ ' of earlier \ngeneratiolls; and it is also possible that hard imagina-\ntive thinking has not increased so as to keep pace with \nthe expansion and complication (?f human societies \nand organizations. That is the darkest shadow upon \nthe hopes of mankind. \nThere is no way out for Mall but steeply lip \nor steeply down\" \nA high level of metabolic intensity is characteristic of both \nyoung plants and young animals under conditions that are \nideal for their life, meeting their energy and substance needs \nabundantly . Both plants and animals are able to adapt--\nphylogenetically and ontogenetically, i.e., through both trans-\ngenerational and developmental changes--to marginal condi-\ntions of energy and substance availability. \nThe term \"paedomorphic\" has been applied to plants which \npreserve the \"youthful\" pre-reproductive forms for extended \nperiods . Premature reproduction can be produced by stress , \nor to look at it from another angle, the conditions which pro-\nlong the growth state can be thought of as stress-free condi-\ntions . (R. Criddle and L. Hansen, in Plant, Cell, and \nEnVironment, report that a plant'S metabolic rate, measured as \nheat production, can predict its future growth rate. Jerry \nBarnes, a tree developer in Cottage Grove, Oregon, discov-\nered several years ago that the intensity of the metabolic \n123 \n\u2022 \n\nactivity even in seed s can be used to accurately predict the fu-\nture perfonnance of the tree, cutting many years out of the \nprocess of tree improvement . The story of how his work was \nreceived at the state university is interesting; he did some \nquick lab tests on seed provided by the university , and they \nconfirmed that he had correctly chosen the seeds which pro-\nduced the best trees in their 13 year study, but they simply re-\njected his result as not conforming to accepted ideas .) \nAccording to Jerry Barnes' theory, trees become able to \nmove into less favorable niches by accumulating \"restraint \ngenes,\" which limit their growth, but prevent death by making \nthem able to tolerate marginal conditions. ** The theory of \nCriddle and Hansen seems to be similar, in looking for a stable \nmetabolic rate when the plant is subjected to stress. \nUpward adaptiveness, which is typical of large-brained ani-\nmals and of plants with a high metabolic rate, allows the or-\nganisms to find more expansive niches by living at a higher \nenergy level. This process obviously places great importance \non an environment which can provide abundant energy and \nthe necessary nutritional substances . \nThe fact that steroids seem to be made by all organisms ex-\ncept viruses, and are often identical in very different organ-\nisms (e.g., estrogen in yeast is exactly the same as human \nestrogen), has led me to experiment with \"animal\" honnones, \nsuch as progesterone, on plants . I think the systematic effects \non \"gene expression\" and biochemical functioning that ste-\nroids are known to have in animals can also be seen in plants . \nProducing energy abundantly , and using it efficiently : This \nseems to be an important effect of certain steroids . It might \namount to a kind of by-passing of the \"restraint genes.\" The \nkinds of changes which can be induced by honnones can also \nbe inherited.2 \n124 \n\nIf we optimize the known factors which improve energy \nproduction (red light , short -chain and medium-chain saturated \nfats, and pregnenolone , for example) , to the extent that our \nmetaboli sm resembles that of a ten year old child , I don't think \nthere is any reason to suppose that we wouldn't have the re-\ngenerative , healing abilities which are common at that age. I \nsuspec t that both brain growth and remodeling might proceed \nindefinitely . \nThere is evidence that the cranial volume grows into old \nage, and also that the DNA content of the brain keeps increas-\ning during adulthood . Presumably , this is only the result of an \nincrease in connective tissue cells, but the certainty many peo-\nple have that we can't grow new brain cells at any age is un-\nfounded . Heart cells can now be made to multiply in vi/ro, \nand probably in vivo.3 There is also some evidence for regen-\neration of brain cells in vivo, 4 and in birds brain cells have \nbeen found to grow new each spring in a part of the brain \nconcerned with their singing , under the influenc e of a hormon-\nal change . If the brain normall y added a significant percent-\nage of brain cells during adult life, the chance of finding a \ndividing cell by microscopic examination would be so small \nthat we can't take the present absence of evidence for an in-\ncrease of brain cell number during adulthood as having any \nmeaning. The old doctrine , which claimed that \"100 ,000 \nbrain cells die every day, II is now recognized to have no basis \nin fact. \nFor example, Bigl, e/ a/. (J. 01 Geron/%gy 33, 172-180 , \n1987 , citing the work ofH . Haug , \"Are neurons of the human \ncerebral cortex really lost during aging ? A morphometric ex-\namination,\" in Traber and Gispen, Senile Dementia of the Alz-\nheimer Type, Springer , 1985) say \". . .it was demonstrated \nthat an age-dependent embedding-shrinkage of brain tissue to-\ngether with a secular acceleration in body size may \n125 \n\nsignificantly affect morphometric evaluation of neuronal den-\nsities during aging, and the view of a general neuronal loss \nduring aging had to be corrected .\" \nRather than a programmed or random continuous loss of \ncells , when atrophy of the brain occurs, it seems to be caused \nby specific conditions , such as stress with prolonged exposure \nto gluc
