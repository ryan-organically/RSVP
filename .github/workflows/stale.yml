name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further
            activity occurs. Thank you for your contributions!
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further
            activity occurs. Please update or comment if this is still relevant.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with
            no activity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            This PR was closed because it has been stale for 14 days with
            no activity. Feel free to reopen if this is still relevant.
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,keep
          exempt-pr-labels: pinned,security,keep
